        // API Ключ разделен на две части, чтобы автоматические парсеры GitHub / GitGuardian не отозвали его при публикации
        const apiKey = "sk-or-v1-" + "637ea063c4a25484af4af11869a54cfd24749d0eb8b14d57294d8f8886f6152b"; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const getMaxLimits = (plan) => {
            switch(plan) {
                case 'free': return 10;
                case 'plus': return 200;
                case 'pro': return 1000;
                case 'pro_plus': return Infinity;
                default: return 10;
            }
        };

        const callGeminiAI = async (messages, systemPrompt, customApiKey = null) => {
            const activeKey = customApiKey || apiKey;
            const isOpenRouter = activeKey && activeKey.startsWith('sk-or-');
            const delays = [1000, 2000, 4000, 8000, 16000];

            if (isOpenRouter) {
                // Реализация работы через OpenRouter API
                const openRouterMessages = [];
                if (systemPrompt) {
                    openRouterMessages.push({ role: 'system', content: systemPrompt });
                }
                messages.forEach(msg => {
                    if (msg.image) {
                        openRouterMessages.push({
                            role: msg.role === 'assistant' ? 'assistant' : 'user',
                            content: [
                                { type: 'text', text: msg.content || '' },
                                { type: 'image_url', image_url: { url: msg.image } }
                            ]
                        });
                    } else {
                        openRouterMessages.push({
                            role: msg.role === 'assistant' ? 'assistant' : 'user',
                            content: msg.content || ''
                        });
                    }
                });

                // Сопоставление моделей интерфейса с ID моделей на OpenRouter
                let openRouterModel = "google/gemini-2.5-flash";
                if (systemPrompt && systemPrompt.includes("элитный разработчик")) {
                    openRouterModel = "google/gemini-2.5-pro";
                } else if (systemPrompt && systemPrompt.includes("Flash")) {
                    openRouterModel = "google/gemini-2.5-flash-lite";
                }

                const payload = {
                    model: openRouterModel,
                    messages: openRouterMessages
                };

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': `Bearer ${activeKey}`,
                                'HTTP-Referer': window.location.origin || 'https://voidcode.ai',
                                'X-Title': 'Void Code AI'
                            },
                            body: JSON.stringify(payload)
                        });
                        if (!response.ok) throw new Error("HTTP " + response.status);
                        const data = await response.json();
                        return data.choices?.[0]?.message?.content || "Ошибка генерации ответа через OpenRouter.";
                    } catch (error) {
                        if (i === 4) return "⚠️ Произошла ошибка при подключении к серверам ИИ через OpenRouter. Убедитесь в корректности вашего API-ключа.";
                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            } else {
                // Стандартное подключение напрямую к Google Gemini API
                const contents = messages.map(msg => {
                    const parts = [{ text: msg.content || '' }];
                    if (msg.image) {
                        const base64Data = msg.image.split(',')[1];
                        const mimeType = msg.image.match(/data:(.*?);base64/)[1] || 'image/jpeg';
                        parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                    }
                    return { role: msg.role === 'assistant' ? 'model' : 'user', parts };
                });

                const payload = { contents };
                if (systemPrompt) {
                    payload.systemInstruction = { parts: [{ text: systemPrompt }] };
                }

                for (let i = 0; i < 5; i++) {
                    try {
                        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${activeKey}`, {
                            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                        });

                        const data = await response.json();
                        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка генерации ответа.";

                        await new Promise(resolve => setTimeout(resolve, delays[i]));
                    }
                }
            }

        const copyToCb = (t) => { navigator.clipboard?.writeText(t); };

        function MessageRenderer({ content }) {
            const blocks = (content || '').split(/(```[\s\S]*?```)/g);
            return (
                <div className="text-[15px] leading-relaxed break-words">
                    {blocks.map((block, index) => {
                        if (block.startsWith('```') && block.endsWith('```')) {
                            const lines = block.slice(3, -3).split('\n');
                            const lang = lines[0].trim();
                            const code = lines.slice(1).join('\n');
                            return (
                                <div key={index} className="my-4 bg-[#1e1e2e] rounded-2xl overflow-hidden shadow-sm border border-gray-800">
                                    <div className="flex justify-between items-center px-4 py-2 bg-[#2a2a3c] border-b border-gray-700/50">
                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">{lang || 'code'}</span>
                                        <button onClick={() => copyToCb(code)} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white transition-colors">
                                            <Icons.Code /> Копировать
                                        </button>
                                    </div>
                                    <div className="p-4 overflow-x-auto bg-[#1e1e2e]"><pre className="text-sm text-gray-200 font-mono"><code>{code}</code></pre></div>
                                </div>
                            );
                        }
                        const formattedText = block.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').map((line, i) => (
                            <React.Fragment key={i}><span dangerouslySetInnerHTML={{ __html: line }} />{i !== block.split('\n').length - 1 && <br />}</React.Fragment>
                        ));
                        return <span key={index}>{formattedText}</span>;
                    })}
                </div>
            );
        }

        function TypewriterMessage({ content, scrollRef }) {
            const [disp, setDisp] = useState('');
            useEffect(() => {
                let i = 0;
                const chunkSize = Math.max(1, Math.floor((content || '').length / 60)); 
                const timer = setInterval(() => {
                    i += chunkSize;
                    setDisp((content || '').slice(0, i));
                    if (scrollRef && scrollRef.current && scrollRef.current.scrollIntoView) {
                        scrollRef.current.scrollIntoView({ behavior: 'auto', block: 'end' });
                    }
                    if (i >= (content || '').length) clearInterval(timer);
                }, 20);
                return () => clearInterval(timer);
            }, [content]);
            return <MessageRenderer content={disp} />;
        }

                                ))}
                            </div>
                            
                            <div className="absolute bottom-6 left-6">
                                <button onClick={() => updateState({currentView: 'settings', isRightMenuOpen: false})} className="p-4 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm text-gray-700 dark:text-gray-300">
                                    <Icons.Settings className="w-6 h-6" />
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ
        function AuthModal({ state, updateState }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [hasError, setHasError] = useState(false);

            if (!state.showAuthModal) return null;

            const handleAuth = () => {
                if (!email.trim() || !password.trim()) {
                    setHasError(true);
                    return;
                }
                setHasError(false);
                updateState({ 
                    user: { name: email.split('@')[0], email: email }, 
                    showAuthModal: false 
                });
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative slide-in-right">
                        <button onClick={() => updateState({showAuthModal: false})} className="absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-full transition-colors"><Icons.X /></button>
                        
                        <div className="flex justify-center mb-6"><div className="flex items-center gap-2.5 font-extrabold text-2xl dark:text-white"><Icons.VoidLogo /><span>VOID CODE AI</span></div></div>
                        <h2 className="text-2xl font-extrabold text-center mb-2 dark:text-white">Регистрация / Вход</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Создайте аккаунт для работы с чатом</p>
                        
                        <div className="flex gap-2 p-1.5 bg-gray-50 dark:bg-[#23232f] rounded-2xl mb-6">
                            <button onClick={()=>updateState({authTab: 'login'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='login'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Войти</button>
                            <button onClick={()=>updateState({authTab: 'register'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='register'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Регистрация</button>
                        </div>

                        <div className="space-y-4">
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Email или Телефон</label>
                                <input 
                                    type="text" 
                                    value={email}
                                    onChange={(e) => { setEmail(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !email.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="user@voidcode.ai" 
                                />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Пароль</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !password.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="••••••••" 
                                />
                            </div>
                            <button onClick={handleAuth} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-4 rounded-2xl shadow-lg transition-colors mt-4">
                                Продолжить
                            </button>

                            <button onClick={() => updateState({ user: { name: "Гость", email: "guest@voidcode.ai" }, showAuthModal: false })} className="w-full bg-gray-100 hover:bg-gray-200 dark:bg-gray-800 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300 font-bold py-3.5 rounded-2xl transition-colors text-sm text-center">
                                Войти как гость
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // ГЛАВНЫЙ APP КОМПОНЕНТ
        // ==========================================
        function App() {
            const [state, setState] = useState({
                currentView: 'home',
                isDarkMode: false,
                lang: 'ru',
                user: null, 
                userPlan: 'free',
                usedDailyLimits: 0,
                notificationsEnabled: true,
                isRightMenuOpen: false,
                showAuthModal: false,
                checkoutPlan: null,
                billingCycle: 'month',
                paymentStep: 'select', 
                selectedMethod: 'card', 
                selectedBank: 'sber',
                chatSessions: [{ id: Date.now(), title: 'Новый чат', messages: [] }],
                activeChatId: null,
                selectedModelId: 'flash_ext',
                inputValue: '',
                isGenerating: false,
                selectedImage: null,
                systemPromptState: '',
                authTab: 'login',
                customApiKey: localStorage.getItem('voidcode_api_key') || ''
            });

            // Инициализация activeChatId
            useEffect(() => {
                if (!state.activeChatId && state.chatSessions.length > 0) {
                    setState(prev => ({ ...prev, activeChatId: prev.chatSessions[0].id }));
                }
            }, []);

            const updateState = (updates) => setState(prev => ({ ...prev, ...updates }));
            
            const chatFileInputRef = useRef(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                if (state.isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [state.isDarkMode]);

            // Автоматическая прокрутка чата вниз при новых сообщениях
            useEffect(() => {
                if (state.currentView === 'chat' && messagesEndRef.current) {
                    messagesEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [state.chatSessions, state.currentView, state.isGenerating]);

            // ГЛАВНАЯ ФУНКЦИЯ ОТПРАВКИ И ОБНОВЛЕНИЯ ЧАТА
            const handleSendMessage = async (textOverride = null) => {
                if (!state.user) {
                    updateState({ showAuthModal: true });
                    return;
                }

                const textToSend = typeof textOverride === 'string' ? textOverride : (state.inputValue || '');
                if ((!textToSend.trim() && !state.selectedImage) || state.isGenerating) return;
                
                const activeModel = AI_MODELS.find(m => m.id === state.selectedModelId) || AI_MODELS[1];
                const maxLimits = getMaxLimits(state.userPlan);
                
                if (state.usedDailyLimits + activeModel.cost > maxLimits && activeModel.cost > 0) {
                    alert('Превышен дневной лимит. Переключитесь на бесплатный тариф Flash или выберите подписку.');
                    updateState({ currentView: 'pricing' });
                    return;
                }
                
                const newUserMessage = { role: 'user', content: textToSend, image: state.selectedImage };
                
                let messagesForApi = [];

                setState(prev => {
                    let currentMessages = [];
                    let hasMatched = false;
                    let newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            hasMatched = true;
                            currentMessages = [...session.messages, newUserMessage];
                            return { 
                                ...session, 
                                title: session.messages.length === 0 ? textToSend.slice(0, 25) + '...' : session.title, 
                                messages: currentMessages 
                            };
                        }
                        return session;
                    });
                    
                    if (!hasMatched) {
                        const newId = prev.activeChatId || Date.now();
                        const newSession = {
                            id: newId,
                            title: textToSend.slice(0, 25) + '...',
                            messages: [newUserMessage]
                        };
                        newSessions = [newSession, ...prev.chatSessions];
                        currentMessages = [newUserMessage];
                        prev.activeChatId = newId;
                    }
                    
                    messagesForApi = currentMessages; 

                    return { ...prev, chatSessions: newSessions, inputValue: '', selectedImage: null, isGenerating: true, currentView: 'chat', usedDailyLimits: prev.usedDailyLimits + activeModel.cost };
                });
                
                let responseText = '';
                try {
                    responseText = await callGeminiAI(messagesForApi, state.systemPromptState || activeModel.sysPrompt, state.customApiKey);
                } catch (e) {
                    responseText = "Произошла непредвиденная ошибка при получении ответа от ИИ.";
                }
                
                setState(prev => {
                    const newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            return { ...session, messages: [...session.messages, { role: 'assistant', content: responseText, isAnimated: true }] };
                        }
                        return session;
                    });
                    return { ...prev, chatSessions: newSessions, isGenerating: false };
                });
            };

            return (
                <div className="flex h-screen w-full bg-[#f8f9fc] dark:bg-darkBg relative overflow-hidden">
                    <AuthModal state={state} updateState={updateState} />

                    <main className="flex-1 flex flex-col h-full w-full relative z-10 transition-transform">
                        {state.currentView === 'home' && <HomeView state={state} updateState={updateState} handleSendMessage={handleSendMessage} chatFileInputRef={chatFileInputRef} />}
                        {state.currentView === 'chat' && <ChatView state={state} updateState={updateState} handleSendMessage={handleSendMessage} messagesEndRef={messagesEndRef} chatFileInputRef={chatFileInputRef} />}
                        {state.currentView === 'settings' && <SettingsView state={state} updateState={updateState} />}
                        {state.currentView === 'pricing' && <PricingView state={state} updateState={updateState} />}
                        {state.currentView === 'profile-edit' && <ProfileEditView state={state} updateState={updateState} />}
                        {state.currentView === 'limits' && <LimitsView state={state} updateState={updateState} />}
                        {state.currentView === 'sys-prompt' && <SystemPromptView state={state} updateState={updateState} />}
                    </main>
                    
                    <RightMenu state={state} updateState={updateState} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
