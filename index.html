                        <div className="px-4 py-8 max-w-2xl mx-auto">
                            <div className="flex items-center mb-8 gap-4">
                                <button onClick={() => updateState({checkoutPlan: null})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                                <h2 className="text-2xl font-bold dark:text-white">Оформление подписки</h2>
                            </div>
                            
                            <div className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm mb-6 flex justify-between items-center">
                                <div className="flex gap-4 items-center">
                                    <div className="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center"><Icons.VoidLogo className="w-6 h-6" /></div>
                                    <div>
                                        <h3 className="text-xl font-bold dark:text-white">{state.checkoutPlan.title}</h3>
                                        <span className="bg-[#efecf9] text-[#5b32d4] text-[10px] font-bold px-2 py-1 rounded-md uppercase">Популярный</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-2xl font-extrabold dark:text-white">{formatPrice(price)}₽</p>
                                    <p className="text-xs text-gray-500">{period}</p>
                                </div>
                            </div>

                            <h3 className="text-xl font-bold mb-4 dark:text-white">Способ оплаты</h3>
                            <div className="space-y-3 mb-8">
                                <div onClick={() => updateState({selectedMethod: 'card'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'card' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.Card /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">Банковская карта</div><div className="text-xs text-gray-500">Visa, Mastercard, МИР</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'card' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'card' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                                <div onClick={() => updateState({selectedMethod: 'sbp'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'sbp' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.SBP /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">СБП</div><div className="text-xs text-gray-500">Оплата через Систему быстрых платежей</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'sbp' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'sbp' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                                <div onClick={() => updateState({selectedMethod: 'crypto'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'crypto' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.Crypto /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">Криптовалюты</div><div className="text-xs text-gray-500">USDT, BTC и другие</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'crypto' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'crypto' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                            </div>
                            <button onClick={() => updateState({paymentStep: 'form'})} className="w-full py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors text-lg">Продолжить</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="px-4 py-8 max-w-5xl mx-auto">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => updateState({currentView: 'settings'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h1 className="text-3xl font-extrabold dark:text-white">Тарифы</h1>
                        </div>
                        <div className="flex justify-center mb-10">
                            <div className="bg-gray-100 dark:bg-darkBorder p-1 flex rounded-2xl relative w-72">
                                <div className={`absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white dark:bg-darkCard rounded-xl shadow-sm transition-transform duration-300 ease-in-out ${state.billingCycle === 'year' ? 'translate-x-[calc(100%+4px)]' : 'translate-x-0'}`} />
                                <button onClick={() => updateState({billingCycle: 'month'})} className={`relative z-10 flex-1 py-2.5 text-sm font-bold transition-colors ${state.billingCycle === 'month' ? 'text-gray-900 dark:text-white' : 'text-gray-500'}`}>В месяц</button>
                                <button onClick={() => updateState({billingCycle: 'year'})} className={`relative z-10 flex-1 py-2.5 text-sm font-bold transition-colors ${state.billingCycle === 'year' ? 'text-gray-900 dark:text-white' : 'text-gray-500'}`}>В год (-20%)</button>
                            </div>
                        </div>
                        <div className="grid md:grid-cols-2 gap-6">
                            {PRICING_PLANS.map(p => (
                                <div key={p.id} className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm flex flex-col">
                                    <h2 className="text-2xl font-bold dark:text-white">{p.title}</h2>
                                    <p className="text-sm text-gray-500 mt-1 mb-4">{p.subtitle}</p>
                                    <div className="text-4xl font-extrabold dark:text-white mb-6">{formatPrice(state.billingCycle === 'month' ? p.priceMonth : p.priceYear)}₽</div>
                                    <div className="mb-8">
                                        <h4 className="text-sm font-bold mb-4 dark:text-white">Что входит:</h4>
                                        <div className="space-y-3">
                                            {p.features.map((f, i) => (
                                                <div key={i} className="flex items-start gap-3">
                                                    <div className="mt-1 bg-[#5b32d4] rounded-full p-0.5 flex-shrink-0"><Icons.Check className="w-3 h-3 text-white"/></div>
                                                    <div className="text-sm font-medium text-gray-700 dark:text-gray-300 leading-tight">{f}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => {
                                        if (p.id === 'free') return;
                                        if (!state.user) { updateState({ showAuthModal: true, authTab: 'register' }); return; }
                                        updateState({checkoutPlan: p, paymentStep: 'select', selectedMethod: 'card', selectedBank: 'sber'});
                                    }} className={`mt-auto py-3 rounded-xl font-bold transition-colors ${p.id !== 'free' ? 'bg-[#5b32d4] text-white hover:bg-[#4a26b0]' : 'bg-gray-100 dark:bg-gray-800 text-gray-700 dark:text-gray-300'}`}>{p.id !== 'free' ? 'Выбрать' : 'Текущий'}</button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function ProfileEditView({ state, updateState }) {
            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => updateState({currentView: 'settings'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Личные данные</h2>
                        </div>
                        <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder space-y-5">
                            <div><label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Имя</label><input type="text" value={state.user?.name || ''} onChange={e => updateState({user: {...state.user, name: e.target.value}})} className="w-full p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl dark:text-white font-medium outline-none transition-all focus:border-[#5b32d4]" /></div>
                            <div><label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Email</label><input type="text" value={state.user?.email || ''} onChange={e => updateState({user: {...state.user, email: e.target.value}})} className="w-full p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl dark:text-white font-medium outline-none transition-all focus:border-[#5b32d4]" /></div>
                            <div><label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Номер телефона</label><input type="tel" value={state.user?.phone || ''} onChange={e => updateState({user: {...state.user, phone: e.target.value}})} placeholder="+7 (___) ___-__-__" className="w-full p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl dark:text-white font-medium outline-none transition-all focus:border-[#5b32d4]" /></div>
                            <div className="pt-4"><button onClick={() => updateState({currentView: 'settings'})} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-4 rounded-2xl shadow-lg transition-colors">Сохранить</button></div>
                        </div>
                    </div>
                </div>
            );
        }

        function LimitsView({ state, updateState }) {
            const plan = state.userPlan;
            const planNames = { free: 'Free', plus: 'Plus', pro: 'Pro', pro_plus: 'Pro+' };
            const planName = planNames[plan] || 'Free';
            const { daily: maxDaily, weekly: maxWeekly } = getPlanLimits(plan);

            const usedDaily = state.usedDailyLimits;
            const usedWeekly = state.usedWeeklyLimits || 0;
            const dailyPercent = maxDaily === Infinity ? 100 : Math.min((usedDaily / maxDaily) * 100, 100);
            const weeklyPercent = maxWeekly === Infinity ? 100 : Math.min((usedWeekly / maxWeekly) * 100, 100);
            const dailyLabel = maxDaily === Infinity ? 'Безлимитно' : `${usedDaily} / ${maxDaily}`;
            const weeklyLabel = maxWeekly === Infinity ? 'Безлимитно' : `${usedWeekly} / ${maxWeekly}`;

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => updateState({currentView: 'settings'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Лимиты</h2>
                        </div>
                        <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder space-y-6">
                            <div className="p-4 bg-purple-50 dark:bg-purple-900/20 rounded-2xl border border-purple-100 dark:border-purple-900/50 flex gap-3 items-start">
                                <Icons.Info className="w-5 h-5 shrink-0 text-[#5b32d4] mt-0.5" style={{width: '20px', height: '20px', minWidth: '20px'}} />
                                <p className="text-sm text-[#5b32d4] dark:text-purple-300 font-medium leading-relaxed flex-1 min-w-0">Обычные запросы к модели <strong>Flash</strong> не расходуют премиум-лимиты и не отображаются на графике.</p>
                            </div>
                            <div>
                                <div className="flex justify-between items-end mb-2"><span className="font-bold dark:text-white">Дневной лимит</span><span className="text-sm font-bold text-gray-500">{dailyLabel} запросов</span></div>
                                <div className="w-full bg-gray-100 dark:bg-gray-800 rounded-full h-3"><div className="bg-[#5b32d4] h-3 rounded-full transition-all duration-1000" style={{width: `${dailyPercent}%`}}></div></div>
                            </div>
                            <div>
                                <div className="flex justify-between items-end mb-2"><span className="font-bold dark:text-white">Недельный лимит</span><span className="text-sm font-bold text-gray-500">{weeklyLabel} запросов</span></div>
                                <div className="w-full bg-gray-100 dark:bg-gray-800 rounded-full h-3"><div className="bg-[#5b32d4] h-3 rounded-full transition-all duration-1000" style={{width: `${weeklyPercent}%`}}></div></div>
                            </div>
                            {plan === 'free' && (
                                <button onClick={() => updateState({currentView: 'pricing'})} className="w-full mt-6 bg-[#1a0b38] text-white font-bold py-4 rounded-2xl shadow-lg flex justify-center items-center gap-2 hover:bg-[#2a1b48] transition-colors">
                                    <Icons.Star /> Сменить план
                                </button>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function SystemPromptView({ state, updateState }) {
            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-2xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => updateState({currentView: 'home'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Системный промт</h2>
                        </div>
                        <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder space-y-4">
                            <textarea value={state.systemPromptState} onChange={e => updateState({systemPromptState: e.target.value})} className="w-full h-48 p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl dark:text-white font-medium resize-none focus:outline-none focus:ring-2 focus:ring-[#5b32d4]" placeholder="Укажите базовые инструкции для ИИ..."></textarea>
                            <button onClick={() => updateState({systemPromptState: 'Ты — опытный наставник по программированию. Объясняй концепции просто и с комментариями.'})} className="w-full bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 font-bold py-3.5 rounded-2xl transition-colors flex justify-center items-center gap-2 hover:bg-[#e0dbf4]"><Icons.Sparkles /> Сгенерировать</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // БИБЛИОТЕКА (сгенерированные изображения и документы/код)
        // ==========================================
        function LibraryView({ state, updateState }) {
            const [tab, setTab] = useState('images');
            const [copiedId, setCopiedId] = useState(null);
            const images = state.generatedImages || [];
            const documents = state.generatedDocuments || [];

            const formatDate = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

            const openChat = (chatId) => {
                const exists = state.chatSessions.some(c => c.id === chatId);
                if (exists) updateState({ activeChatId: chatId, currentView: 'chat' });
                else updateState({ currentView: 'chat' });
            };

            const handleCopy = (doc) => {
                navigator.clipboard.writeText(doc.content).then(() => {
                    setCopiedId(doc.id);
                    setTimeout(() => setCopiedId(null), 1500);
                }).catch(() => {});
            };

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => updateState({currentView: 'home'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Библиотека</h2>
                        </div>

                        <div className="flex gap-2 mb-8 bg-gray-100 dark:bg-gray-800/60 p-1.5 rounded-2xl w-full md:w-fit">
                            <button onClick={() => setTab('images')} className={`flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm flex-1 md:flex-none transition-colors ${tab === 'images' ? 'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>
                                <Icons.Image className="w-4 h-4" /> Изображения <span className="text-xs opacity-60">({images.length})</span>
                            </button>
                            <button onClick={() => setTab('documents')} className={`flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm flex-1 md:flex-none transition-colors ${tab === 'documents' ? 'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>
                                <Icons.Library className="w-4 h-4" /> Документы <span className="text-xs opacity-60">({documents.length})</span>
                            </button>
                        </div>

                        {tab === 'images' && (
                            images.length === 0 ? (
                                <div className="text-center py-20 fade-in">
                                    <Icons.Image className="w-14 h-14 mx-auto mb-4 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 font-medium">Пока нет сгенерированных изображений</p>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm mt-1">Создайте первое во вкладке «Изображение» в чате</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 fade-in">
                                    {images.map(img => (
                                        <div key={img.id} className="bg-white dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-darkBorder shadow-sm overflow-hidden group">
                                            <div className="aspect-square overflow-hidden cursor-pointer" onClick={() => openChat(img.chatId)}>
                                                <img src={img.url} alt={img.prompt} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                            </div>
                                            <div className="p-3">
                                                <p className="text-xs font-semibold text-gray-700 dark:text-gray-300 line-clamp-2 mb-1.5">{img.prompt}</p>
                                                <div className="flex items-center justify-between">
                                                    <span className="text-[11px] text-gray-400">{formatDate(img.timestamp)}</span>
                                                    <a href={img.url} download={`void-image-${img.id}.svg`} className="p-1.5 rounded-lg text-[#5b32d4] dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-colors" title="Скачать"><Icons.Download className="w-3.5 h-3.5" /></a>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )
                        )}

                        {tab === 'documents' && (
                            documents.length === 0 ? (
                                <div className="text-center py-20 fade-in">
                                    <Icons.Library className="w-14 h-14 mx-auto mb-4 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 font-medium">Пока нет сохранённых документов</p>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm mt-1">Код из ответов ассистента будет появляться здесь автоматически</p>
                                </div>
                            ) : (
                                <div className="space-y-3 fade-in">
                                    {documents.map(doc => (
                                        <div key={doc.id} className="bg-white dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-darkBorder shadow-sm p-4 cursor-pointer" onClick={() => openChat(doc.chatId)}>
                                            <div className="flex items-start justify-between gap-3 mb-2">
                                                <div className="flex items-center gap-2 min-w-0">
                                                    <span className="flex-shrink-0 text-[11px] font-bold uppercase px-2 py-0.5 rounded-md bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-300">{doc.language}</span>
                                                    <span className="font-semibold text-sm text-gray-800 dark:text-gray-200 truncate">{doc.title}</span>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); handleCopy(doc); }} className="flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">
                                                    {copiedId === doc.id ? 'Скопировано ✓' : 'Копировать'}
                                                </button>
                                            </div>
                                            <pre className="text-xs bg-gray-50 dark:bg-[#17141f] rounded-xl p-3 overflow-x-auto text-gray-600 dark:text-gray-400 max-h-24 overflow-y-hidden"><code>{doc.content.slice(0, 240)}{doc.content.length > 240 ? '...' : ''}</code></pre>
                                            <span className="text-[11px] text-gray-400 mt-2 block">{formatDate(doc.timestamp)}</span>
                                        </div>
                                    ))}
                                </div>
                            )
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // БОКОВОЕ МЕНЮ (ШТОРКА)
        // ==========================================
        function RightMenu({ state, updateState }) {
            if (!state.user) return null;

            return (
                <>
                    <div className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity duration-300 ${state.isRightMenuOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => updateState({isRightMenuOpen: false})} />
                    <div className={`fixed top-0 right-0 h-full w-[85vw] md:w-96 bg-white dark:bg-darkCard shadow-2xl z-50 transform transition-transform duration-300 flex flex-col ${state.isRightMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-6 flex-1 flex flex-col relative overflow-hidden">
                            <button onClick={() => updateState({isRightMenuOpen: false})} className="void-tap-target absolute top-4 right-4 p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                            
                            <div className="flex items-center gap-3 mb-8 mt-2">
                                <Icons.VoidLogo className="w-8 h-8 text-[#5b32d4] dark:text-purple-400" />
                                <span className="font-extrabold text-xl dark:text-white">Меню</span>
                            </div>

                            <div className="space-y-3 mb-6">
                                <button onClick={() => { 
                                    const nid = Date.now(); 
                                    updateState({chatSessions: [{id:nid,title:'Новый чат',messages:[]}, ...state.chatSessions], activeChatId: nid, currentView: 'chat', isRightMenuOpen: false, imageGenMode: false}); 
                                }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold transition-colors shadow-md">
                                    <Icons.Plus /> Создать новый чат
                                </button>
                                <button onClick={() => {
                                    const nid = Date.now();
                                    updateState({chatSessions: [{id:nid,title:'Новое изображение',messages:[]}, ...state.chatSessions], activeChatId: nid, currentView: 'chat', isRightMenuOpen: false, imageGenMode: true});
                                }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.Image /> Создать изображение
                                </button>
                                <button onClick={() => updateState({currentView: 'sys-prompt', isRightMenuOpen: false})} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.LayoutDashboard /> Системный промт
                                </button>
                                <button onClick={() => updateState({currentView: 'library', isRightMenuOpen: false})} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.Library /> Библиотека
                                </button>
                            </div>

                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 ml-1">История чатов</h3>
                            <div className="flex-1 overflow-y-auto space-y-1 pb-20 scrollbar-hide">
                                {state.chatSessions.map(chat => (
                                    <button key={chat.id} onClick={() => updateState({activeChatId: chat.id, currentView: 'chat', isRightMenuOpen: false, imageGenMode: false})} className={`w-full flex items-center gap-3 p-3 rounded-xl transition-colors text-left ${state.activeChatId === chat.id ? 'bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400' : 'hover:bg-gray-50 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'}`}>
                                        <Icons.MessageSquare className="w-5 h-5 flex-shrink-0" /><span className="font-semibold text-[15px] truncate">{chat.title}</span>
                                    </button>
                                ))}
                            </div>
                            
                            <div className="absolute bottom-6 left-6">
                                <button onClick={() => updateState({currentView: 'settings', isRightMenuOpen: false})} className="p-4 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm text-gray-700 dark:text-gray-300">
                                    <Icons.Settings className="w-6 h-6" />
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ
        function AuthModal({ state, updateState }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [hasError, setHasError] = useState(false);

            if (!state.showAuthModal) return null;

            const handleAuth = () => {
                if (!email.trim() || !password.trim()) {
                    setHasError(true);
                    return;
                }
                setHasError(false);
                updateState({ 
                    user: { name: email.split('@')[0], email: email }, 
                    showAuthModal: false 
                });
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-start sm:items-center justify-center p-3 sm:p-4 overflow-y-auto fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative slide-in-right my-6 sm:my-0">
                        <button onClick={() => updateState({showAuthModal: false})} className="void-tap-target absolute top-3 right-3 sm:top-4 sm:right-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                        
                        <div className="flex justify-center mb-6"><div className="flex items-center gap-2.5 font-extrabold text-2xl dark:text-white"><Icons.VoidLogo /><span>VOID CODE AI</span></div></div>
                        <h2 className="text-2xl font-extrabold text-center mb-2 dark:text-white">Регистрация / Вход</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Создайте аккаунт для работы с чатом</p>
                        
                        <div className="flex gap-2 p-1.5 bg-gray-50 dark:bg-[#23232f] rounded-2xl mb-6">
                            <button onClick={()=>updateState({authTab: 'login'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='login'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Войти</button>
                            <button onClick={()=>updateState({authTab: 'register'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='register'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Регистрация</button>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Email или Телефон</label>
                                <input 
                                    type="text" 
                                    value={email}
                                    onChange={(e) => { setEmail(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !email.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="user@voidcode.ai" 
                                />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Пароль</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !password.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="••••••••" 
                                />
                            </div>
                            <button onClick={handleAuth} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-4 rounded-2xl shadow-lg transition-colors mt-4">
                                Продолжить
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // ГЛАВНЫЙ APP КОМПОНЕНТ
        // ==========================================
        function App() {
            // Ленивая инициализация: при первом рендере пытаемся достать
            // сохранённую сессию (вход, чаты, тему и т.д.) из localStorage.
            // Если её нет — используем значения по умолчанию, как раньше.
            const [state, setState] = useState(() => {
                const defaults = {
                    currentView: 'home',
                    isDarkMode: false,
                    lang: 'ru',
                    user: null, // До входа - null
                    userPlan: 'free',
                    usedDailyLimits: 0,
                    usedWeeklyLimits: 0,
                    notificationsEnabled: true,
                    isRightMenuOpen: false,
                    showAuthModal: false,
                    checkoutPlan: null,
                    billingCycle: 'month',
                    paymentStep: 'select', 
                    selectedMethod: 'card', 
                    selectedBank: 'sber',
                    chatSessions: [{ id: Date.now(), title: 'Новый чат', messages: [] }],
                    activeChatId: null,
                    selectedModelId: 'flash_ext',
                    inputValue: '',
                    isGenerating: false,
                    selectedImage: null,
                    systemPromptState: '',
                    authTab: 'login',
                    imageGenMode: false,
                    isGeneratingImage: false,
                    generatedImages: [],
                    generatedDocuments: []
                };

                const saved = loadPersistedState();
                if (!saved) return defaults;

                return {
                    ...defaults,
                    ...saved,
                    chatSessions: (saved.chatSessions && saved.chatSessions.length > 0)
                        ? saved.chatSessions
                        : defaults.chatSessions,
                    generatedImages: saved.generatedImages || [],
                    generatedDocuments: saved.generatedDocuments || [],
                    imageGenMode: false,
                    isGeneratingImage: false,
                    showAuthModal: false
                };
            });

            // Инициализация activeChatId
            useEffect(() => {
                if (!state.activeChatId && state.chatSessions.length > 0) {
                    setState(prev => ({ ...prev, activeChatId: prev.chatSessions[0].id }));
                }
            }, []);

            // Автосохранение сессии: при любом изменении входа, чатов, темы,
            // тарифа и т.п. состояние сразу пишется в localStorage.
            // Благодаря этому обновление страницы (F5) больше не сбрасывает вход.
            useEffect(() => {
                savePersistedState(state);
            }, [
                state.user, state.userPlan, state.usedDailyLimits, state.usedWeeklyLimits, state.isDarkMode,
                state.notificationsEnabled, state.chatSessions, state.activeChatId,
                state.selectedModelId, state.systemPromptState, state.lang,
                state.generatedImages, state.generatedDocuments
            ]);

            const updateState = (updates) => setState(prev => ({ ...prev, ...updates }));
            
            const chatFileInputRef = useRef(null);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                if (state.isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [state.isDarkMode]);

            // ГЛАВНАЯ ФУНКЦИЯ ОТПРАВКИ И ОБНОВЛЕНИЯ ЧАТА
            const handleSendMessage = async (textOverride = null) => {
                // ПРОВЕРКА АВТОРИЗАЦИИ: Если не вошел, показываем модалку логина
                if (!state.user) {
                    updateState({ showAuthModal: true });
                    return;
                }

                const textToSend = typeof textOverride === 'string' ? textOverride : (state.inputValue || '');
                if ((!textToSend.trim() && !state.selectedImage) || state.isGenerating) return;
                
                const activeModel = AI_MODELS.find(m => m.id === state.selectedModelId) || AI_MODELS[1];
                const maxLimits = getPlanLimits(state.userPlan);
                
                // ПРОВЕРКА ЛИМИТОВ (дневной лимит остаётся основным ограничителем)
                if (state.usedDailyLimits + activeModel.cost > maxLimits.daily && activeModel.cost > 0) {
                    alert('Ой! Ваш лимит на премиум-запросы исчерпан. Используйте бесплатную модель Flash или смените тариф.');
                    updateState({ currentView: 'pricing' });
                    return;
                }
                
                const newUserMessage = { role: 'user', content: textToSend, image: state.selectedImage };
                
                let messagesForApi = [];

                // 1. Оптимистично добавляем запрос юзера
                setState(prev => {
                    let currentMessages = [];
                    const newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            currentMessages = [...session.messages, newUserMessage];
                            return { 
                                ...session, 
                                title: session.messages.length === 0 ? textToSend.slice(0, 25) + '...' : session.title, 
                                messages: currentMessages 
                            };
                        }
                        return session;
                    });
                    
                    messagesForApi = currentMessages; 

                    return { ...prev, chatSessions: newSessions, inputValue: '', selectedImage: null, isGenerating: true, currentView: 'chat', usedDailyLimits: prev.usedDailyLimits + activeModel.cost, usedWeeklyLimits: (prev.usedWeeklyLimits || 0) + activeModel.cost };
                });
                
                // 2. Отправляем запрос к ИИ
                let responseText = '';
                try {
                    responseText = await callGeminiAI(messagesForApi, state.systemPromptState || activeModel.sysPrompt);
                } catch (e) {
                    responseText = "Произошла ошибка при получении ответа от ИИ.";
                }
                
                // 3. Добавляем ответ
                setState(prev => {
                    const newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            return { ...session, messages: [...session.messages, { role: 'assistant', content: responseText, isAnimated: true }] };
                        }
                        return session;
                    });

                    // Автоматически сохраняем блоки кода из ответа в "Библиотеку" → Документы
                    const foundDocs = extractCodeDocuments(responseText).map(doc => ({
                        id: Date.now() + Math.random(),
                        ...doc,
                        timestamp: Date.now(),
                        chatId: prev.activeChatId
                    }));

                    return {
                        ...prev,
                        chatSessions: newSessions,
                        isGenerating: false,
                        generatedDocuments: foundDocs.length > 0 ? [...foundDocs, ...(prev.generatedDocuments || [])] : prev.generatedDocuments
                    };
                });
            };

            // ФУНКЦИЯ ГЕНЕРАЦИИ ИЗОБРАЖЕНИЙ (работает офлайн, без внешних API)
            const handleGenerateImage = async (promptOverride = null) => {
                if (!state.user) {
                    updateState({ showAuthModal: true });
                    return;
                }

                const prompt = typeof promptOverride === 'string' ? promptOverride : (state.inputValue || '');
                if (!prompt.trim() || state.isGenerating) return;

                const newUserMessage = { role: 'user', content: prompt };

                setState(prev => {
                    const newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            return {
                                ...session,
                                title: session.messages.length === 0 ? ('🎨 ' + prompt.slice(0, 22)) : session.title,
                                messages: [...session.messages, newUserMessage]
                            };
                        }
                        return session;
                    });
                    return { ...prev, chatSessions: newSessions, inputValue: '', isGenerating: true, isGeneratingImage: true, currentView: 'chat' };
                });

                // Небольшая пауза имитирует время генерации — под неё крутится анимация
                await new Promise(resolve => setTimeout(resolve, 1600 + Math.random() * 900));

                const imageUrl = generateArtImage(prompt);

                setState(prev => {
                    const newSessions = prev.chatSessions.map(session => {
                        if (session.id === prev.activeChatId) {
                            return { ...session, messages: [...session.messages, { role: 'assistant', content: `Готово! Вот изображение по запросу: «${prompt}»`, generatedImage: imageUrl, isAnimated: false }] };
                        }
                        return session;
                    });
                    return {
                        ...prev,
                        chatSessions: newSessions,
                        isGenerating: false,
                        isGeneratingImage: false,
                        generatedImages: [{ id: Date.now() + Math.random(), prompt, url: imageUrl, timestamp: Date.now(), chatId: prev.activeChatId }, ...(prev.generatedImages || [])]
                    };
                });
            };

            return (
                <div className="flex h-app-screen w-full bg-[#f8f9fc] dark:bg-darkBg relative overflow-hidden">
                    {/* МОДАЛКА АВТОРИЗАЦИИ ПОВЕРХ ВСЕГО */}
                    <AuthModal state={state} updateState={updateState} />

                    <main className="flex-1 flex flex-col h-full w-full relative z-10 transition-transform">
                        {state.currentView === 'home' && <HomeView state={state} updateState={updateState} handleSendMessage={handleSendMessage} handleGenerateImage={handleGenerateImage} chatFileInputRef={chatFileInputRef} />}
                        {state.currentView === 'chat' && <ChatView state={state} updateState={updateState} handleSendMessage={handleSendMessage} handleGenerateImage={handleGenerateImage} messagesEndRef={messagesEndRef} chatFileInputRef={chatFileInputRef} />}
                        {state.currentView === 'settings' && <SettingsView state={state} updateState={updateState} />}
                        {state.currentView === 'pricing' && <PricingView state={state} updateState={updateState} />}
                        {state.currentView === 'profile-edit' && <ProfileEditView state={state} updateState={updateState} />}
                        {state.currentView === 'limits' && <LimitsView state={state} updateState={updateState} />}
                        {state.currentView === 'sys-prompt' && <SystemPromptView state={state} updateState={updateState} />}
                        {state.currentView === 'library' && <LibraryView state={state} updateState={updateState} />}
                    </main>
                    
                    <RightMenu state={state} updateState={updateState} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
