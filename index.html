        /* Высота "экрана", которая корректно учитывает адресную строку браузера

        .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }

    <script>
        // Пересчитываем реальную высоту вьюпорта (в CSS-переменную --vh) при любом
        // изменении размера: повороте экрана, появлении/скрытии клавиатуры на телефоне,
        // сворачивании адресной строки браузера. Работает без React, до его загрузки.
        (function () {
            function setAppHeight() {
                var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
                document.documentElement.style.setProperty('--vh', (h * 0.01) + 'px');
            }
            setAppHeight();
            window.addEventListener('resize', setAppHeight);
            window.addEventListener('orientationchange', setAppHeight);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setAppHeight);
                window.visualViewport.addEventListener('scroll', setAppHeight);
            }
        })();
    </script>

                return generateMockReply(messages, systemPrompt);
            }

            const delays = [1000, 2000, 4000, 8000, 16000];
            const contents = messages.map(msg => {
                const parts = [{ text: msg.content }];
                if (msg.image) {
                    const base64Data = msg.image.split(',')[1];
                    const mimeType = msg.image.match(/data:(.*?);base64/)[1] || 'image/jpeg';
                    parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                }
                return { role: msg.role === 'assistant' ? 'model' : 'user', parts };
            });

            const payload = { contents, systemInstruction: { parts: [{ text: systemPrompt }] } };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("HTTP " + response.status);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка генерации ответа.";
                } catch (error) {
                    if (i === 4) return "⚠️ Произошла ошибка при подключении к серверам ИИ. Пожалуйста, убедитесь, что вы ввели корректный API-ключ от Google Gemini.";
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const formatPrice = (price) => price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        // ==========================================
        // ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЙ (полностью офлайн)
        // ==========================================
        // Детерминированный хэш строки — из одного и того же запроса
        // всегда получается одна и та же картинка.
        const hashPromptSeed = (str) => {
            let hash = 0;
            const s = str || 'void code ai';
            for (let i = 0; i < s.length; i++) {
                hash = (hash << 5) - hash + s.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash) || 1;
        };

        // Псевдослучайное число в диапазоне от 0 до n на основе seed и "соли" —
        // без зависимости от Math.random(), чтобы результат был воспроизводим для одного запроса.
        const seededRandom = (seed, salt, n) => {
            const x = Math.sin(seed * 999 + salt * 37.7) * 10000;
            return (x - Math.floor(x)) * n;
        };

        // Генерирует уникальную абстрактную SVG-иллюстрацию по тексту запроса.
        // Работает полностью в браузере пользователя, без обращения к серверу —
        // поэтому "генерация изображений" доступна даже без интернета.
        const generateArtImage = (prompt) => {
            const seed = hashPromptSeed(prompt);
            const hue1 = Math.floor(seededRandom(seed, 1, 360));
            const hue2 = (hue1 + 55 + Math.floor(seededRandom(seed, 2, 140))) % 360;
            const hue3 = (hue1 + 190 + Math.floor(seededRandom(seed, 3, 120))) % 360;

            const blobs = Array.from({ length: 6 }).map((_, i) => {
                const cx = Math.floor(seededRandom(seed, 10 + i, 512));
                const cy = Math.floor(seededRandom(seed, 20 + i, 512));
                const r = 70 + Math.floor(seededRandom(seed, 30 + i, 130));
                const hue = [hue1, hue2, hue3][i % 3];
                const light = 45 + Math.floor(seededRandom(seed, 40 + i, 25));
                return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="hsl(${hue},85%,${light}%)" opacity="0.6" />`;
            }).join('');

            // Несколько тонких дуг поверх для "воид"-стилистики, перекликающейся с логотипом
            const arcs = Array.from({ length: 3 }).map((_, i) => {
                const cx = Math.floor(seededRandom(seed, 50 + i, 512));
                const cy = Math.floor(seededRandom(seed, 60 + i, 512));
                const r = 90 + Math.floor(seededRandom(seed, 70 + i, 90));
                const hue = [hue2, hue3, hue1][i % 3];
                return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="hsl(${hue},90%,80%)" stroke-width="2" opacity="0.35" />`;
            }).join('');

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
                <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="hsl(${hue1},70%,18%)" />
                        <stop offset="100%" stop-color="hsl(${hue3},65%,12%)" />
                    </linearGradient>
                    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="38" /></filter>
                </defs>
                <rect width="512" height="512" fill="url(#bg)" />
                <g filter="url(#blur)">${blobs}</g>
                <g>${arcs}</g>
            </svg>`;

            return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
        };

        // Достаёт из ответа ассистента блоки кода — они автоматически попадают
        // в "Библиотеку" как отдельные документы.
        const extractCodeDocuments = (content) => {
            if (!content) return [];
            const docs = [];
            const regex = /```(\w*)\n([\s\S]*?)```/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                const lang = (match[1] || 'text').trim() || 'text';
                const code = match[2].trim();
                if (code.length >= 25) {
                    const firstLine = code.split('\n')[0].slice(0, 48);
                    docs.push({ language: lang, content: code, title: firstLine || `Фрагмент кода (${lang})` });
                }
            }
            return docs;
        };

        // Разбивает ответ ассистента на "видимый текст" и блоки кода: в чат идёт
        // только текстовый комментарий, а сам код открывается в отдельном окне
        // просмотра (см. CodeViewerModal), чтобы не загромождать переписку.
        const splitMessageContent = (content) => {
            if (!content) return { text: '', blocks: [] };
            const blocks = [];
            const regex = /```(\w*)\n([\s\S]*?)```/g;
            let match;
            let lastIndex = 0;
            let text = '';
            while ((match = regex.exec(content)) !== null) {
                text += content.slice(lastIndex, match.index);
                const lang = (match[1] || 'text').trim() || 'text';
                const code = match[2].trim();
                if (code.length > 0) {
                    const firstLine = code.split('\n')[0].slice(0, 48);
                    blocks.push({ language: lang, content: code, title: firstLine || `Код (${lang})` });
                }
                lastIndex = regex.lastIndex;
            }
            text += content.slice(lastIndex);
            return { text: text.trim(), blocks };
        };

        // Строит HTML-документ для вкладки "Результат" — реальный живой предпросмотр
        // для HTML/CSS/JS. Для JS/TS скрипт-раннер НЕ встраивается строкой внутрь
        // HTML (чтобы в исходном коде страницы в принципе не могло быть текста,
        // способного запутать браузерный парсер) — вместо этого возвращается
        // отдельно и добавляется в iframe уже после его загрузки через DOM API
        // (document.createElement('script')) в CodeViewerModal ниже.
        const buildCodePreviewDoc = (code, language) => {
            const lang = (language || '').toLowerCase();
            if (lang === 'html' || /<!doctype/i.test(code) || /<html[\s>]/i.test(code)) {
                return { html: code, jsCode: null };
            }
            if (lang === 'css') {
                const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:system-ui,sans-serif;padding:24px;color:#1a1a2e}' + code + '</style></head><body><div class="preview-demo"><h1>Пример заголовка</h1><p>Демонстрационный текст для проверки стилей.</p><button>Кнопка</button></div></body></html>';
                return { html, jsCode: null };
            }
            if (lang === 'javascript' || lang === 'js' || lang === 'jsx' || lang === 'typescript' || lang === 'ts') {
                const html = '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="font-family:ui-monospace,monospace;padding:16px;font-size:13px;white-space:pre-wrap;color:#1a1a2e;"><div id="void-console-out"></div></body></html>';
                const jsCode = `
                    const out = document.getElementById('void-console-out');
                    const render = (color) => (...args) => {
                        const p = document.createElement('div');
                        p.style.color = color;
                        p.style.marginBottom = '4px';
                        p.textContent = args.map(a => { try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); } }).join(' ');
                        out.appendChild(p);
                    };
                    console.log = render('#1a1a2e');
                    console.warn = render('#b45309');
                    console.error = render('#dc2626');
                    try {
                        ${code}
                    } catch (e) { console.error('Ошибка выполнения: ' + e.message); }
                    if (!out.children.length) { out.textContent = 'Код выполнен без вывода в консоль.'; out.style.color = '#9ca3af'; }
                `;
                return { html, jsCode };
            }
            return null;
        };


        // ==========================================
        // СОХРАНЕНИЕ СЕССИИ (localStorage)
        // ==========================================
        // Ключ, под которым состояние аккаунта/чатов хранится в браузере.
        const STORAGE_KEY = 'voidcode_session_v1';

        // Поля, которые нужно запоминать между визитами/обновлениями страницы.
        // Всё, что не попало в этот список (модалки, флаги генерации и т.п.),
        // всегда стартует "с чистого листа" — так и должно быть.
        const PERSISTED_KEYS = [
            'user', 'userPlan', 'usedDailyLimits', 'usedWeeklyLimits', 'dailyLimitExceededAt', 'isDarkMode', 'notificationsEnabled',
            'chatSessions', 'activeChatId', 'selectedModelId', 'systemPromptState', 'lang',
            'generatedImages', 'generatedDocuments', 'aiAgents', 'activeAgentId',
            'walletBalance', 'walletTransactions'
        ];

        const loadPersistedState = () => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return (parsed && typeof parsed === 'object') ? parsed : null;
            } catch (e) {
                // Повреждённые данные в localStorage не должны ломать загрузку сайта
                console.warn('Не удалось прочитать сохранённую сессию:', e);
                return null;
            }
        };

        const savePersistedState = (state) => {
            try {
                const toSave = {};
                PERSISTED_KEYS.forEach(key => { toSave[key] = state[key]; });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            } catch (e) {
                console.warn('Не удалось сохранить сессию:', e);
            }
        };

        // ==========================================
        // ERROR BOUNDARY — защита от белого экрана
        // ==========================================
        // Если где-то в дереве компонентов случится ошибка рендера (например,
        // обращение к несуществующей иконке или полю), вместо мгновенного
        // белого экрана пользователь увидит понятное сообщение с кнопкой
        // перезагрузки, а сессия при этом не потеряется (она уже в localStorage).
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('Void Code AI: ошибка рендера', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex h-app-screen w-full items-center justify-center bg-[#f8f9fc] dark:bg-darkBg px-6">
                            <div className="max-w-md w-full text-center bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder rounded-[2rem] p-8 shadow-xl">
                                <h2 className="text-xl font-extrabold mb-2 dark:text-white">Что-то пошло не так</h2>
                                <p className="text-sm text-gray-500 mb-6">Произошла непредвиденная ошибка интерфейса. Ваши данные и вход в аккаунт сохранены — просто перезагрузите страницу.</p>
                                <button onClick={() => window.location.reload()} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-3.5 rounded-2xl shadow-lg transition-colors">
                                    Перезагрузить страницу
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // ==========================================
        // ИКОНКИ
        // ==========================================
        const Icons = {
            VoidLogo: ({ className = "w-7 h-7 md:w-8 md:h-8 text-[#5b32d4] dark:text-purple-400" }) => (

            ),
            TwoLines: ({ className = "w-6 h-6" }) => (
                <svg className={className} fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24" strokeLinecap="round"><path d="M4 9h16M4 15h16" /></svg>
            ),
            Sparkles: () => <svg className="w-5 h-5 text-[#5b32d4] dark:text-purple-400" fill="currentColor" viewBox="0 0 24 24"><path d="M10 2.5 C10 8 6 12 0.5 12 C6 12 10 16 10 21.5 C10 16 14 12 19.5 12 C14 12 10 8 10 2.5 Z" /><path d="M19 1 C19 4 17 6 14 6 C17 6 19 8 19 11 C19 8 21 6 24 6 C21 6 19 4 19 1 Z" /></svg>,
            Plus: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" /></svg>,
            History: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
            MessageSquare: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" /></svg>,
            Code: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" /></svg>,

        const BANKS = [
            { id: 'sber', name: 'Сбербанк', bg: '#21A038', text: 'white', initial: 'С' },

        // ==========================================
        // РЕНДЕР ТЕКСТА И ПЕЧАТЬ

        const copyToCb = (t) => { navigator.clipboard?.writeText(t); };

        function MessageRenderer({ content }) {
            const blocks = content.split(/(```[\s\S]*?```)/g);
            return (
                <div className="text-[15px] leading-relaxed break-words">
                    {blocks.map((block, index) => {
                        if (block.startsWith('```') && block.endsWith('```')) {
                            const lines = block.slice(3, -3).split('\n');
                            const lang = lines[0].trim();
                            const code = lines.slice(1).join('\n');
                            return (
                                <div key={index} className="my-4 bg-[#1e1e2e] rounded-2xl overflow-hidden shadow-sm border border-gray-800">
                                    <div className="flex justify-between items-center px-4 py-2 bg-[#2a2a3c] border-b border-gray-700/50">
                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">{lang || 'code'}</span>
                                        <button onClick={() => copyToCb(code)} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white transition-colors">
                                            <Icons.Code /> Копировать
                                        </button>
                                    </div>
                                    <div className="p-4 overflow-x-auto bg-[#1e1e2e]"><pre className="text-sm text-gray-200 font-mono"><code>{code}</code></pre></div>
                                </div>
                            );
                        }
                        const formattedText = block.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').map((line, i) => (
                            <React.Fragment key={i}><span dangerouslySetInnerHTML={{ __html: line }} />{i !== block.split('\n').length - 1 && <br />}</React.Fragment>
                        ));
                        return <span key={index}>{formattedText}</span>;
                    })}
                </div>
            );
        }

        function TypewriterMessage({ content, scrollRef }) {
            const [disp, setDisp] = useState('');
            const [typing, setTyping] = useState(true);
            useEffect(() => {
                const text = content || '';
                let i = 0;
                // Скорость печати подстраивается под длину ответа: короткие реплики
                // печатаются заметно и плавно, а длинные не растягиваются дольше
                // ~2.2с — крупные "рывки" из старой версии убраны совсем.
                const totalDuration = Math.min(2200, Math.max(450, text.length * 9));
                const tickMs = 16;
                const totalTicks = Math.max(1, Math.round(totalDuration / tickMs));
                const chunkSize = Math.max(1, Math.ceil(text.length / totalTicks));

                setDisp('');
                setTyping(true);
                const timer = setInterval(() => {
                    i += chunkSize;
                    setDisp(text.slice(0, i));
                    if (scrollRef && scrollRef.current && scrollRef.current.scrollIntoView) {
                        scrollRef.current.scrollIntoView({ behavior: 'auto', block: 'end' });
                    }
                    if (i >= text.length) {
                        clearInterval(timer);
                        setTyping(false);
                    }
                }, tickMs);
                return () => clearInterval(timer);
            }, [content]);
            return (
                <span>
                    <MessageRenderer content={disp} />
                    {typing && <span className="void-typing-cursor"></span>}
                </span>
            );
        }

                                            </div>

                                            {AI_MODELS.map(m => {

        // ==========================================
        // ЭКРАНЫ ПРИЛОЖЕНИЯ
        // ==========================================
        function HomeView({ state, updateState, handleSendMessage, handleGenerateImage, chatFileInputRef }) {

                                    <Icons.Sparkles className="w-6 h-6" />
                                </button>
                                <textarea 
                                    className="w-full pl-14 pr-16 py-5 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none resize-none max-h-32 min-h-[64px] text-[16px]"
                                    placeholder="Написать запрос..."
                                    value={state.inputValue}
                                    onChange={(e) => { 
                                        updateState({inputValue: e.target.value}); 
                                        e.target.style.height = 'auto'; 
                                        e.target.style.height = (e.target.scrollHeight < 128 ? e.target.scrollHeight : 128) + 'px'; 
                                    }}
                                    onKeyDown={(e) => { 
                                        if (e.key === 'Enter' && !e.shiftKey) { 
                                            e.preventDefault(); 
                                            handleSendMessage(); 
                                            e.target.style.height = 'auto'; 
                                        } 
                                    }}
                                    rows={1}
                                />
                                <button onClick={() => handleSendMessage()} disabled={(!state.inputValue.trim() && !state.selectedImage) || state.isGenerating} className="void-tap-target absolute right-2.5 sm:right-3 top-2.5 sm:top-3 bottom-2.5 sm:bottom-3 aspect-square bg-[#5b32d4] hover:bg-[#4a26b0] disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 text-white rounded-2xl flex items-center justify-center transition-all shadow-md">
                                    <Icons.ArrowUp />
                                </button>
                            </div>
                        </div>

                        <div className="flex gap-3 overflow-x-auto pb-2 mb-10 scrollbar-hide">
                            <button onClick={() => updateState({selectedModelId: 'flash_ext', currentView: 'chat'})} className="flex items-center gap-2 px-5 py-3 bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-300 rounded-2xl font-bold text-sm whitespace-nowrap"><Icons.MessageSquare className="w-4 h-4" /> Общение</button>
                            <button onClick={() => updateState({selectedModelId: 'pro', currentView: 'chat'})} className="flex items-center gap-2 px-5 py-3 bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder text-gray-600 dark:text-gray-300 rounded-2xl font-bold text-sm whitespace-nowrap hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors shadow-sm"><Icons.Code className="w-4 h-4" /> Код</button>
                            <button onClick={() => updateState({imageGenMode: true, currentView: 'chat'})} className="flex items-center gap-2 px-5 py-3 bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder text-gray-600 dark:text-gray-300 rounded-2xl font-bold text-sm whitespace-nowrap hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors shadow-sm"><Icons.Image className="w-4 h-4" /> Изображение</button>
                        </div>

                        <div className="mb-6 flex justify-between items-end">
                            <h2 className="text-xl font-bold tracking-tight dark:text-white">Популярные</h2>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
                            <div onClick={() => updateState({selectedModelId: 'flash_ext', currentView: 'chat'})} className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center mb-4"><Icons.MessageSquare /></div>
                                <h3 className="font-bold text-lg mb-1 dark:text-white">Умный чат</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Общайтесь на любые темы с AI.</p>
                            </div>
                            <div onClick={() => updateState({selectedModelId: 'pro', currentView: 'chat'})} className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-12 h-12 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-2xl flex items-center justify-center mb-4"><Icons.Code /></div>
                                <h3 className="font-bold text-lg mb-1 dark:text-white">Генератор кода</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Пишите и отлаживайте код.</p>
                            </div>
                            <div onClick={() => updateState({imageGenMode: true, currentView: 'chat'})} className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-12 h-12 bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 rounded-2xl flex items-center justify-center mb-4"><Icons.Image /></div>
                                <h3 className="font-bold text-lg mb-1 dark:text-white">Создать изображение</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 font-medium">Опишите идею — получите картинку.</p>
                            </div>
                        </div>

                        <div className="relative bg-[#1a0b38] overflow-hidden rounded-[2.5rem] p-8 md:p-10 text-white shadow-xl mt-6 cursor-pointer" onClick={() => updateState({currentView: 'pricing'})}>
                            <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-gradient-to-br from-purple-500/30 to-blue-500/20 blur-3xl -translate-y-1/2 translate-x-1/3 rounded-full"></div>
                            <div className="relative z-10 max-w-md">
                                <h2 className="text-2xl md:text-3xl font-extrabold mb-4 tracking-tight leading-tight">Разблокируйте весь потенциал AI</h2>
                                <p className="text-purple-200 text-sm md:text-base mb-8 leading-relaxed font-medium">Получите доступ к приоритетной поддержке и неограниченным возможностям.</p>
                                <button className="bg-white text-[#1a0b38] px-8 py-4 rounded-2xl font-bold text-sm hover:bg-gray-100 transition-colors flex items-center gap-3 shadow-lg">
                                    Попробовать Pro <Icons.VoidLogo className="w-5 h-5 text-[#1a0b38]" />
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // ОКНО ПРОСМОТРА КОДА (Код / Результат / Тесты)
        // ==========================================
        // Открывается из карточки в чате вместо того, чтобы печатать код прямо
        // в переписку — так диалог остаётся читаемым, а с кодом удобно работать
        // отдельно: смотреть исходник, живой результат или (в будущем) тесты.
        function CodeViewerModal({ block, onClose }) {
            const [tab, setTab] = useState('code');
            const [copied, setCopied] = useState(false);
            const preview = buildCodePreviewDoc(block.content, block.language);
            const iframeRef = useRef(null);

            // Скрипт для вкладки "Результат" добавляется в iframe уже ПОСЛЕ его
            // загрузки, через нативный DOM API (createElement('script') + textContent) —
            // а не строкой внутри HTML. Это гарантированно безопасно: здесь нет
            // текста, который мог бы быть распознан как открывающий/закрывающий тег.
            const handleIframeLoad = () => {
                if (!preview || !preview.jsCode || !iframeRef.current) return;
                try {
                    const doc = iframeRef.current.contentDocument;
                    if (!doc) return;
                    const scriptEl = doc.createElement('script');
                    scriptEl.textContent = preview.jsCode;
                    doc.body.appendChild(scriptEl);
                } catch (e) { /* iframe в песочнице — просто не покажем результат */ }
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(block.content).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1500);
                }).catch(() => {});
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-end sm:items-center justify-center sm:p-4 fade-in">
                    <div className="bg-white dark:bg-darkCard w-full sm:max-w-3xl h-[88vh] sm:h-[80vh] rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl border border-gray-100 dark:border-darkBorder flex flex-col overflow-hidden">
                        <div className="flex items-center justify-between p-4 sm:p-5 border-b border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-9 h-9 rounded-xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.Code className="w-4 h-4" /></div>
                                <div className="min-w-0">
                                    <p className="font-bold text-sm dark:text-white truncate">{block.title}</p>
                                    <p className="text-xs text-gray-400 uppercase font-semibold">{block.language}</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="void-tap-target p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center flex-shrink-0"><Icons.X /></button>
                        </div>

                        <div className="flex gap-2 px-4 sm:px-5 pt-3 flex-shrink-0">
                            <button onClick={() => setTab('code')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'code' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Code className="w-4 h-4" /> Код
                            </button>
                            <button onClick={() => setTab('result')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'result' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Eye className="w-4 h-4" /> Результат
                            </button>
                            <button onClick={() => setTab('tests')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'tests' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Flask className="w-4 h-4" /> Тесты
                            </button>
                        </div>

                        <div className="flex-1 overflow-hidden mt-3">
                            {tab === 'code' && (
                                <div className="h-full flex flex-col">
                                    <div className="flex justify-end px-4 sm:px-5 pb-2 flex-shrink-0">
                                        <button onClick={handleCopy} className="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">
                                            {copied ? 'Скопировано ✓' : 'Копировать'}
                                        </button>
                                    </div>
                                    <pre className="flex-1 overflow-auto mx-4 sm:mx-5 mb-4 sm:mb-5 p-4 bg-[#1a1a2e] rounded-2xl text-[13px] leading-relaxed text-gray-100 font-mono"><code>{block.content}</code></pre>
                                </div>
                            )}
                            {tab === 'result' && (
                                <div className="h-full px-4 sm:px-5 pb-4 sm:pb-5">
                                    {preview ? (
                                        <iframe ref={iframeRef} onLoad={handleIframeLoad} title="Результат" srcDoc={preview.html} sandbox="allow-scripts" className="w-full h-full rounded-2xl border border-gray-100 dark:border-darkBorder bg-white"></iframe>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-center px-6 bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-gray-100 dark:border-darkBorder">
                                            <Icons.Eye className="w-10 h-10 text-gray-300 dark:text-gray-600 mb-3" />
                                            <p className="text-gray-500 dark:text-gray-400 font-semibold text-sm">Живой предпросмотр недоступен для «{block.language}»</p>
                                            <p className="text-gray-400 dark:text-gray-600 text-xs mt-1">Предпросмотр работает для HTML, CSS и JavaScript</p>
                                        </div>
                                    )}
                                </div>
                            )}
                            {tab === 'tests' && (
                                <div className="h-full px-4 sm:px-5 pb-4 sm:pb-5">
                                    <div className="h-full flex flex-col items-center justify-center text-center px-6 bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-dashed border-gray-200 dark:border-gray-700">
                                        <Icons.Flask className="w-10 h-10 text-gray-300 dark:text-gray-600 mb-3" />
                                        <p className="text-gray-500 dark:text-gray-400 font-semibold text-sm">Раздел тестов в разработке</p>
                                        <p className="text-gray-400 dark:text-gray-600 text-xs mt-1 max-w-xs">Здесь появятся автоматические проверки для сгенерированного кода — заготовка уже готова к подключению</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatView({ state, updateState, handleSendMessage, handleGenerateImage, messagesEndRef, chatFileInputRef }) {
            const activeChat = state.chatSessions.find(c => c.id === state.activeChatId) || state.chatSessions[0];
            const messages = activeChat?.messages || [];
            const [activeCodeBlock, setActiveCodeBlock] = useState(null);

            return (
                <div className="flex flex-col h-full bg-white dark:bg-darkBg relative w-full max-w-full fade-in">
                    <TopHeader state={state} updateState={updateState} />
                    
                    <div className="flex-1 overflow-y-auto p-4 md:p-8 pb-32 scroll-smooth">
                        <div className="max-w-4xl mx-auto space-y-6">
                            {messages.length === 0 && (
                                <div className="text-center mt-20 fade-in">
                                    <Icons.VoidLogo className="w-16 h-16 mx-auto mb-6 text-[#5b32d4] dark:text-purple-400 opacity-20" />
                                    <h2 className="text-2xl font-bold text-gray-400 dark:text-gray-600 mb-2">Начните диалог</h2>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm">Отправьте сообщение</p>
                                </div>
                            )}
                            
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex gap-3 max-w-3xl ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                    {msg.role === 'assistant' && (
                                        <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50"><Icons.VoidLogo className="w-4 h-4 md:w-5 md:h-5 text-[#5b32d4] dark:text-purple-400"/></div>
                                    )}
                                    <div className={`p-4 md:p-5 rounded-3xl shadow-sm ${msg.role === 'user' ? 'bg-[#5b32d4] text-white rounded-tr-sm' : 'bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] text-gray-900 dark:text-gray-100 rounded-tl-sm'}`}>
                                        {msg.image && <img src={msg.image} alt="Upload" className="max-w-full md:max-w-sm rounded-xl mb-3 shadow-sm border border-gray-100 dark:border-gray-800" />}
                                        {msg.generatedImage ? (
                                            <div className="void-img-fadein">
                                                <img src={msg.generatedImage} alt="Сгенерированное изображение" className="max-w-full md:max-w-sm rounded-2xl mb-3 shadow-md border border-purple-100 dark:border-purple-900/40" />
                                                <div className="flex items-center justify-between gap-3 mb-1">
                                                    <MessageRenderer content={msg.content} />
                                                    <a href={msg.generatedImage} download={`void-code-ai-image-${idx}.svg`} className="flex-shrink-0 p-2 rounded-xl bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder text-[#5b32d4] dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-colors" title="Скачать изображение">
                                                        <Icons.Download className="w-4 h-4" />
                                                    </a>
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                {msg.isAnimated ? <TypewriterMessage content={msg.content} scrollRef={messagesEndRef} /> : <MessageRenderer content={msg.content} />}
                                                {msg.codeBlocks && msg.codeBlocks.length > 0 && (
                                                    <div className="mt-3 space-y-2">
                                                        {msg.codeBlocks.map((block, bIdx) => (
                                                            <button key={bIdx} onClick={() => setActiveCodeBlock(block)} className="w-full flex items-center gap-3 p-3 rounded-2xl bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder hover:border-[#5b32d4] transition-colors text-left shadow-sm">
                                                                <div className="w-9 h-9 rounded-xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.Code className="w-4 h-4" /></div>
                                                                <div className="min-w-0 flex-1">
                                                                    <p className="font-bold text-sm dark:text-white truncate">{block.title}</p>
                                                                    <p className="text-xs text-gray-400 uppercase font-semibold">{block.language} · открыть окно просмотра</p>
                                                                </div>
                                                                <Icons.ChevronRight className="w-4 h-4 text-gray-300 flex-shrink-0" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {state.isGenerating && state.isGeneratingImage && (
                                <div className="flex gap-3 max-w-3xl fade-in">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50"><Icons.VoidLogo className="w-4 h-4 md:w-5 md:h-5 text-[#5b32d4] dark:text-purple-400"/></div>
                                    <div className="bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] p-5 rounded-3xl rounded-tl-sm shadow-sm">
                                        <div className="relative w-40 h-40 md:w-48 md:h-48 rounded-2xl overflow-hidden void-img-shimmer flex items-center justify-center">
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="void-img-ring-outer w-16 h-16 rounded-full border-2 border-dashed border-[#5b32d4]/40 dark:border-purple-400/40"></div>
                                            </div>
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="void-img-ring-inner w-10 h-10 rounded-full border-2 border-dotted border-[#5b32d4]/70 dark:border-purple-300/70"></div>
                                            </div>
                                            <div className="void-img-pulse absolute">
                                                <Icons.VoidLogo className="w-8 h-8 text-[#5b32d4] dark:text-purple-300" />
                                            </div>
                                        </div>
                                        <p className="text-sm font-bold text-[#5b32d4] dark:text-purple-300 mt-3 text-center">Генерирую изображение...</p>
                                    </div>
                                </div>
                            )}
                            {state.isGenerating && !state.isGeneratingImage && (
                                <div className="flex gap-3 max-w-3xl">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50"><Icons.VoidLogo className="w-4 h-4 md:w-5 md:h-5 text-[#5b32d4] dark:text-purple-400"/></div>
                                    <div className="bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] p-5 rounded-3xl rounded-tl-sm flex items-center gap-1.5 shadow-sm">
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce"></div>
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} className="h-4" />
                        </div>
                    </div>

                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white dark:from-darkBg via-white dark:via-darkBg to-transparent pt-14 px-3 sm:px-4 md:px-8 z-20 pointer-events-none pb-safe">
                        <div className="relative max-w-4xl mx-auto pointer-events-auto">
                            <div className="flex gap-2 mb-2.5">
                                <button onClick={() => updateState({imageGenMode: false})} className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold transition-colors ${!state.imageGenMode ? 'bg-[#5b32d4] text-white shadow-sm' : 'bg-white dark:bg-darkCard text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <Icons.MessageSquare className="w-3.5 h-3.5" /> Текст
                                </button>
                                <button onClick={() => updateState({imageGenMode: true})} className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold transition-colors ${state.imageGenMode ? 'bg-[#5b32d4] text-white shadow-sm' : 'bg-white dark:bg-darkCard text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <Icons.Image className="w-3.5 h-3.5" /> Изображение
                                </button>
                            </div>
                            {state.selectedImage && (
                                <div className="absolute -top-16 left-4 bg-white dark:bg-darkCard p-1 rounded-xl shadow-lg border border-gray-200 dark:border-darkBorder fade-in group z-10">
                                    <img src={state.selectedImage} className="h-14 w-14 object-cover rounded-lg" />
                                    <button onClick={() => updateState({selectedImage: null})} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icons.X /></button>
                                </div>
                            )}
                            <div className={`flex items-end bg-white dark:bg-darkCard rounded-3xl border shadow-2xl focus-within:ring-4 transition-all relative ${state.imageGenMode ? 'border-[#5b32d4]/40 focus-within:ring-[#5b32d4]/10 focus-within:border-[#5b32d4]' : 'border-gray-200 dark:border-darkBorder focus-within:ring-[#5b32d4]/10 focus-within:border-[#5b32d4]'}`}>
                                <input type="file" ref={chatFileInputRef} onChange={(e) => {
                                    if(e.target.files[0]) {
                                        const r = new FileReader();
                                        r.onloadend = () => updateState({selectedImage: r.result});
                                        r.readAsDataURL(e.target.files[0]);
                                    }
                                }} accept="image/*" className="hidden" />
                                <button onClick={() => chatFileInputRef.current?.click()} className="void-tap-target absolute left-3 sm:left-4 bottom-2.5 sm:bottom-3 p-2.5 sm:p-2 text-[#5b32d4] dark:text-purple-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors rounded-full flex items-center justify-center">
                                    <Icons.Sparkles className="w-6 h-6" />
                                </button>
                                <textarea 
                                    className="w-full pl-14 pr-16 py-5 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none resize-none max-h-32 min-h-[64px] text-[16px]"
                                    placeholder={state.imageGenMode ? "Опишите изображение, которое хотите создать..." : "Написать запрос..."}
                                    value={state.inputValue}
                                    onChange={(e) => { 
                                        updateState({inputValue: e.target.value}); 
                                        e.target.style.height = 'auto'; 
                                        e.target.style.height = (e.target.scrollHeight < 128 ? e.target.scrollHeight : 128) + 'px'; 
                                    }}
                                    onKeyDown={(e) => { 
                                        if (e.key === 'Enter' && !e.shiftKey) { 
                                            e.preventDefault(); 
                                            state.imageGenMode ? handleGenerateImage() : handleSendMessage(); 
                                            e.target.style.height = 'auto'; 
                                        } 
                                    }}
                                    rows={1}
                                />
                                <button onClick={() => state.imageGenMode ? handleGenerateImage() : handleSendMessage()} disabled={(!state.inputValue.trim() && !state.selectedImage) || state.isGenerating} className="void-tap-target absolute right-2.5 sm:right-3 top-2.5 sm:top-3 bottom-2.5 sm:bottom-3 aspect-square bg-[#5b32d4] hover:bg-[#4a26b0] disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 text-white rounded-2xl flex items-center justify-center transition-all shadow-md"><Icons.ArrowUp /></button>
                            </div>
                        </div>
                    </div>

                    {activeCodeBlock && <CodeViewerModal block={activeCodeBlock} onClose={() => setActiveCodeBlock(null)} />}
                </div>
            );
        }

        function SettingsView({ state, updateState }) {
            return (
                <div className="flex-1 overflow-y-auto pb-12 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-2xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => goBack(state, updateState, 'home')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Настройки</h2>

                        <div className="space-y-6">

                                <ListItem icon={Icons.Wallet} label="Кошелёк" extra={<span className="text-xs font-bold text-[#5b32d4] dark:text-purple-400 bg-purple-50 dark:bg-purple-900/30 px-3 py-1 rounded-lg border border-purple-100 dark:border-purple-900/50">{formatMoney(state.walletBalance || 0)} ₽</span>} onClick={() => updateState({currentView: 'wallet'})} />
                            </div>
                            
                            <div className="bg-white dark:bg-darkCard rounded-[2rem] p-2 shadow-sm border border-gray-100 dark:border-darkBorder">
                                <div className="flex items-center justify-between p-4 border-b border-gray-50 dark:border-gray-800/50 cursor-pointer hover:bg-gray-50/80 dark:hover:bg-gray-800/50 rounded-2xl transition-colors" onClick={() => updateState({notificationsEnabled: !state.notificationsEnabled})}>
                                    <div className="flex items-center gap-4"><div className="p-2 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-xl"><Icons.Bell /></div><span className="font-bold text-[15px] dark:text-white">Уведомления</span></div>
                                    <div className={`w-12 h-7 rounded-full p-1 transition-colors flex items-center ${state.notificationsEnabled ? 'bg-[#5b32d4]' : 'bg-gray-200 dark:bg-gray-700'}`}><div className={`w-5 h-5 bg-white rounded-full transition-transform ${state.notificationsEnabled ? 'translate-x-5' : 'translate-x-0'}`}></div></div>

                                    <div className="flex items-center gap-4"><div className="p-2 bg-gray-50 dark:bg-gray-800 rounded-xl"><Icons.Moon /></div><span className="font-bold text-[15px] dark:text-white">Темная тема</span></div>
                                    <div className={`w-12 h-7 rounded-full p-1 transition-colors flex items-center ${state.isDarkMode ? 'bg-[#5b32d4]' : 'bg-gray-200 dark:bg-gray-700'}`}><div className={`w-5 h-5 bg-white rounded-full transition-transform ${state.isDarkMode ? 'translate-x-5' : 'translate-x-0'}`}></div></div>

        // ==========================================
        // КОШЕЛЁК — модалка пополнения баланса
        // ==========================================
        // Переиспользуется и на отдельном экране "Кошелёк", и внутри счёта за
        // сборку агента, и при автоматической приостановке из-за нехватки средств.
        function WalletTopUpModal({ state, updateState, onClose, onSuccess, reason }) {
            const PRESETS = [500, 1000, 2000, 5000];
            const [amount, setAmount] = useState(1000);
            const [customAmount, setCustomAmount] = useState('');
            const [method, setMethod] = useState('card');
            const [cardNumber, setCardNumber] = useState('');
            const [cardExpiry, setCardExpiry] = useState('');
            const [cardCvc, setCardCvc] = useState('');
            const [cryptoTxId, setCryptoTxId] = useState('');
            const [errors, setErrors] = useState({});
            const [success, setSuccess] = useState(false);

            const finalAmount = customAmount.trim() !== '' ? (parseInt(customAmount.replace(/\D/g, '')) || 0) : amount;

            const validate = () => {
                const e = {};
                if (!finalAmount || finalAmount < 100) e.amount = 'Минимальная сумма пополнения — 100 ₽';
                if (method === 'card') {
                    const digits = cardNumber.replace(/\s+/g, '');
                    if (!/^\d{16,19}$/.test(digits)) e.cardNumber = 'Введите корректный номер карты';
                    if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExpiry.trim())) e.cardExpiry = 'Формат ММ/ГГ';
                    if (!/^\d{3,4}$/.test(cardCvc.trim())) e.cardCvc = 'Введите CVC';
                } else if (method === 'crypto') {
                    if (!cryptoTxId.trim() || cryptoTxId.trim().length < 6) e.cryptoTxId = 'Укажите хэш транзакции после перевода';
                }
                return e;
            };

            const handleConfirm = () => {
                const e = validate();
                if (Object.keys(e).length > 0) { setErrors(e); return; }
                setErrors({});
                const now = Date.now();
                const methodLabel = method === 'card' ? 'картой' : method === 'sbp' ? 'через СБП' : 'криптовалютой';
                updateState({
                    walletBalance: (state.walletBalance || 0) + finalAmount,
                    walletTransactions: [{ id: 'tx' + now, type: 'topup', amount: finalAmount, description: `Пополнение баланса ${methodLabel}`, timestamp: now }, ...(state.walletTransactions || [])]
                });
                setSuccess(true);
                setTimeout(() => { onSuccess && onSuccess(finalAmount); }, 1100);
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-start sm:items-center justify-center p-3 sm:p-4 overflow-y-auto fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative my-6 sm:my-0">
                        <button onClick={onClose} className="void-tap-target absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>

                        {success ? (
                            <div className="text-center py-10 fade-in">
                                <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check className="w-8 h-8 text-white" /></div>
                                <h3 className="text-xl font-extrabold dark:text-white mb-1">Баланс пополнен</h3>
                                <p className="text-gray-500 dark:text-gray-400 text-sm">+{formatMoney(finalAmount)} ₽ на кошельке</p>
                            </div>
                        ) : (
                            <>
                                <div className="w-12 h-12 bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center mb-4"><Icons.Wallet /></div>
                                <h2 className="text-xl font-extrabold dark:text-white mb-1">Пополнить баланс</h2>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-6">{reason || 'Деньги пойдут на оплату токенов и услуг сервиса.'}</p>

                                <div className="grid grid-cols-4 gap-2 mb-3">
                                    {PRESETS.map(p => (
                                        <button key={p} onClick={() => { setAmount(p); setCustomAmount(''); setErrors(prev => ({ ...prev, amount: null })); }} className={`py-2.5 rounded-xl text-sm font-bold border transition-colors ${customAmount === '' && amount === p ? 'bg-[#5b32d4] text-white border-[#5b32d4]' : 'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-[#5b32d4]'}`}>{p}₽</button>
                                    ))}
                                </div>
                                <div className="mb-5">
                                    <input type="text" inputMode="numeric" value={customAmount} onChange={e => { setCustomAmount(e.target.value.replace(/\D/g, '')); setErrors(prev => ({ ...prev, amount: null })); }} placeholder="Своя сумма, ₽" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-bold dark:text-white focus:outline-none ${errors.amount ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                    {errors.amount && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.amount}</p>}
                                </div>

                                <div className="flex gap-2 mb-5">
                                    {[{ id: 'card', label: 'Карта' }, { id: 'sbp', label: 'СБП' }, { id: 'crypto', label: 'Крипто' }].map(m => (
                                        <button key={m.id} onClick={() => setMethod(m.id)} className={`flex-1 py-2.5 rounded-xl text-sm font-bold border transition-colors ${method === m.id ? 'bg-[#efecf9] dark:bg-purple-900/30 border-[#5b32d4] text-[#5b32d4] dark:text-purple-300' : 'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300'}`}>{m.label}</button>
                                    ))}
                                </div>

                                {method === 'card' && (
                                    <div className="space-y-3 mb-2">
                                        <div>
                                            <input type="text" value={cardNumber} onChange={e => { setCardNumber(e.target.value); setErrors(prev => ({ ...prev, cardNumber: null })); }} placeholder="Номер карты" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardNumber ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                            {errors.cardNumber && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardNumber}</p>}
                                        </div>
                                        <div className="flex gap-3">
                                            <div className="flex-1">
                                                <input type="text" value={cardExpiry} onChange={e => { setCardExpiry(e.target.value); setErrors(prev => ({ ...prev, cardExpiry: null })); }} placeholder="ММ/ГГ" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardExpiry ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {errors.cardExpiry && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardExpiry}</p>}
                                            </div>
                                            <div className="flex-1">
                                                <input type="password" value={cardCvc} onChange={e => { setCardCvc(e.target.value); setErrors(prev => ({ ...prev, cardCvc: null })); }} placeholder="CVC" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardCvc ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {errors.cardCvc && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardCvc}</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {method === 'crypto' && (
                                    <div className="mb-2">
                                        <input type="text" value={cryptoTxId} onChange={e => { setCryptoTxId(e.target.value); setErrors(prev => ({ ...prev, cryptoTxId: null })); }} placeholder="Хэш транзакции после перевода" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cryptoTxId ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                        {errors.cryptoTxId && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cryptoTxId}</p>}
                                    </div>
                                )}
                                {method === 'sbp' && <p className="text-xs text-gray-400 mb-2">После нажатия «Пополнить» откроется приложение вашего банка для подтверждения перевода.</p>}

                                <button onClick={handleConfirm} className="w-full mt-4 py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors">
                                    Пополнить на {formatMoney(finalAmount)} ₽
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function PricingView({ state, updateState }) {
            // Локальные поля формы оплаты. Пока пользователь не заполнит их
            // корректно, кнопка "Оплатить" не пускает его дальше — тариф
            // не активируется и currentView не переключается.
            const [cardNumber, setCardNumber] = useState('');
            const [cardExpiry, setCardExpiry] = useState('');
            const [cardCvc, setCardCvc] = useState('');
            const [cryptoTxId, setCryptoTxId] = useState('');
            const [paymentErrors, setPaymentErrors] = useState({});

            // ==========================================
            // СКАНЕР КАРТЫ ЧЕРЕЗ КАМЕРУ
            // ==========================================
            const [showScanner, setShowScanner] = useState(false);
            const [scanStatus, setScanStatus] = useState('requesting'); // requesting -> scanning -> done
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const scanTimeoutRef = useRef(null);

            const stopCameraStream = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                if (scanTimeoutRef.current) {
                    clearTimeout(scanTimeoutRef.current);
                    scanTimeoutRef.current = null;
                }
            };

            const closeScanner = () => {
                stopCameraStream();
                setShowScanner(false);
                setScanStatus('requesting');
            };

            // Отключаем камеру, если пользователь уходит с экрана оплаты
            useEffect(() => () => stopCameraStream(), []);

            const openCardScanner = async () => {
                if (state.selectedMethod !== 'card') return;
                setShowScanner(true);
                setScanStatus('requesting');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream;
                    setScanStatus('scanning');
                    // Даём React отрендерить <video>, затем подключаем поток
                    setTimeout(() => {
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    }, 50);

                    // Имитируем распознавание карты камерой (в реальном сервисе здесь
                    // работал бы OCR по видеопотоку) — через ~2.5с "находим" карту.
                    scanTimeoutRef.current = setTimeout(() => {
                        const digits = Array.from({ length: 16 }, (_, i) => i === 0 ? '4' : Math.floor(Math.random() * 10)).join('');
                        const formatted = digits.match(/.{1,4}/g).join(' ');
                        const now = new Date();
                        const expMonth = String(1 + Math.floor(Math.random() * 12)).padStart(2, '0');
                        const expYear = String((now.getFullYear() + 2 + Math.floor(Math.random() * 3)) % 100).padStart(2, '0');

                        setCardNumber(formatted);
                        setCardExpiry(`${expMonth}/${expYear}`);
                        setPaymentErrors(prev => ({ ...prev, cardNumber: null, cardExpiry: null }));
                        setScanStatus('done');
                        scanTimeoutRef.current = setTimeout(() => closeScanner(), 900);
                    }, 2500);
                } catch (err) {
                    setShowScanner(false);
                    alert('Не удалось получить доступ к камере. Проверьте разрешения браузера или введите данные карты вручную.');
                }
            };

            const validateCard = () => {
                const errors = {};
                const digits = cardNumber.replace(/\s+/g, '');
                if (!/^\d{16,19}$/.test(digits)) errors.cardNumber = 'Введите корректный номер карты (16 цифр)';
                if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExpiry.trim())) errors.cardExpiry = 'Формат ММ/ГГ';
                if (!/^\d{3,4}$/.test(cardCvc.trim())) errors.cardCvc = 'Введите CVC (3-4 цифры)';
                return errors;
            };

            const validateCrypto = () => {
                const errors = {};
                if (!cryptoTxId.trim() || cryptoTxId.trim().length < 6) {
                    errors.cryptoTxId = 'Укажите хэш транзакции или ID перевода после отправки средств';
                }
                return errors;
            };

            const handleConfirmPayment = () => {
                // Защита: неавторизованный пользователь не может оформить подписку.
                // Просто на случай, если он как-то попал на этот экран без входа.
                if (!state.user) {
                    updateState({ showAuthModal: true, authTab: 'register' });
                    return;
                }

                const price = state.billingCycle === 'month' ? state.checkoutPlan.priceMonth : state.checkoutPlan.priceYear;

                if (state.selectedMethod === 'wallet') {
                    const balance = state.walletBalance || 0;
                    if (balance < price) {
                        alert(`Недостаточно средств на балансе. Не хватает ${formatMoney(price - balance)} ₽ — пополните кошелёк и попробуйте снова.`);
                        return;
                    }
                    const now = Date.now();
                    updateState({
                        walletBalance: balance - price,
                        walletTransactions: [{ id: 'tx' + now, type: 'subscription', amount: -price, description: `Подписка ${state.checkoutPlan.title} (${state.billingCycle === 'month' ? 'месяц' : 'год'})`, timestamp: now }, ...(state.walletTransactions || [])],
                        userPlan: state.checkoutPlan.id, checkoutPlan: null, currentView: 'settings', usedDailyLimits: 0
                    });
                    alert('Подписка успешно оформлена и оплачена с баланса кошелька!');
                    return;
                }

                let errors = {};
                if (state.selectedMethod === 'card') errors = validateCard();
                else if (state.selectedMethod === 'crypto') errors = validateCrypto();
                // Для СБП дополнительных полей не требуется — банк уже выбран заранее

                if (Object.keys(errors).length > 0) {
                    setPaymentErrors(errors);
                    return;
                }
                setPaymentErrors({});
                updateState({ userPlan: state.checkoutPlan.id, checkoutPlan: null, currentView: 'settings', usedDailyLimits: 0 });
                alert('Подписка успешно оформлена!');
            };

            const PRICING_PLANS = [
                { id: 'free', title: 'Free', subtitle: 'Бесплатный доступ. Идеально для знакомства с Void Code AI и базовых задач.', priceMonth: 0, priceYear: 0, features: ["Умный чат с AI", "Обучающие материалы", "Генератор кода — до 10 запросов", "Стандартная скорость", "Базовые модели AI"] },
                { id: 'plus', title: 'Plus', subtitle: 'Больше мощностей и меньше ограничений для работы с кодом.', priceMonth: 350, priceYear: 3500, features: ["Безлимитный чат", "Генератор кода — до 200 запросов", "Приоритетная скорость", "Доступ к мощным моделям"] },
                { id: 'pro', title: 'Pro', subtitle: 'Максимум возможностей для разработчиков, фрилансеров и команд.', priceMonth: 1000, priceYear: 12000, features: ["Безлимитно всё", "Максимальная скорость ответов", "Приоритетная поддержка", "Доступ к самым мощным моделям"] },
                { id: 'pro_plus', title: 'Pro+', subtitle: 'Все возможности Void Code Pro для компаний и масштабных проектов.', priceMonth: 10000, priceYear: 100000, features: ["Всё из тарифа Pro", "Админ-панель и доступы", "Личный менеджер", "API интеграция"] }
            ];

            if (state.checkoutPlan) {
                const price = state.billingCycle === 'month' ? state.checkoutPlan.priceMonth : state.checkoutPlan.priceYear;
                const period = state.billingCycle === 'month' ? 'в месяц' : 'в год';

                if (state.paymentStep === 'form') {
                    return (
                        <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                            <div className="px-4 py-8 max-w-2xl mx-auto">
                                <div className="flex items-center mb-8 gap-4">
                                    <button onClick={() => updateState({paymentStep: 'select'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                                    <h2 className="text-2xl font-bold dark:text-white">Данные для оплаты</h2>
                                </div>
                                <div className="bg-white dark:bg-darkCard p-8 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-xl mb-6">
                                    <div className="flex justify-between items-center mb-8 border-b border-gray-100 dark:border-gray-800 pb-4">
                                        <div>
                                            <p className="text-sm font-bold text-gray-500">Сумма к оплате</p>
                                            <p className="text-3xl font-extrabold text-[#5b32d4] dark:text-purple-400 mt-1">{formatPrice(price)}₽ <span className="text-sm text-gray-500 font-medium">/ {period.replace('в ', '')}</span></p>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={openCardScanner}
                                            disabled={state.selectedMethod !== 'card'}
                                            title={state.selectedMethod === 'card' ? 'Отсканировать карту камерой' : ''}
                                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${state.selectedMethod === 'card' ? 'bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 hover:bg-purple-100 dark:hover:bg-purple-900/40 cursor-pointer' : 'bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 cursor-default'}`}
                                        >
                                            {state.selectedMethod === 'card' && <Icons.Card />}
                                            {state.selectedMethod === 'sbp' && <Icons.SBP />}
                                            {state.selectedMethod === 'crypto' && <Icons.Crypto />}
                                            {state.selectedMethod === 'wallet' && <Icons.Wallet />}
                                        </button>
                                    </div>

                                    {state.selectedMethod === 'card' && (
                                        <div className="space-y-4 fade-in">
                                            <div>
                                                <div className="flex items-center justify-between mb-1.5">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 block">Номер карты</label>
                                                    <button type="button" onClick={openCardScanner} className="flex items-center gap-1 text-xs font-bold text-[#5b32d4] dark:text-purple-400 hover:underline mr-1">
                                                        <Icons.Camera className="w-3.5 h-3.5" /> Сканировать камерой
                                                    </button>
                                                </div>
                                                <input type="text" value={cardNumber} onChange={e => { setCardNumber(e.target.value); setPaymentErrors(prev => ({...prev, cardNumber: null})); }} placeholder="0000 0000 0000 0000" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono focus:outline-none ${paymentErrors.cardNumber ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {paymentErrors.cardNumber && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cardNumber}</p>}
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Срок действия</label>
                                                    <input type="text" value={cardExpiry} onChange={e => { setCardExpiry(e.target.value); setPaymentErrors(prev => ({...prev, cardExpiry: null})); }} placeholder="ММ/ГГ" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono focus:outline-none ${paymentErrors.cardExpiry ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                    {paymentErrors.cardExpiry && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cardExpiry}</p>}
                                                </div>
                                                <div className="flex-1">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">CVC</label>
