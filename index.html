        /* Высота "экрана", которая корректно учитывает адресную строку браузера
           и появление виртуальной клавиатуры на телефоне. 100vh на мобильных

           могла уезжать за пределы экрана или под клавиатуру. html/body зафиксированы

        .h-app-screen {
            height: 100vh;
            height: 100dvh;
            height: calc(var(--vh, 1vh) * 100);
            /* Плавно сглаживаем скачки высоты при появлении/скрытии клавиатуры на
               телефоне, чтобы нижняя панель ввода не "прыгала" резко, а плавно

            transition: height 0.25s cubic-bezier(0.4, 0, 0.2, 1);

        /* Логотип на главном экране: короткая приветственная анимация (не длиннее

        @keyframes voidLogoIntroPulse {

            45% { transform: scale(1.08) rotate(3deg); opacity: 1; }
            70% { transform: scale(0.97) rotate(-1deg); }
            100% { transform: scale(1) rotate(0deg); }

        /* Всплытие заголовка и подзаголовка на главном экране — тоже проигрывается

        @media (max-width: 767px) {

           даже если env(safe-area-inset-bottom) не поддерживается браузером. */
        .pb-safe { padding-bottom: calc(1rem + env(safe-area-inset-bottom, 0px)); }
        @media (min-width: 640px) { .pb-safe { padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px)); } }

    <script>
        // Пересчитываем реальную высоту вьюпорта (в CSS-переменную --vh) при любом
        // изменении размера: повороте экрана, появлении/скрытии клавиатуры на телефоне,
        // сворачивании адресной строки браузера. Работает без React, до его загрузки.
        // html/body зафиксированы (position: fixed) в CSS, поэтому браузер не может сам
        // "подскроллить" документ при фокусе на поле ввода — это убирает двойной скачок,
        // когда наш пересчёт высоты и нативный скролл браузера накладывались друг на друга.
        (function () {
            var rafId = null;
            function applyHeight() {
                rafId = null;
                var h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
                document.documentElement.style.setProperty('--vh', (h * 0.01) + 'px');
                // На всякий случай гасим остаточный нативный скролл документа.
                if (window.scrollX !== 0 || window.scrollY !== 0) window.scrollTo(0, 0);
            }
            function setAppHeight() {
                // Батчим частые события visualViewport (они летят пачками во время
                // анимации клавиатуры) в один пересчёт за кадр — вместе с CSS-переходом
                // на .h-app-screen это даёт плавный, а не рваный скачок.
                if (rafId !== null) return;
                rafId = requestAnimationFrame(applyHeight);
            }
            applyHeight();
            window.addEventListener('resize', setAppHeight);
            window.addEventListener('orientationchange', setAppHeight);
            if (window.visualViewport) {
                window.visualViewport.addEventListener('resize', setAppHeight);
                window.visualViewport.addEventListener('scroll', setAppHeight);
            }
        })();
    </script>

        ];

        const BLOCK_CATEGORIES = ['Триггеры', 'Действия', 'AI'];
        const getBlockDef = (blockId) => BLOCK_LIBRARY.find(b => b.id === blockId);

        // ==========================================
        // КОШЕЛЁК И ОПЛАТА АГЕНТОВ
        // ==========================================
        // Сборка агента (по блокам или через чат) — разовая платная услуга:
        // это комиссия сервиса за удобный конструктор. Дальше агент, пока
        // активен, ежедневно расходует токены моделей — эту сумму (уже
        // с нашей наценкой 30%) мы автоматически списываем с кошелька.
        const AGENT_BILLING_INTERVAL_MS = 24 * 60 * 60 * 1000; // раз в сутки
        const AGENT_SERVICE_MARGIN = 0.3; // наша комиссия поверх стоимости токенов

        // Разовая стоимость сборки — зависит от сложности схемы: сколько блоков,
        // особенно AI-блоков (они дороже, т.к. используют модели), и сколько связей.
        const calculateAgentPrice = (nodes, edges) => {
            const BASE_PRICE = 299;
            const AI_BLOCK_PRICE = 149;
            const REGULAR_BLOCK_PRICE = 49;
            const EDGE_PRICE = 15;
            let price = BASE_PRICE;
            (nodes || []).forEach((n, i) => {
                const block = getBlockDef(n.blockId);
                if (!block) return;
                if (block.isAI) price += AI_BLOCK_PRICE;
                else if (i > 0) price += REGULAR_BLOCK_PRICE;
            });
            price += (edges || []).length * EDGE_PRICE;
            return Math.round(price / 10) * 10;
        };

        // Ориентировочный ежедневный расход токенов агента, в рублях,
        // уже с учётом нашей комиссии — списывается автоматически раз в сутки.
        const calculateAgentDailyCost = (nodes) => {
            const list = nodes || [];
            const aiCount = list.filter(n => getBlockDef(n.blockId)?.isAI).length;
            const otherCount = Math.max(0, list.length - aiCount);
            const rawTokenCost = aiCount * 28 + otherCount * 4;
            return Math.max(10, Math.round(rawTokenCost * (1 + AGENT_SERVICE_MARGIN)));
        };

        // Размеры карточки блока на канвасе — используются и при расчёте
        // положения портов, и при расчёте линий-соединений.
        const AGENT_NODE_W = 232;
        const AGENT_NODE_H = 96;

        // Пустой шаблон нового агента — сразу с одним блоком AI Agent в центре,
        // чтобы начинающий пользователь видел с чего начать, а не пустой холст.
        // isPaid/status появились вместе с системой кошелька: агент создаётся
        // как неоплаченный черновик и становится активным только после оплаты.
        const createBlankAgentDraft = () => ({
            id: null,
            name: 'Мой агент',
            nodes: [{
                id: 'n' + Date.now(),
                blockId: 'ai_agent',
                x: 420, y: 200,
                name: 'AI Agent',
                description: 'Главный агент, который обрабатывает запросы',
                config: {}
            }],
            edges: [],
            isPaid: false,
            status: 'draft' // draft (не сохранён) -> unpaid (сохранён, ждёт оплаты) -> active -> suspended
        });

        // ==========================================
        // КОШЕЛЁК И БИЛЛИНГ
        // ==========================================
        // Разовая плата за сборку агента (и через блоки, и через чат — одинаково).
        const AGENT_BUILD_FEE = 990;
        // Ориентировочная стоимость токенов за один тестовый прогон, на блок агента.
        const TOKEN_CHARGE_PER_NODE = 4;
        // Наша доля от стоимости токенов (остальное уходит провайдеру модели).
        const PLATFORM_MARGIN_PERCENT = 30;
        // Порог, при котором показываем предупреждение о низком балансе.
        const LOW_BALANCE_THRESHOLD = 150;

        const formatMoney = (n) => (n < 0 ? '−' : '') + formatPrice(Math.abs(Math.round(n)));

        // ==========================================
        // НАВИГАЦИЯ "НАЗАД" С ПАМЯТЬЮ ЭКРАНОВ
        // ==========================================
        // App.updateState автоматически ведёт стек посещённых экранов (см. App).
        // goBack достаёт из этого стека предыдущий экран — так что, например,
        // выйдя из "Кошелька", пользователь возвращается туда, откуда зашёл
        // (чат, конструктор агентов, главная — куда угодно), а не всегда на Главную.
        const goBack = (state, updateState, fallback = 'home') => {
            const hist = state.viewHistory || [];
            if (hist.length > 0) {
                const target = hist[hist.length - 1];
                updateState({ currentView: target, viewHistory: hist.slice(0, -1) });
            } else {
                updateState({ currentView: fallback });
            }
        };


        // ==========================================
        // ТЕСТОВЫЙ РЕЖИМ ЧАТА (пока не подключены реальные AI-модели)
        // ==========================================
        // MOCK_MODE = true — чат отвечает заранее заготовленными правдоподобными
        // ответами вместо обращения к реальному AI-провайдеру (ключ ниже ещё не
        // настоящий, поэтому запросы к нему всё равно всегда падают с ошибкой).
        // Как только появится рабочий ключ провайдера — переключите на false,
        // и callGeminiAI начнёт использовать реальный API ниже как и раньше.
        const MOCK_MODE = true;

        const MOCK_GREETING_WORDS = ['привет', 'здравств', 'хай', 'добрый день', 'доброе утро', 'добрый вечер', 'ку', 'йо'];
        const MOCK_CODE_WORDS = ['код', 'функци', 'компонент', 'script', 'html', 'css', 'javascript', 'python', 'верстк', 'сверста', 'напиши код', 'алгоритм', 'программ'];

        // Заготовка кода для модели Void Code Pro — карточка с живым HTML/CSS/JS,
        // чтобы удобно проверить окно просмотра кода (вкладки "Код" и "Результат").
        const MOCK_PRO_CODE_EXAMPLE = "```html\n<!DOCTYPE html>\n<html>\n<head>\n<style>\n  body { font-family: system-ui, sans-serif; margin: 0; padding: 40px; background: linear-gradient(135deg, #efecf9, #f8f9fc); display: flex; align-items: center; justify-content: center; min-height: 100vh; }\n  .card { background: white; border-radius: 24px; padding: 32px; box-shadow: 0 10px 40px rgba(91,50,212,0.15); max-width: 320px; text-align: center; }\n  .card h2 { color: #1a1a2e; margin: 0 0 8px; }\n  .card p { color: #6b7280; margin: 0 0 20px; font-size: 14px; }\n  .card button { background: #5b32d4; color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: bold; cursor: pointer; }\n  .card button:hover { background: #4a26b0; }\n</style>\n</head>\n<body>\n  <div class=\"card\">\n    <h2>Готово! \ud83c\udf89</h2>\n    <p>Пример карточки, собранной по вашему запросу</p>\n    <button onclick=\"alert('Привет от Void Code Pro!')\">Нажми меня</button>\n  </div>\n```";

        const generateMockReply = (messages, systemPrompt, modelId) => {
            const lastUser = [...messages].reverse().find(m => m.role === 'user');
            const text = (lastUser?.content || '').toLowerCase();

            // Void Code Pro создан именно для кода — в тестовом режиме он всегда
            // отвечает готовым примером, чтобы удобно проверить окно просмотра кода.
            if (modelId === 'pro') {
                return `Собрал для вас карточку — открой окно просмотра ниже, там доступны и код, и живой результат.\n\n${MOCK_PRO_CODE_EXAMPLE}`;
            }

            if (MOCK_CODE_WORDS.some(w => text.includes(w))) {
                return "```javascript\nfunction greet(name) {\n  return `Привет, ${name}! Рад помочь.`;\n}\n\nconsole.log(greet('мир'));\n```\n\nЭто демонстрационный пример кода — реальные AI-модели ещё не подключены к Void Code AI, поэтому сейчас чат работает в тестовом режиме. Когда модель будет подключена, здесь появится настоящий код под ваш конкретный запрос.";
            }
            if (MOCK_GREETING_WORDS.some(w => text.includes(w))) {
                return 'Привет! 👋 Сейчас я отвечаю в тестовом режиме — реальные AI-модели ещё не подключены к серверу, поэтому это заготовленный ответ для проверки интерфейса. Диалог, анимация печати и вся логика чата уже полностью рабочие.';
            }

            const fallbacks = [
                'Это тестовый ответ: реальная AI-модель ещё не подключена к серверу, поэтому чат сейчас работает в демонстрационном режиме. Как только провайдер будет подключён, здесь появятся настоящие ответы.',
                `Понял ваш запрос: «${(lastUser?.content || '').slice(0, 70)}». Пока это заготовленный (тестовый) ответ для проверки интерфейса — сама модель ещё не подключена.`,
                'Хороший вопрос! Сейчас чат работает без подключённой модели, поэтому отвечаю заранее подготовленным текстом — но весь интерфейс, история сообщений и анимация уже рабочие и готовы к реальным ответам.'
            ];
            return fallbacks[hashPromptSeed(text || 'default') % fallbacks.length];
        };

        const callGeminiAI = async (messages, systemPrompt, modelId) => {
            if (MOCK_MODE) {
                // Небольшая пауза "на размышление", чтобы интерфейс выглядел живо,
                // но без долгих реальных сетевых задержек.
                await new Promise(resolve => setTimeout(resolve, 700 + Math.random() * 700));
                return generateMockReply(messages, systemPrompt, modelId);
            }

            const delays = [1000, 2000, 4000, 8000, 16000];
            const contents = messages.map(msg => {
                const parts = [{ text: msg.content }];
                if (msg.image) {
                    const base64Data = msg.image.split(',')[1];
                    const mimeType = msg.image.match(/data:(.*?);base64/)[1] || 'image/jpeg';
                    parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                }
                return { role: msg.role === 'assistant' ? 'model' : 'user', parts };
            });

            const payload = { contents, systemInstruction: { parts: [{ text: systemPrompt }] } };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("HTTP " + response.status);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка генерации ответа.";
                } catch (error) {
                    if (i === 4) return "⚠️ Произошла ошибка при подключении к серверам ИИ. Пожалуйста, убедитесь, что вы ввели корректный API-ключ от Google Gemini.";
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const formatPrice = (price) => price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        // ==========================================
        // ГЕНЕРАЦИЯ ИЗОБРАЖЕНИЙ (полностью офлайн)
        // ==========================================
        // Детерминированный хэш строки — из одного и того же запроса
        // всегда получается одна и та же картинка.
        const hashPromptSeed = (str) => {
            let hash = 0;
            const s = str || 'void code ai';
            for (let i = 0; i < s.length; i++) {
                hash = (hash << 5) - hash + s.charCodeAt(i);
                hash |= 0;
            }
            return Math.abs(hash) || 1;
        };

        // Псевдослучайное число в диапазоне от 0 до n на основе seed и "соли" —
        // без зависимости от Math.random(), чтобы результат был воспроизводим для одного запроса.
        const seededRandom = (seed, salt, n) => {
            const x = Math.sin(seed * 999 + salt * 37.7) * 10000;
            return (x - Math.floor(x)) * n;
        };

        // Генерирует уникальную абстрактную SVG-иллюстрацию по тексту запроса.
        // Работает полностью в браузере пользователя, без обращения к серверу —
        // поэтому "генерация изображений" доступна даже без интернета.
        const generateArtImage = (prompt) => {
            const seed = hashPromptSeed(prompt);
            const hue1 = Math.floor(seededRandom(seed, 1, 360));
            const hue2 = (hue1 + 55 + Math.floor(seededRandom(seed, 2, 140))) % 360;
            const hue3 = (hue1 + 190 + Math.floor(seededRandom(seed, 3, 120))) % 360;

            const blobs = Array.from({ length: 6 }).map((_, i) => {
                const cx = Math.floor(seededRandom(seed, 10 + i, 512));
                const cy = Math.floor(seededRandom(seed, 20 + i, 512));
                const r = 70 + Math.floor(seededRandom(seed, 30 + i, 130));
                const hue = [hue1, hue2, hue3][i % 3];
                const light = 45 + Math.floor(seededRandom(seed, 40 + i, 25));
                return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="hsl(${hue},85%,${light}%)" opacity="0.6" />`;
            }).join('');

            // Несколько тонких дуг поверх для "воид"-стилистики, перекликающейся с логотипом
            const arcs = Array.from({ length: 3 }).map((_, i) => {
                const cx = Math.floor(seededRandom(seed, 50 + i, 512));
                const cy = Math.floor(seededRandom(seed, 60 + i, 512));
                const r = 90 + Math.floor(seededRandom(seed, 70 + i, 90));
                const hue = [hue2, hue3, hue1][i % 3];
                return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="hsl(${hue},90%,80%)" stroke-width="2" opacity="0.35" />`;
            }).join('');

            const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
                <defs>
                    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0%" stop-color="hsl(${hue1},70%,18%)" />
                        <stop offset="100%" stop-color="hsl(${hue3},65%,12%)" />
                    </linearGradient>
                    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="38" /></filter>
                </defs>
                <rect width="512" height="512" fill="url(#bg)" />
                <g filter="url(#blur)">${blobs}</g>
                <g>${arcs}</g>
            </svg>`;

            return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
        };

        // Достаёт из ответа ассистента блоки кода — они автоматически попадают
        // в "Библиотеку" как отдельные документы.
        const extractCodeDocuments = (content) => {
            if (!content) return [];
            const docs = [];
            const regex = /```(\w*)\n([\s\S]*?)```/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                const lang = (match[1] || 'text').trim() || 'text';
                const code = match[2].trim();
                if (code.length >= 25) {
                    const firstLine = code.split('\n')[0].slice(0, 48);
                    docs.push({ language: lang, content: code, title: firstLine || `Фрагмент кода (${lang})` });
                }
            }
            return docs;
        };

        // Разбивает ответ ассистента на "видимый текст" и блоки кода: в чат идёт
        // только текстовый комментарий, а сам код открывается в отдельном окне
        // просмотра (см. CodeViewerModal), чтобы не загромождать переписку.
        const splitMessageContent = (content) => {
            if (!content) return { text: '', blocks: [] };
            const blocks = [];
            const regex = /```(\w*)\n([\s\S]*?)```/g;
            let match;
            let lastIndex = 0;
            let text = '';
            while ((match = regex.exec(content)) !== null) {
                text += content.slice(lastIndex, match.index);
                const lang = (match[1] || 'text').trim() || 'text';
                const code = match[2].trim();
                if (code.length > 0) {
                    const firstLine = code.split('\n')[0].slice(0, 48);
                    blocks.push({ language: lang, content: code, title: firstLine || `Код (${lang})` });
                }
                lastIndex = regex.lastIndex;
            }
            text += content.slice(lastIndex);
            return { text: text.trim(), blocks };
        };

        // Строит HTML-документ для вкладки "Результат" — реальный живой предпросмотр
        // для HTML/CSS/JS. Для JS/TS скрипт-раннер НЕ встраивается строкой внутрь
        // HTML (чтобы в исходном коде страницы в принципе не могло быть текста,
        // способного запутать браузерный парсер) — вместо этого возвращается
        // отдельно и добавляется в iframe уже после его загрузки через DOM API
        // (document.createElement('script')) в CodeViewerModal ниже.
        const buildCodePreviewDoc = (code, language) => {
            const lang = (language || '').toLowerCase();
            if (lang === 'html' || /<!doctype/i.test(code) || /<html[\s>]/i.test(code)) {
                return { html: code, jsCode: null };
            }
            if (lang === 'css') {
                const html = '<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:system-ui,sans-serif;padding:24px;color:#1a1a2e}' + code + '</style></head><body><div class="preview-demo"><h1>Пример заголовка</h1><p>Демонстрационный текст для проверки стилей.</p><button>Кнопка</button></div>';
                return { html, jsCode: null };
            }
            if (lang === 'javascript' || lang === 'js' || lang === 'jsx' || lang === 'typescript' || lang === 'ts') {
                const html = '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="font-family:ui-monospace,monospace;padding:16px;font-size:13px;white-space:pre-wrap;color:#1a1a2e;"><div id="void-console-out"></div>';
                const jsCode = `
                    const out = document.getElementById('void-console-out');
                    const render = (color) => (...args) => {
                        const p = document.createElement('div');
                        p.style.color = color;
                        p.style.marginBottom = '4px';
                        p.textContent = args.map(a => { try { return typeof a === 'object' ? JSON.stringify(a) : String(a); } catch(e) { return String(a); } }).join(' ');
                        out.appendChild(p);
                    };
                    console.log = render('#1a1a2e');
                    console.warn = render('#b45309');
                    console.error = render('#dc2626');
                    try {
                        ${code}
                    } catch (e) { console.error('Ошибка выполнения: ' + e.message); }
                    if (!out.children.length) { out.textContent = 'Код выполнен без вывода в консоль.'; out.style.color = '#9ca3af'; }
                `;
                return { html, jsCode };
            }
            return null;
        };


        // ==========================================
        // СОХРАНЕНИЕ СЕССИИ (localStorage)
        // ==========================================
        // Ключ, под которым состояние аккаунта/чатов хранится в браузере.
        const STORAGE_KEY = 'voidcode_session_v1';

        // Поля, которые нужно запоминать между визитами/обновлениями страницы.
        // Всё, что не попало в этот список (модалки, флаги генерации и т.п.),
        // всегда стартует "с чистого листа" — так и должно быть.
        const PERSISTED_KEYS = [
            'user', 'userPlan', 'usedDailyLimits', 'usedWeeklyLimits', 'dailyLimitExceededAt', 'isDarkMode', 'notificationsEnabled',
            'chatSessions', 'activeChatId', 'selectedModelId', 'systemPromptState', 'lang',
            'generatedImages', 'generatedDocuments', 'aiAgents', 'activeAgentId',
            'walletBalance', 'walletTransactions',
            'sites', 'activeSiteId', 'sitesCreatedCount', 'sitesCreatedDate'
        ];

        const loadPersistedState = () => {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                return (parsed && typeof parsed === 'object') ? parsed : null;
            } catch (e) {
                // Повреждённые данные в localStorage не должны ломать загрузку сайта
                console.warn('Не удалось прочитать сохранённую сессию:', e);
                return null;
            }
        };

        const savePersistedState = (state) => {
            try {
                const toSave = {};
                PERSISTED_KEYS.forEach(key => { toSave[key] = state[key]; });
                localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
            } catch (e) {
                console.warn('Не удалось сохранить сессию:', e);
            }
        };

        // ==========================================
        // ERROR BOUNDARY — защита от белого экрана
        // ==========================================
        // Если где-то в дереве компонентов случится ошибка рендера (например,
        // обращение к несуществующей иконке или полю), вместо мгновенного
        // белого экрана пользователь увидит понятное сообщение с кнопкой
        // перезагрузки, а сессия при этом не потеряется (она уже в localStorage).
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, info) {
                console.error('Void Code AI: ошибка рендера', error, info);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="flex h-app-screen w-full items-center justify-center bg-[#f8f9fc] dark:bg-darkBg px-6">
                            <div className="max-w-md w-full text-center bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder rounded-[2rem] p-8 shadow-xl">
                                <h2 className="text-xl font-extrabold mb-2 dark:text-white">Что-то пошло не так</h2>
                                <p className="text-sm text-gray-500 mb-6">Произошла непредвиденная ошибка интерфейса. Ваши данные и вход в аккаунт сохранены — просто перезагрузите страницу.</p>
                                <button onClick={() => window.location.reload()} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-3.5 rounded-2xl shadow-lg transition-colors">
                                    Перезагрузить страницу
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const BANKS = [

        // ==========================================

        const copyToCb = (t) => { navigator.clipboard?.writeText(t); };

        function MessageRenderer({ content }) {
            const blocks = content.split(/(```[\s\S]*?```)/g);
            return (
                <div className="text-[15px] leading-relaxed break-words">
                    {blocks.map((block, index) => {
                        if (block.startsWith('```') && block.endsWith('```')) {
                            const lines = block.slice(3, -3).split('\n');
                            const lang = lines[0].trim();
                            const code = lines.slice(1).join('\n');
                            return (
                                <div key={index} className="my-4 bg-[#1e1e2e] rounded-2xl overflow-hidden shadow-sm border border-gray-800">
                                    <div className="flex justify-between items-center px-4 py-2 bg-[#2a2a3c] border-b border-gray-700/50">
                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">{lang || 'code'}</span>
                                        <button onClick={() => copyToCb(code)} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white transition-colors">
                                            <Icons.Code /> Копировать
                                        </button>
                                    </div>
                                    <div className="p-4 overflow-x-auto bg-[#1e1e2e]"><pre className="text-sm text-gray-200 font-mono"><code>{code}</code></pre></div>
                                </div>
                            );
                        }
                        const formattedText = block.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').map((line, i) => (
                            <React.Fragment key={i}><span dangerouslySetInnerHTML={{ __html: line }} />{i !== block.split('\n').length - 1 && <br />}</React.Fragment>
                        ));
                        return <span key={index}>{formattedText}</span>;
                    })}
                </div>
            );
        }

        function TypewriterMessage({ content, onProgress }) {
            const [disp, setDisp] = useState('');
            useEffect(() => {
                const text = content || '';
                let i = 0;
                // Скорость печати подстраивается под длину ответа: короткие реплики
                // печатаются заметно и плавно, а длинные не растягиваются дольше
                // ~2.2с — крупные "рывки" из старой версии убраны совсем.
                const totalDuration = Math.min(2200, Math.max(450, text.length * 9));
                const tickMs = 16;
                const totalTicks = Math.max(1, Math.round(totalDuration / tickMs));
                const chunkSize = Math.max(1, Math.ceil(text.length / totalTicks));

                setDisp('');
                const timer = setInterval(() => {
                    i += chunkSize;
                    setDisp(text.slice(0, i));
                    if (onProgress) onProgress();
                    if (i >= text.length) clearInterval(timer);
                }, tickMs);
                return () => clearInterval(timer);
            }, [content]);
            return <MessageRenderer content={disp} />;
        }

        // ==========================================

        function ListItem({ icon: Icon, label, extra, border = true, onClick }) {

                    <div className="flex items-center gap-3">

                                            </div>

                                            {AI_MODELS.map(m => {

        // ==========================================

                                <h3 className="font-bold text-sm sm:text-base md:text-lg mb-0.5 sm:mb-1 dark:text-white">Генератор кода</h3>

                            </div>
                            <div onClick={() => updateState({imageGenMode: true, currentView: 'chat'})} className="bg-white dark:bg-darkCard p-3.5 sm:p-5 md:p-6 rounded-2xl md:rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 bg-pink-50 dark:bg-pink-900/20 text-pink-600 dark:text-pink-400 rounded-xl md:rounded-2xl flex items-center justify-center mb-2.5 sm:mb-3 md:mb-4"><Icons.Image className="w-4 h-4 sm:w-5 sm:h-5" /></div>
                                <h3 className="font-bold text-sm sm:text-base md:text-lg mb-0.5 sm:mb-1 dark:text-white">Создать изображение</h3>
                                <p className="hidden sm:block text-sm text-gray-500 dark:text-gray-400 font-medium">Опишите идею — получите картинку.</p>
                            </div>
                            <div onClick={() => updateState({currentView: 'agent-builder'})} className="bg-white dark:bg-darkCard p-3.5 sm:p-5 md:p-6 rounded-2xl md:rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 bg-indigo-50 dark:bg-indigo-900/20 text-indigo-600 dark:text-indigo-400 rounded-xl md:rounded-2xl flex items-center justify-center mb-2.5 sm:mb-3 md:mb-4"><Icons.Robot className="w-4 h-4 sm:w-5 sm:h-5" /></div>
                                <h3 className="font-bold text-sm sm:text-base md:text-lg mb-0.5 sm:mb-1 dark:text-white">Агенты</h3>
                                <p className="hidden sm:block text-sm text-gray-500 dark:text-gray-400 font-medium">Соберите AI-агента под задачу.</p>
                            </div>
                            <div onClick={() => { if (canUseSiteBuilder(state.userPlan)) { updateState({currentView: 'site-builder'}); } else { alert('Конструктор сайтов доступен на тарифах Pro и Ultra. Оформите подписку Pro или выше, чтобы начать собирать сайты.'); } }} className="relative bg-white dark:bg-darkCard p-3.5 sm:p-5 md:p-6 rounded-2xl md:rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <span className="absolute top-2.5 right-2.5 sm:top-3 sm:right-3 text-[9px] sm:text-[10px] font-extrabold px-2 py-0.5 rounded-full bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-300 tracking-wide">PRO</span>
                                <div className="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 rounded-xl md:rounded-2xl flex items-center justify-center mb-2.5 sm:mb-3 md:mb-4"><Icons.Globe className="w-4 h-4 sm:w-5 sm:h-5" /></div>
                                <h3 className="font-bold text-sm sm:text-base md:text-lg mb-0.5 sm:mb-1 dark:text-white">Конструктор сайтов</h3>
                                <p className="hidden sm:block text-sm text-gray-500 dark:text-gray-400 font-medium">Соберите макет — остальное сделает ИИ.</p>
                            </div>
                            <div onClick={() => updateState({currentView: 'guide'})} className="bg-white dark:bg-darkCard p-3.5 sm:p-5 md:p-6 rounded-2xl md:rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-9 h-9 sm:w-11 sm:h-11 md:w-12 md:h-12 bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 rounded-xl md:rounded-2xl flex items-center justify-center mb-2.5 sm:mb-3 md:mb-4"><Icons.Compass className="w-4 h-4 sm:w-5 sm:h-5" /></div>
                                <h3 className="font-bold text-sm sm:text-base md:text-lg mb-0.5 sm:mb-1 dark:text-white">Подсказки</h3>
                                <p className="hidden sm:block text-sm text-gray-500 dark:text-gray-400 font-medium">Гид по всем возможностям.</p>
                            </div>
                        </div>

                        {state.userPlan === 'free' && (
                            <div className="relative bg-[#1a0b38] overflow-hidden rounded-[2.5rem] p-8 md:p-10 text-white shadow-xl mt-6 cursor-pointer" onClick={() => updateState({currentView: 'pricing'})}>
                                <div className="absolute top-0 right-0 w-[500px] h-[500px] bg-gradient-to-br from-purple-500/30 to-blue-500/20 blur-3xl -translate-y-1/2 translate-x-1/3 rounded-full"></div>
                                <div className="relative z-10 max-w-md">
                                    <h2 className="text-2xl md:text-3xl font-extrabold mb-4 tracking-tight leading-tight">Разблокируйте весь потенциал AI</h2>
                                    <p className="text-purple-200 text-sm md:text-base mb-8 leading-relaxed font-medium">Получите доступ к приоритетной поддержке и неограниченным возможностям.</p>
                                    <button className="bg-white text-[#1a0b38] px-8 py-4 rounded-2xl font-bold text-sm hover:bg-gray-100 transition-colors flex items-center gap-3 shadow-lg">
                                        Попробовать Pro <Icons.VoidLogo className="w-5 h-5 text-[#1a0b38]" />
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // ОКНО ПРОСМОТРА КОДА (Код / Результат / Тесты)
        // ==========================================
        // Открывается из карточки в чате вместо того, чтобы печатать код прямо
        // в переписку — так диалог остаётся читаемым, а с кодом удобно работать
        // отдельно: смотреть исходник, живой результат или (в будущем) тесты.
        function CodeViewerModal({ block, onClose }) {
            const [tab, setTab] = useState('code');
            const [copied, setCopied] = useState(false);
            const preview = buildCodePreviewDoc(block.content, block.language);
            const iframeRef = useRef(null);

            // Скрипт для вкладки "Результат" добавляется в iframe уже ПОСЛЕ его
            // загрузки, через нативный DOM API (createElement('script') + textContent) —
            // а не строкой внутри HTML. Это гарантированно безопасно: здесь нет
            // текста, который мог бы быть распознан как открывающий/закрывающий тег.
            const handleIframeLoad = () => {
                if (!preview || !preview.jsCode || !iframeRef.current) return;
                try {
                    const doc = iframeRef.current.contentDocument;
                    if (!doc) return;
                    const scriptEl = doc.createElement('script');
                    scriptEl.textContent = preview.jsCode;
                    doc.body.appendChild(scriptEl);
                } catch (e) { /* iframe в песочнице — просто не покажем результат */ }
            };

            const handleCopy = () => {
                navigator.clipboard.writeText(block.content).then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 1500);
                }).catch(() => {});
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-end sm:items-center justify-center sm:p-4 fade-in">
                    <div className="bg-white dark:bg-darkCard w-full sm:max-w-3xl h-[88vh] sm:h-[80vh] rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl border border-gray-100 dark:border-darkBorder flex flex-col overflow-hidden">
                        <div className="flex items-center justify-between p-4 sm:p-5 border-b border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <div className="flex items-center gap-3 min-w-0">
                                <div className="w-9 h-9 rounded-xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.Code className="w-4 h-4" /></div>
                                <div className="min-w-0">
                                    <p className="font-bold text-sm dark:text-white truncate">{block.title}</p>
                                    <p className="text-xs text-gray-400 uppercase font-semibold">{block.language}</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="void-tap-target p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center flex-shrink-0"><Icons.X /></button>
                        </div>

                        <div className="flex gap-2 px-4 sm:px-5 pt-3 flex-shrink-0">
                            <button onClick={() => setTab('code')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'code' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Code className="w-4 h-4" /> Код
                            </button>
                            <button onClick={() => setTab('result')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'result' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Eye className="w-4 h-4" /> Результат
                            </button>
                            <button onClick={() => setTab('tests')} className={`flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold transition-colors ${tab === 'tests' ? 'bg-[#5b32d4] text-white' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700'}`}>
                                <Icons.Flask className="w-4 h-4" /> Тесты
                            </button>
                        </div>

                        <div className="flex-1 overflow-hidden mt-3">
                            {tab === 'code' && (
                                <div className="h-full flex flex-col">
                                    <div className="flex justify-end px-4 sm:px-5 pb-2 flex-shrink-0">
                                        <button onClick={handleCopy} className="flex items-center gap-1.5 text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">
                                            {copied ? 'Скопировано ✓' : 'Копировать'}
                                        </button>
                                    </div>
                                    <pre className="flex-1 overflow-auto mx-4 sm:mx-5 mb-4 sm:mb-5 p-4 bg-[#1a1a2e] rounded-2xl text-[13px] leading-relaxed text-gray-100 font-mono"><code>{block.content}</code></pre>
                                </div>
                            )}
                            {tab === 'result' && (
                                <div className="h-full px-4 sm:px-5 pb-4 sm:pb-5">
                                    {preview ? (
                                        <iframe ref={iframeRef} onLoad={handleIframeLoad} title="Результат" srcDoc={preview.html} sandbox="allow-scripts" className="w-full h-full rounded-2xl border border-gray-100 dark:border-darkBorder bg-white"></iframe>
                                    ) : (
                                        <div className="h-full flex flex-col items-center justify-center text-center px-6 bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-gray-100 dark:border-darkBorder">
                                            <Icons.Eye className="w-10 h-10 text-gray-300 dark:text-gray-600 mb-3" />
                                            <p className="text-gray-500 dark:text-gray-400 font-semibold text-sm">Живой предпросмотр недоступен для «{block.language}»</p>
                                            <p className="text-gray-400 dark:text-gray-600 text-xs mt-1">Предпросмотр работает для HTML, CSS и JavaScript</p>
                                        </div>
                                    )}
                                </div>
                            )}
                            {tab === 'tests' && (
                                <div className="h-full px-4 sm:px-5 pb-4 sm:pb-5">
                                    <div className="h-full flex flex-col items-center justify-center text-center px-6 bg-gray-50 dark:bg-gray-800/40 rounded-2xl border border-dashed border-gray-200 dark:border-gray-700">
                                        <Icons.Flask className="w-10 h-10 text-gray-300 dark:text-gray-600 mb-3" />
                                        <p className="text-gray-500 dark:text-gray-400 font-semibold text-sm">Раздел тестов в разработке</p>
                                        <p className="text-gray-400 dark:text-gray-600 text-xs mt-1 max-w-xs">Здесь появятся автоматические проверки для сгенерированного кода — заготовка уже готова к подключению</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ChatView({ state, updateState, handleSendMessage, handleGenerateImage, messagesEndRef, chatFileInputRef }) {
            const activeChat = state.chatSessions.find(c => c.id === state.activeChatId) || state.chatSessions[0];
            const messages = activeChat?.messages || [];
            const [activeCodeBlock, setActiveCodeBlock] = useState(null);

            // "Умный" автоскролл: пока идёт печать ответа, чат сам едет вниз вслед
            // за текстом — но как только пользователь прокрутил сам (например,
            // чтобы перечитать что-то выше), автоследование останавливается и не
            // мешает, пока пользователь сам не вернётся к низу переписки.
            const messagesContainerRef = useRef(null);
            const autoScrollRef = useRef(true);
            useEffect(() => {
                const el = messagesContainerRef.current;
                if (!el) return;
                const onScroll = () => {
                    autoScrollRef.current = el.scrollHeight - el.scrollTop - el.clientHeight < 80;
                };
                el.addEventListener('scroll', onScroll, { passive: true });
                return () => el.removeEventListener('scroll', onScroll);
            }, []);
            const followScroll = () => {
                const el = messagesContainerRef.current;
                if (el && autoScrollRef.current) el.scrollTop = el.scrollHeight;
            };
            // Новое сообщение — снова начинаем следить за низом переписки
            useEffect(() => { autoScrollRef.current = true; followScroll(); }, [messages.length]);

            return (
                <div className="flex flex-col h-full bg-white dark:bg-darkBg relative w-full max-w-full fade-in">
                    <TopHeader state={state} updateState={updateState} />
                    
                    <div ref={messagesContainerRef} className="flex-1 overflow-y-auto p-4 md:p-8 pb-32 scroll-smooth">
                        <div className="max-w-4xl mx-auto space-y-6">
                            {messages.length === 0 && (
                                <div className="text-center mt-20 fade-in">
                                    <Icons.VoidLogo className="w-16 h-16 mx-auto mb-6 text-[#5b32d4] dark:text-purple-400 opacity-20" />
                                    <h2 className="text-2xl font-bold text-gray-400 dark:text-gray-600 mb-2">Начните диалог</h2>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm">Отправьте сообщение</p>
                                </div>
                            )}
                            
                            {messages.map((msg, idx) => (
                                <div key={idx} className={`flex gap-3 max-w-3xl ${msg.role === 'user' ? 'ml-auto flex-row-reverse' : ''}`}>
                                    {msg.role === 'assistant' && (
                                        <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50 overflow-hidden"><Icons.VoidLogo className="w-11 h-11 md:w-14 md:h-14 text-[#5b32d4] dark:text-purple-400"/></div>
                                    )}
                                    <div className={`p-4 md:p-5 rounded-3xl shadow-sm ${msg.role === 'user' ? 'bg-[#5b32d4] text-white rounded-tr-sm' : 'bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] text-gray-900 dark:text-gray-100 rounded-tl-sm'}`}>
                                        {msg.image && <img src={msg.image} alt="Upload" className="max-w-full md:max-w-sm rounded-xl mb-3 shadow-sm border border-gray-100 dark:border-gray-800" />}
                                        {msg.generatedImage ? (
                                            <div className="void-img-fadein">
                                                <img src={msg.generatedImage} alt="Сгенерированное изображение" className="max-w-full md:max-w-sm rounded-2xl mb-3 shadow-md border border-purple-100 dark:border-purple-900/40" />
                                                <div className="flex items-center justify-between gap-3 mb-1">
                                                    <MessageRenderer content={msg.content} />
                                                    <a href={msg.generatedImage} download={`void-code-ai-image-${idx}.svg`} className="flex-shrink-0 p-2 rounded-xl bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder text-[#5b32d4] dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-colors" title="Скачать изображение">
                                                        <Icons.Download className="w-4 h-4" />
                                                    </a>
                                                </div>
                                            </div>
                                        ) : (
                                            <>
                                                {msg.isAnimated ? <TypewriterMessage content={msg.content} onProgress={followScroll} /> : <MessageRenderer content={msg.content} />}
                                                {msg.codeBlocks && msg.codeBlocks.length > 0 && (
                                                    <div className="mt-3 space-y-2">
                                                        {msg.codeBlocks.map((block, bIdx) => (
                                                            <button key={bIdx} onClick={() => setActiveCodeBlock(block)} className="w-full flex items-center gap-3 p-3 rounded-2xl bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder hover:border-[#5b32d4] transition-colors text-left shadow-sm">
                                                                <div className="w-9 h-9 rounded-xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.Code className="w-4 h-4" /></div>
                                                                <div className="min-w-0 flex-1">
                                                                    <p className="font-bold text-sm dark:text-white truncate">{block.title}</p>
                                                                    <p className="text-xs text-gray-400 uppercase font-semibold">{block.language} · открыть окно просмотра</p>
                                                                </div>
                                                                <Icons.ChevronRight className="w-4 h-4 text-gray-300 flex-shrink-0" />
                                                            </button>
                                                        ))}
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            ))}
                            {state.isGenerating && state.isGeneratingImage && (
                                <div className="flex gap-3 max-w-3xl fade-in">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50 overflow-hidden"><Icons.VoidLogo className="w-11 h-11 md:w-14 md:h-14 text-[#5b32d4] dark:text-purple-400"/></div>
                                    <div className="bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] p-5 rounded-3xl rounded-tl-sm shadow-sm">
                                        <div className="relative w-40 h-40 md:w-48 md:h-48 rounded-2xl overflow-hidden void-img-shimmer flex items-center justify-center">
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="void-img-ring-outer w-16 h-16 rounded-full border-2 border-dashed border-[#5b32d4]/40 dark:border-purple-400/40"></div>
                                            </div>
                                            <div className="absolute inset-0 flex items-center justify-center">
                                                <div className="void-img-ring-inner w-10 h-10 rounded-full border-2 border-dotted border-[#5b32d4]/70 dark:border-purple-300/70"></div>
                                            </div>
                                            <div className="void-img-pulse absolute">
                                                <Icons.VoidLogo className="w-8 h-8 text-[#5b32d4] dark:text-purple-300" />
                                            </div>
                                        </div>
                                        <p className="text-sm font-bold text-[#5b32d4] dark:text-purple-300 mt-3 text-center">Генерирую изображение...</p>
                                    </div>
                                </div>
                            )}
                            {state.isGenerating && !state.isGeneratingImage && (
                                <div className="flex gap-3 max-w-3xl">
                                    <div className="w-8 h-8 md:w-10 md:h-10 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-1 border border-purple-100 dark:border-purple-900/50 overflow-hidden"><Icons.VoidLogo className="w-11 h-11 md:w-14 md:h-14 text-[#5b32d4] dark:text-purple-400"/></div>
                                    <div className="bg-[#faf7ff] dark:bg-[#1f1b2e] border border-[#eee8fa] dark:border-[#2d244a] p-5 rounded-3xl rounded-tl-sm flex items-center gap-1.5 shadow-sm">
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce"></div>
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></div>
                                        <div className="w-2 h-2 bg-[#5b32d4]/50 dark:bg-purple-400/50 rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></div>
                                    </div>
                                </div>
                            )}
                            <div ref={messagesEndRef} className="h-4" />
                        </div>
                    </div>

                    <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-white dark:from-darkBg via-white dark:via-darkBg to-transparent pt-14 px-3 sm:px-4 md:px-8 z-20 pointer-events-none pb-safe">
                        <div className="relative max-w-4xl mx-auto pointer-events-auto">
                            <div className="flex gap-2 mb-2.5">
                                <button onMouseDown={(e) => e.preventDefault()} onTouchStart={(e) => e.preventDefault()} onClick={() => updateState({imageGenMode: false})} className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold transition-colors ${!state.imageGenMode ? 'bg-[#5b32d4] text-white shadow-sm' : 'bg-white dark:bg-darkCard text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <Icons.MessageSquare className="w-3.5 h-3.5" /> Текст
                                </button>
                                <button onMouseDown={(e) => e.preventDefault()} onTouchStart={(e) => e.preventDefault()} onClick={() => updateState({imageGenMode: true})} className={`flex items-center gap-1.5 px-3.5 py-1.5 rounded-full text-xs font-bold transition-colors ${state.imageGenMode ? 'bg-[#5b32d4] text-white shadow-sm' : 'bg-white dark:bg-darkCard text-gray-500 dark:text-gray-400 border border-gray-200 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <Icons.Image className="w-3.5 h-3.5" /> Изображение
                                </button>
                            </div>
                            {state.selectedImage && (
                                <div className="absolute -top-16 left-4 bg-white dark:bg-darkCard p-1 rounded-xl shadow-lg border border-gray-200 dark:border-darkBorder fade-in group z-10">
                                    <img src={state.selectedImage} className="h-14 w-14 object-cover rounded-lg" />
                                    <button onClick={() => updateState({selectedImage: null})} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><Icons.X /></button>
                                </div>
                            )}
                            <div className={`flex items-end bg-white dark:bg-darkCard rounded-3xl border shadow-2xl focus-within:ring-4 transition-all relative ${state.imageGenMode ? 'border-[#5b32d4]/40 focus-within:ring-[#5b32d4]/10 focus-within:border-[#5b32d4]' : 'border-gray-200 dark:border-darkBorder focus-within:ring-[#5b32d4]/10 focus-within:border-[#5b32d4]'}`}>
                                <input type="file" ref={chatFileInputRef} onChange={(e) => {
                                    if(e.target.files[0]) {
                                        const r = new FileReader();
                                        r.onloadend = () => updateState({selectedImage: r.result});
                                        r.readAsDataURL(e.target.files[0]);
                                    }
                                }} accept="image/*" className="hidden" />
                                <button onClick={() => chatFileInputRef.current?.click()} className="void-tap-target absolute left-3 sm:left-4 bottom-2.5 sm:bottom-3 p-2.5 sm:p-2 text-[#5b32d4] dark:text-purple-400 hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors rounded-full flex items-center justify-center">
                                    <Icons.Plus className="w-6 h-6" />
                                </button>
                                <textarea 
                                    className="w-full pl-14 pr-16 py-5 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none resize-none max-h-32 min-h-[64px] text-[16px]"
                                    placeholder={state.imageGenMode ? "Опишите изображение, которое хотите создать..." : "Написать запрос..."}
                                    value={state.inputValue}
                                    onChange={(e) => { 
                                        updateState({inputValue: e.target.value}); 
                                        e.target.style.height = 'auto'; 
                                        e.target.style.height = (e.target.scrollHeight < 128 ? e.target.scrollHeight : 128) + 'px'; 
                                    }}
                                    onKeyDown={(e) => { 
                                        if (e.key === 'Enter' && !e.shiftKey) { 
                                            e.preventDefault(); 
                                            state.imageGenMode ? handleGenerateImage() : handleSendMessage(); 
                                            e.target.style.height = 'auto'; 
                                        } 
                                    }}
                                    onFocus={(e) => {
                                        // На телефоне клавиатура может перекрыть поле ввода — после
                                        // её открытия (с небольшой задержкой на анимацию) подскролливаем
                                        // и само поле, и чат, чтобы переписка не пряталась за клавиатурой.
                                        setTimeout(() => {
                                            e.target.scrollIntoView({ behavior: 'smooth', block: 'end' });
                                            followScroll();
                                        }, 300);
                                    }}
                                    rows={1}
                                />
                                <button onClick={() => state.imageGenMode ? handleGenerateImage() : handleSendMessage()} disabled={(!state.inputValue.trim() && !state.selectedImage) || state.isGenerating} className="void-tap-target absolute right-2.5 sm:right-3 top-2.5 sm:top-3 bottom-2.5 sm:bottom-3 aspect-square bg-[#5b32d4] hover:bg-[#4a26b0] disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 text-white rounded-2xl flex items-center justify-center transition-all shadow-md"><Icons.ArrowUp /></button>
                            </div>
                        </div>
                    </div>

                    {activeCodeBlock && <CodeViewerModal block={activeCodeBlock} onClose={() => setActiveCodeBlock(null)} />}
                </div>
            );
        }

        function SettingsView({ state, updateState }) {

                <div className="flex-1 overflow-y-auto pb-12 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
