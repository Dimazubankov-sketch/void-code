                                                    <input value={selectedNode.config[f.key] || ''} onChange={e => updateNodeField(selectedNode.id, { config: { ...selectedNode.config, [f.key]: e.target.value } })} onBlur={commitFieldHistory} placeholder={f.placeholder} className="w-full p-3 bg-gray-50 dark:bg-gray-800 border border-gray-100 dark:border-gray-700 rounded-xl text-sm dark:text-white focus:outline-none focus:border-[#5b32d4]" />
                                                )}
                                            </div>
                                        ))
                                    )}

                                    <button onClick={() => deleteNode(selectedNode.id)} className="w-full flex items-center justify-center gap-2 py-3 rounded-xl bg-red-50 dark:bg-red-900/20 text-red-500 font-bold text-sm hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors mt-2">
                                        <Icons.Trash className="w-4 h-4" /> Удалить блок
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>

                    {showMobileBlockPicker && (
                        <div className="sm:hidden fixed inset-0 z-50 flex items-end">
                            <div className="absolute inset-0 bg-black/40" onClick={() => setShowMobileBlockPicker(false)}></div>
                            <div className="relative bg-white dark:bg-darkCard w-full max-h-[75vh] rounded-t-3xl overflow-hidden flex flex-col fade-in pb-safe">
                                <div className="p-4 border-b border-gray-100 dark:border-darkBorder flex items-center justify-between flex-shrink-0">
                                    <h3 className="font-extrabold dark:text-white">Добавить блок</h3>
                                    <button onClick={() => setShowMobileBlockPicker(false)} className="void-tap-target p-2 text-gray-400"><Icons.X /></button>
                                </div>
                                <div className="flex-1 overflow-y-auto p-4">
                                    {renderBlockList(true)}
                                </div>
                            </div>
                        </div>
                    )}

                    <AgentBuilderMenu
                        open={showHistoryMenu}
                        onClose={() => setShowHistoryMenu(false)}
                        agents={state.aiAgents}
                        activeAgentId={draft.id}
                        onSelectAgent={handleSelectAgentFromHistory}
                        onNewAgent={handleNewAgentFromHistory}
                        onDeleteAgent={handleDeleteAgentFromHistory}
                        onRenameAgent={handleRenameAgentFromHistory}
                        updateState={updateState}
                    />

                    {showInvoice && currentAgentRecord && (
                        <AgentInvoiceModal
                            state={state}
                            updateState={updateState}
                            agent={currentAgentRecord}
                            onClose={() => setShowInvoice(false)}
                            onPaid={() => setShowInvoice(false)}
                        />
                    )}

                    {/* Предупреждение перед списанием токенов за тестовый запуск */}
                    {showTestConfirm && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4 fade-in">
                            <div className="bg-white dark:bg-darkCard w-full max-w-sm rounded-[2rem] p-6 shadow-2xl border border-gray-100 dark:border-darkBorder">
                                <div className="w-12 h-12 bg-amber-50 dark:bg-amber-900/20 text-amber-500 rounded-2xl flex items-center justify-center mb-4"><Icons.Sparkles className="w-6 h-6" /></div>
                                <h3 className="text-lg font-extrabold dark:text-white mb-1">Списать оплату за токены?</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-4">Тестовый запуск агента «{draft.name}» спишет с баланса примерно <strong className="text-gray-800 dark:text-gray-200">{formatMoney(pendingTestCost)} ₽</strong> за токены модели.</p>
                                <div className="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 rounded-xl mb-5 text-sm">
                                    <span className="text-gray-500 dark:text-gray-400">Баланс сейчас</span>
                                    <span className={`font-bold ${(state.walletBalance || 0) >= pendingTestCost ? 'text-gray-700 dark:text-gray-200' : 'text-red-500'}`}>{formatMoney(state.walletBalance || 0)} ₽</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowTestConfirm(false)} className="flex-1 py-3 rounded-2xl bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Отмена</button>
                                    <button onClick={confirmTestCharge} className="flex-1 py-3 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold text-sm shadow-md transition-colors">Списать и запустить</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Агент приостановлен из-за нехватки средств */}
                    {showLowBalance && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-center justify-center p-4 fade-in">
                            <div className="bg-white dark:bg-darkCard w-full max-w-sm rounded-[2rem] p-6 shadow-2xl border border-gray-100 dark:border-darkBorder">
                                <div className="w-12 h-12 bg-red-50 dark:bg-red-900/20 text-red-500 rounded-2xl flex items-center justify-center mb-4"><Icons.Pause className="w-6 h-6" /></div>
                                <h3 className="text-lg font-extrabold dark:text-white mb-1">Агент приостановлен</h3>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-5">На балансе недостаточно средств для оплаты токенов. Работа агента «{draft.name}» приостановлена — пополните баланс, чтобы возобновить.</p>
                                <div className="flex gap-2">
                                    <button onClick={() => setShowLowBalance(false)} className="flex-1 py-3 rounded-2xl bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300 font-bold text-sm hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">Закрыть</button>
                                    <button onClick={() => { setShowLowBalance(false); updateState({ currentView: 'wallet' }); }} className="flex-1 py-3 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold text-sm shadow-md transition-colors">Пополнить баланс</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Тост с подтверждением списания за токены */}
                    {lastChargeInfo && (
                        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[65] bg-[#1a0b38] text-white px-5 py-3.5 rounded-2xl shadow-2xl flex items-center gap-3 fade-in max-w-[92vw]">
                            <Icons.Receipt className="w-4 h-4 text-purple-300 flex-shrink-0" />
                            <span className="text-sm font-semibold">Списано {formatMoney(lastChargeInfo.amount)} ₽ за токены (сервис {formatMoney(lastChargeInfo.platformCut)} ₽ + модель {formatMoney(lastChargeInfo.providerCut)} ₽)</span>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // КОНСТРУКТОР AI-АГЕНТОВ — шторка "История агентов"
        // ==========================================
        function AgentBuilderMenu({ open, onClose, agents, activeAgentId, onSelectAgent, onNewAgent, onDeleteAgent, onRenameAgent, updateState }) {
            const [renamingId, setRenamingId] = useState(null);
            const [renameValue, setRenameValue] = useState('');

            const sorted = [...agents].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            const formatDate = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

            return (
                <>
                    <div className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity duration-300 ${open ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={onClose}></div>
                    <div className={`fixed top-0 right-0 h-full w-[85vw] max-w-sm bg-white dark:bg-darkCard z-50 shadow-2xl transition-transform duration-300 flex flex-col ${open ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <h3 className="text-lg font-extrabold dark:text-white">Меню агента</h3>
                            <button onClick={onClose} className="void-tap-target p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                        </div>

                        <div className="p-5 flex-shrink-0">
                            <button onClick={onNewAgent} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold transition-colors shadow-md">
                                <Icons.Plus /> Новый агент
                            </button>
                        </div>

                        <div className="px-5 flex-1 overflow-y-auto pb-6">
                            <h4 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">История агентов</h4>
                            {sorted.length === 0 ? (
                                <div className="text-center py-14">
                                    <Icons.Robot className="w-12 h-12 mx-auto mb-3 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 text-sm font-medium">Пока нет сохранённых агентов</p>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {sorted.map(agent => (
                                        <div key={agent.id} className={`group p-3 rounded-2xl border transition-colors ${activeAgentId === agent.id ? 'bg-[#efecf9] dark:bg-purple-900/20 border-[#5b32d4]/30' : 'bg-gray-50 dark:bg-gray-800/40 border-transparent hover:border-gray-200 dark:hover:border-gray-700'}`}>
                                            {renamingId === agent.id ? (
                                                <div className="flex items-center gap-2">
                                                    <input
                                                        autoFocus
                                                        value={renameValue}
                                                        onChange={e => setRenameValue(e.target.value)}
                                                        onKeyDown={e => { if (e.key === 'Enter') { onRenameAgent(agent.id, renameValue.trim() || agent.name); setRenamingId(null); } if (e.key === 'Escape') setRenamingId(null); }}
                                                        className="flex-1 min-w-0 p-2 bg-white dark:bg-darkCard border border-gray-200 dark:border-darkBorder rounded-lg text-sm font-bold dark:text-white focus:outline-none focus:border-[#5b32d4]"
                                                    />
                                                    <button onClick={() => { onRenameAgent(agent.id, renameValue.trim() || agent.name); setRenamingId(null); }} className="void-tap-target p-2 text-green-600 hover:bg-green-50 dark:hover:bg-green-900/20 rounded-lg flex-shrink-0"><Icons.Check className="w-4 h-4" /></button>
                                                </div>
                                            ) : (
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => onSelectAgent(agent)} className="flex-1 min-w-0 text-left">
                                                        <div className="flex items-center gap-2 flex-wrap">
                                                            <p className="font-bold text-sm truncate text-gray-900 dark:text-white">{agent.name}</p>
                                                            {!agent.isPaid && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 flex-shrink-0">Не оплачен</span>}
                                                            {agent.isPaid && agent.status === 'suspended' && <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-red-50 dark:bg-red-900/20 text-red-500 flex-shrink-0">Приостановлен</span>}
                                                        </div>
                                                        <p className="text-xs text-gray-400 mt-0.5">{agent.nodes.length} блок{agent.nodes.length === 1 ? '' : agent.nodes.length < 5 ? 'а' : 'ов'} · {formatDate(agent.updatedAt)}</p>
                                                    </button>
                                                    <button onClick={() => { setRenamingId(agent.id); setRenameValue(agent.name); }} className="void-tap-target flex-shrink-0 p-2 text-gray-400 hover:text-[#5b32d4] hover:bg-white dark:hover:bg-gray-800 rounded-lg transition-colors" title="Переименовать"><Icons.Pencil className="w-4 h-4" /></button>
                                                    <button onClick={() => { if (window.confirm(`Удалить агента «${agent.name}»?`)) onDeleteAgent(agent.id); }} className="void-tap-target flex-shrink-0 p-2 text-gray-400 hover:text-red-500 hover:bg-white dark:hover:bg-gray-800 rounded-lg transition-colors" title="Удалить"><Icons.Trash className="w-4 h-4" /></button>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        <div className="p-5 border-t border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <button onClick={() => updateState({ currentView: 'settings' })} className="void-tap-target w-11 h-11 flex items-center justify-center rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors" title="Настройки">
                                <Icons.Settings className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                </>
            );
        }

        // ==========================================
        // БОКОВОЕ МЕНЮ (ШТОРКА)
        // ==========================================
        function RightMenu({ state, updateState }) {
            if (!state.user) return null;

            return (
                <>
                    <div className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity duration-300 ${state.isRightMenuOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={() => updateState({isRightMenuOpen: false})} />
                    <div className={`fixed top-0 right-0 h-full w-[85vw] md:w-96 bg-white dark:bg-darkCard shadow-2xl z-50 transform transition-transform duration-300 flex flex-col ${state.isRightMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-6 flex-1 flex flex-col relative overflow-hidden">
                            <button onClick={() => updateState({isRightMenuOpen: false})} className="void-tap-target absolute top-4 right-4 p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                            
                            <div className="flex items-center gap-3 mb-8 mt-2">
                                <Icons.VoidLogo className="w-8 h-8 text-[#5b32d4] dark:text-purple-400" />
                                <span className="font-extrabold text-xl dark:text-white">Меню</span>
                            </div>

                            <div className="space-y-3 mb-6">
                                <button onClick={() => { 
                                    const nid = Date.now(); 
                                    updateState({chatSessions: [{id:nid,title:'Новый чат',messages:[]}, ...state.chatSessions], activeChatId: nid, currentView: 'chat', isRightMenuOpen: false, imageGenMode: false}); 
                                }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold transition-colors shadow-md">
                                    <Icons.Plus /> Создать новый чат
                                </button>
                                <button onClick={() => {
                                    const nid = Date.now();
                                    updateState({chatSessions: [{id:nid,title:'Новое изображение',messages:[]}, ...state.chatSessions], activeChatId: nid, currentView: 'chat', isRightMenuOpen: false, imageGenMode: true});
                                }} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.Image /> Создать изображение
                                </button>
                                <button onClick={() => updateState({currentView: 'sys-prompt', isRightMenuOpen: false})} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.LayoutDashboard /> Системный промт
                                </button>
                                <button onClick={() => updateState({currentView: 'library', isRightMenuOpen: false})} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-800 dark:text-gray-200 font-bold transition-colors border border-gray-100 dark:border-darkBorder">
                                    <Icons.Library /> Библиотека
                                </button>
                            </div>

                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-4 ml-1">История чатов</h3>
                            <div className="flex-1 overflow-y-auto space-y-1 pb-20 scrollbar-hide">
                                {state.chatSessions.map(chat => (
                                    <div key={chat.id} className={`group w-full flex items-center gap-2 p-1 rounded-xl transition-colors ${state.activeChatId === chat.id ? 'bg-[#efecf9] dark:bg-purple-900/30' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                        <button onClick={() => updateState({activeChatId: chat.id, currentView: 'chat', isRightMenuOpen: false, imageGenMode: false})} className={`flex-1 min-w-0 flex items-center gap-3 p-2 rounded-lg text-left ${state.activeChatId === chat.id ? 'text-[#5b32d4] dark:text-purple-400' : 'text-gray-700 dark:text-gray-300'}`}>
                                            <Icons.MessageSquare className="w-5 h-5 flex-shrink-0" /><span className="font-semibold text-[15px] truncate">{chat.title}</span>
                                        </button>
                                        <button onClick={() => {
                                            if (!window.confirm(`Удалить чат «${chat.title}»? Это действие нельзя отменить.`)) return;
                                            const remaining = state.chatSessions.filter(c => c.id !== chat.id);
                                            if (remaining.length === 0) {
                                                const nid = Date.now();
                                                updateState({ chatSessions: [{ id: nid, title: 'Новый чат', messages: [] }], activeChatId: nid });
                                            } else if (state.activeChatId === chat.id) {
                                                updateState({ chatSessions: remaining, activeChatId: remaining[0].id });
                                            } else {
                                                updateState({ chatSessions: remaining });
                                            }
                                        }} className="void-tap-target flex-shrink-0 p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg transition-colors" title="Удалить чат">
                                            <Icons.Trash className="w-4 h-4" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="absolute bottom-6 left-6">
                                <button onClick={() => updateState({currentView: 'settings', isRightMenuOpen: false})} className="p-4 bg-gray-100 dark:bg-gray-800 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors shadow-sm text-gray-700 dark:text-gray-300">
                                    <Icons.Settings className="w-6 h-6" />
                                </button>
                            </div>
                        </div>
                    </div>
                </>
            );
        }

        // МОДАЛЬНОЕ ОКНО АВТОРИЗАЦИИ
        function AuthModal({ state, updateState }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [hasError, setHasError] = useState(false);

            if (!state.showAuthModal) return null;

            const handleAuth = () => {
                if (!email.trim() || !password.trim()) {
                    setHasError(true);
                    return;
                }
                setHasError(false);
                updateState({ 
                    user: { name: email.split('@')[0], email: email }, 
                    showAuthModal: false 
                });
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-start sm:items-center justify-center p-3 sm:p-4 overflow-y-auto fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative slide-in-right my-6 sm:my-0">
                        <button onClick={() => updateState({showAuthModal: false})} className="void-tap-target absolute top-3 right-3 sm:top-4 sm:right-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                        
                        <div className="flex justify-center mb-6"><div className="flex items-center gap-2.5 font-extrabold text-2xl dark:text-white"><Icons.VoidLogo /><span><span className="void-grad-text">VOID</span> CODE AI</span></div></div>
                        <h2 className="text-2xl font-extrabold text-center mb-2 dark:text-white">Регистрация / Вход</h2>
                        <p className="text-center text-gray-500 mb-8 text-sm">Создайте аккаунт для работы с чатом</p>
                        
                        <div className="flex gap-2 p-1.5 bg-gray-50 dark:bg-[#23232f] rounded-2xl mb-6">
                            <button onClick={()=>updateState({authTab: 'login'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='login'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Войти</button>
                            <button onClick={()=>updateState({authTab: 'register'})} className={`flex-1 py-3 text-sm font-bold rounded-xl transition-colors ${state.authTab==='register'?'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm':'text-gray-500 hover:text-gray-700 dark:hover:text-gray-300'}`}>Регистрация</button>
                        </div>

                        <div className="space-y-5">
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Email или Телефон</label>
                                <input 
                                    type="text" 
                                    value={email}
                                    onChange={(e) => { setEmail(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !email.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="user@voidcode.ai" 
                                />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Пароль</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => { setPassword(e.target.value); setHasError(false); }}
                                    className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] rounded-2xl focus:outline-none transition-all ${hasError && !password.trim() ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10 placeholder-red-300 dark:placeholder-red-700' : 'border border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'} dark:text-white`} 
                                    placeholder="••••••••" 
                                />
                            </div>
                            <button onClick={handleAuth} className="w-full bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-4 rounded-2xl shadow-lg transition-colors mt-4">
                                Продолжить
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // ГЛАВНЫЙ APP КОМПОНЕНТ
        // ==========================================
        // ==========================================
        // ЗАСТАВКА ПРИ ЗАГРУЗКЕ САЙТА
        // ==========================================
        // Короткая (~2.4с) анимация логотипа: логотип появляется, четыре точки
        // облетают его по кругу и возвращаются в исходную позицию. Показывается
        // при каждой загрузке и обновлении страницы. Можно пропустить нажатием.
        function Splash({ onDone, dark }) {
            useEffect(() => {
                const t = setTimeout(onDone, 2500);
                return () => clearTimeout(t);
            }, []);
            return (
                <div className={`void-splash ${dark ? 'is-dark' : 'is-light'}`} onClick={onDone} role="presentation" title="Нажмите, чтобы пропустить">
                    <div className="void-splash-stage">
                        <span className="void-splash-halo"></span>
                        <span className="void-splash-halo h2"></span>
                        <Icons.VoidLogo className="void-splash-logo" />
                        <div className="void-splash-brand">
                            <span className="void-grad-text">VOID</span> <span style={{ color: dark ? '#ffffff' : '#1a1a2e' }}>CODE AI</span>
                        </div>
                    </div>
                    <div className="void-splash-skip">нажмите, чтобы пропустить</div>
                </div>
            );
        }

        // ==========================================
        // КОНСТРУКТОР САЙТОВ  (доступен на Pro и Ultra)
        // Пользователь собирает макет (блоки, отдельно под ПК и под телефон),
        // описывает каждый блок, сохраняет — и дальше правки вносятся через чат
        // с ИИ, который «ведёт» сайт. Готовый сайт пишет ИИ; превью можно
        // посмотреть, а код и права открываются после оплаты через кошелёк.
        // ==========================================
        // ==========================================
        // МЕНЮ КОНСТРУКТОРА САЙТОВ (ШТОРКА)
        // История сайтов, лимит на создание за день и переход в общие настройки —
        // тот же паттерн, что и в конструкторе AI-агентов (значок с двумя полосками).
        // ==========================================
        function SiteBuilderMenu({ open, onClose, sites, usedToday, dailyLimit, userPlan, onNewSite, onOpenSite, onEditSite, onDeleteSite, onOpenSettings }) {
            const sorted = [...sites].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            const limitLabel = SITE_LIMIT_LABEL[userPlan] || String(dailyLimit);
            const pct = dailyLimit ? Math.min(100, Math.round((usedToday / dailyLimit) * 100)) : 0;

            return (
                <>
                    <div className={`fixed inset-0 bg-black/40 backdrop-blur-sm z-40 transition-opacity duration-300 ${open ? 'opacity-100' : 'opacity-0 pointer-events-none'}`} onClick={onClose}></div>
                    <div className={`fixed top-0 right-0 h-full w-[85vw] max-w-sm bg-white dark:bg-darkCard z-50 shadow-2xl transition-transform duration-300 flex flex-col ${open ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <h3 className="text-lg font-extrabold dark:text-white">Меню сайтов</h3>
                            <button onClick={onClose} className="void-tap-target p-2 text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>
                        </div>

                        <div className="p-5 pb-0 flex-shrink-0 space-y-3">
                            <button onClick={onNewSite} className="w-full flex items-center gap-3 p-4 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold transition-colors shadow-md">
                                <Icons.Plus /> Новый сайт
                            </button>

                            {/* Лимит на создание сайтов за сегодня */}
                            <div className="p-4 rounded-2xl bg-gray-50 dark:bg-gray-800/50 border border-gray-100 dark:border-darkBorder">
                                <div className="flex items-center gap-2.5 mb-2.5">
                                    <div className="w-8 h-8 rounded-lg bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.BarChart className="w-4 h-4" /></div>
                                    <div className="min-w-0 flex-1">
                                        <div className="text-sm font-bold dark:text-white">Лимит на сегодня</div>
                                        <div className="text-xs text-gray-400">{usedToday} из {limitLabel} сайтов · тариф {userPlan === 'pro_plus' ? 'Ultra' : 'Pro'}</div>
                                    </div>
                                </div>
                                <div className="w-full h-1.5 rounded-full bg-gray-200 dark:bg-gray-700 overflow-hidden">
                                    <div className="h-full bg-[#5b32d4] rounded-full transition-all duration-500" style={{ width: pct + '%' }} />
                                </div>
                            </div>
                        </div>

                        <div className="px-5 pt-5 flex-1 overflow-y-auto pb-6">
                            <h4 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">История сайтов</h4>
                            {sorted.length === 0 ? (
                                <div className="text-center py-14">
                                    <Icons.Globe className="w-12 h-12 mx-auto mb-3 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 text-sm font-medium">Пока нет ни одного сайта</p>
                                </div>
                            ) : (
                                <div className="space-y-2">
                                    {sorted.map(s => {
                                        const price = s.paid ? (s.price || computeSitePrice(s)) : computeSitePrice(s);
                                        return (
                                            <div key={s.id} className="p-3 rounded-2xl border border-transparent bg-gray-50 dark:bg-gray-800/40 hover:border-gray-200 dark:hover:border-gray-700 transition-colors">
                                                <button onClick={() => onOpenSite(s)} className="w-full text-left mb-2">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        <p className="font-bold text-sm truncate text-gray-900 dark:text-white">{s.name || 'Мой сайт'}</p>
                                                        {s.paid
                                                            ? <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 flex-shrink-0">Оплачен</span>
                                                            : <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400 flex-shrink-0">Ждёт оплаты</span>}
                                                    </div>
                                                    <p className="text-xs text-gray-400 mt-0.5">{(s.layoutDesktop || []).length} блоков · {formatPrice(price)} ₽</p>
                                                </button>
                                                <div className="flex items-center gap-1.5">
                                                    {s.paid && <button onClick={() => onEditSite(s)} className="void-tap-target flex-shrink-0 p-2 text-gray-400 hover:text-[#5b32d4] hover:bg-white dark:hover:bg-gray-800 rounded-lg transition-colors" title="Редактировать"><Icons.Pencil className="w-4 h-4" /></button>}
                                                    <button onClick={() => { if (window.confirm(`Удалить сайт «${s.name || 'Мой сайт'}»?`)) onDeleteSite(s.id); }} className="void-tap-target flex-shrink-0 p-2 text-gray-400 hover:text-red-500 hover:bg-white dark:hover:bg-gray-800 rounded-lg transition-colors" title="Удалить"><Icons.Trash className="w-4 h-4" /></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        <div className="p-5 border-t border-gray-100 dark:border-darkBorder flex-shrink-0">
                            <button onClick={onOpenSettings} className="void-tap-target w-11 h-11 flex items-center justify-center rounded-2xl bg-gray-50 dark:bg-gray-800/50 hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors" title="Настройки">
                                <Icons.Settings className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                </>
            );
        }

        // ==========================================
        // ЧАТ-МАСТЕР СБОРКИ САЙТА («для ленивых»)
        // Альтернатива ручной сборке макета: шаблонный бот по шагам спрашивает,
        // какие блоки нужны и что в них разместить, а затем собирает такой же
        // сайт, что и обычный конструктор — с теми же 3 правками до оплаты.
        // ==========================================
        function SiteChatBuilderView({ state, updateState }) {
            const messagesEndRef = useRef(null);
            const [messages, setMessages] = useState([
                { id: 'm0', role: 'bot', text: 'Привет! Я соберу сайт вместе с вами — не нужно вручную перетаскивать блоки, просто отвечайте на вопросы. Как назовём сайт?' }
            ]);
            const [phase, setPhase] = useState('ask_name'); // ask_name -> ask_blocks -> describe_blocks -> summary -> done
            const [siteName, setSiteName] = useState('');
            const [selectedTypes, setSelectedTypes] = useState(['hero', 'about', 'form']);
            const [queue, setQueue] = useState([]);
            const [collected, setCollected] = useState([]); // [{type, title, desc}]
            const [inputValue, setInputValue] = useState('');
            const [createdSiteId, setCreatedSiteId] = useState(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, phase]);

            const tk = todayKey();
            const usedToday = state.sitesCreatedDate === tk ? (state.sitesCreatedCount || 0) : 0;
            const dailyLimit = getSiteLimit(state.userPlan);

            const addBotMessage = (text) => setMessages(prev => [...prev, { id: 'm' + Date.now() + Math.random(), role: 'bot', text }]);
            const addUserMessage = (text) => setMessages(prev => [...prev, { id: 'm' + Date.now() + Math.random(), role: 'user', text }]);

            // ---------- Шаг 1: имя сайта ----------
            const submitName = (value) => {
                const name = value.trim();
                if (!name) return;
                addUserMessage(name);
                setSiteName(name);
                setInputValue('');
                setTimeout(() => {
                    addBotMessage('Отлично, «' + name + '»! Какие блоки нужны на сайте? Выберите всё подходящее и нажмите «Готово».');
                    setPhase('ask_blocks');
                }, 300);
            };

            // ---------- Шаг 2: какие блоки нужны (мультивыбор) ----------
            const toggleType = (id) => setSelectedTypes(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const confirmBlocks = () => {
                if (selectedTypes.length === 0) return;
                const labels = selectedTypes.map(id => getSiteBlockType(id).label);
                addUserMessage(labels.join(', '));
                const q = [...selectedTypes];
                setQueue(q);
                setCollected([]);
                setTimeout(() => {
                    const first = getSiteBlockType(q[0]);
                    addBotMessage('Начнём с блока «' + first.label + '» — ' + first.hint.toLowerCase() + '. Опишите, что в нём разместить:');
                    setPhase('describe_blocks');
                }, 300);
            };

            // ---------- Шаг 3: описание каждого блока по очереди ----------
            const submitBlockDescription = (value) => {
                const text = value.trim();
                if (!text) return;
                addUserMessage(text);
                setInputValue('');
                const [current, ...rest] = queue;
                const newCollected = [...collected, { type: current, title: '', desc: text }];
                setCollected(newCollected);
                setQueue(rest);
                setTimeout(() => {
                    if (rest.length > 0) {
                        const next = getSiteBlockType(rest[0]);
                        addBotMessage('Дальше — «' + next.label + '» (' + next.hint.toLowerCase() + '). Опишите блок:');
                    } else {
                        addBotMessage('Все блоки описаны — вот что получилось. Нажмите «Собрать сайт», чтобы ИИ подготовил макет.');
                        setPhase('summary');
                    }
                }, 300);
            };

            // ---------- Сборка сайта из собранных ответов ----------
            const handleCreateSite = () => {
                if (usedToday >= dailyLimit) {
                    alert('На сегодня лимит на создание сайтов исчерпан (' + usedToday + ' из ' + SITE_LIMIT_LABEL[state.userPlan] + '). Лимит обновится завтра — либо перейдите на более высокий тариф.');
                    return;
                }
                const now = Date.now();
                const makeIds = () => collected.map(b => ({ id: 'b' + Date.now() + Math.random().toString(36).slice(2, 6), type: b.type, title: b.title, desc: b.desc }));
                const layoutDesktop = makeIds();
                const layoutMobile = makeIds();
                const newSite = {
                    id: 'site_' + now,
                    name: siteName || 'Мой сайт',
                    createdAt: now,
                    layoutDesktop, layoutMobile,
                    status: 'awaiting_payment',
                    editApplied: 0, editsLeft: 3, editsLeftPaid: 0, paidEditsApplied: 0,
                    paid: false, generated: false,
                    chat: [{ role: 'bot', text: 'Привет! Я ИИ, который ведёт ваш сайт «' + (siteName || 'Мой сайт') + '». Собрал макет по нашему диалогу в чате — один и тот же макет установлен и под ПК, и под телефон, при желании их можно развести по-разному. Опишите правки текстом — я обновлю смету. До оплаты доступно 3 правки, каждая влияет на итоговую стоимость. Когда будете готовы — нажмите «Сгенерировать превью», а затем оплатите, чтобы забрать код и права.' }]
                };
                const countToday = state.sitesCreatedDate === tk ? (state.sitesCreatedCount || 0) : 0;
                updateState({
                    sites: [newSite, ...(state.sites || [])],
                    activeSiteId: newSite.id,
                    sitesCreatedCount: countToday + 1,
                    sitesCreatedDate: tk,
                    currentView: 'site-builder',
                    siteBuilderStartInChat: true
                });
                setCreatedSiteId(newSite.id);
                addBotMessage('Готово! Открываю сайт в конструкторе — там же чат с ИИ и 3 правки до оплаты.');
                setPhase('done');
            };

            const isTextPhase = phase === 'ask_name' || phase === 'describe_blocks';
            const inputPlaceholder = phase === 'ask_name' ? 'Например: Лендинг для кофейни' : 'Опишите, что разместить в блоке...';
            const submitTextInput = () => {
                if (phase === 'ask_name') submitName(inputValue);
                else if (phase === 'describe_blocks') submitBlockDescription(inputValue);
            };

            return (
                <div className="h-app-screen w-full flex flex-col bg-[#f8f9fc] dark:bg-darkBg overflow-hidden relative">
                    <div className="flex items-center gap-3 px-3 sm:px-4 md:px-6 py-3 bg-white dark:bg-darkCard border-b border-gray-100 dark:border-darkBorder flex-shrink-0 z-30">
                        <button onClick={() => goBack(state, updateState, 'site-builder')} title="Назад в конструктор сайтов" className="void-tap-target p-2 -ml-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-shrink-0">
                            <Icons.ChevronLeft className="w-6 h-6" />
                        </button>
                        <div className="w-9 h-9 rounded-xl bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 flex items-center justify-center flex-shrink-0"><Icons.Globe className="w-5 h-5" /></div>
                        <div className="min-w-0">
                            <h1 className="font-extrabold text-[13px] sm:text-base dark:text-white truncate">Сайт в чате</h1>
                            <p className="text-xs text-gray-400 truncate">Соберём сайт вместе, по шагам</p>
                        </div>
                    </div>

                    <div className="flex-1 overflow-y-auto px-3 sm:px-4 md:px-8 py-6 pb-32 sm:pb-28">
                        <div className="max-w-2xl mx-auto space-y-4">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex gap-3 fade-in ${msg.role === 'user' ? 'flex-row-reverse' : ''}`}>
                                    {msg.role === 'bot' && <div className="w-8 h-8 rounded-full bg-[#efecf9] dark:bg-purple-900/30 flex items-center justify-center flex-shrink-0 mt-0.5 border border-purple-100 dark:border-purple-900/50 text-[#5b32d4] dark:text-purple-400"><Icons.Robot className="w-5 h-5" /></div>}
                                    <div className={`p-3.5 rounded-3xl shadow-sm text-sm leading-relaxed max-w-[85%] ${msg.role === 'user' ? 'bg-[#5b32d4] text-white rounded-tr-sm' : 'bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder text-gray-800 dark:text-gray-100 rounded-tl-sm'}`}>{msg.text}</div>
                                </div>
                            ))}

                            {phase === 'ask_blocks' && (
                                <div className="pl-0 sm:pl-11 fade-in space-y-3">
                                    <div className="flex flex-wrap gap-2">
                                        {SITE_BLOCK_TYPES.map(t => {
                                            const active = selectedTypes.includes(t.id);
                                            const IconComp = Icons[t.icon] || Icons.Code;
                                            return (
                                                <button key={t.id} onClick={() => toggleType(t.id)} className={`flex items-center gap-2 px-4 py-2.5 rounded-2xl border text-sm font-semibold transition-colors ${active ? 'bg-[#efecf9] dark:bg-purple-900/30 border-[#5b32d4] text-[#5b32d4] dark:text-purple-300' : 'bg-white dark:bg-darkCard border-gray-200 dark:border-darkBorder text-gray-700 dark:text-gray-200 hover:border-[#5b32d4] hover:text-[#5b32d4]'}`}>
                                                    <IconComp className="w-3.5 h-3.5" /> {t.label}
                                                    {active && <Icons.Check className="w-3.5 h-3.5" />}
                                                </button>
                                            );
                                        })}
                                    </div>
                                    <button onClick={confirmBlocks} disabled={selectedTypes.length === 0} className="px-5 py-2.5 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] disabled:opacity-40 text-white font-bold text-sm shadow-md transition-colors">
                                        Готово, дальше →
                                    </button>
                                </div>
                            )}

                            {phase === 'summary' && (
                                <div className="pl-0 sm:pl-11 fade-in">
                                    <div className="bg-white dark:bg-darkCard border border-gray-100 dark:border-darkBorder rounded-3xl shadow-sm p-5 space-y-3">
                                        <h3 className="font-extrabold text-lg dark:text-white flex items-center gap-2"><Icons.Globe className="w-5 h-5 text-[#5b32d4]" /> {siteName || 'Мой сайт'}</h3>
                                        <div className="text-sm space-y-2 text-gray-600 dark:text-gray-300">
                                            {collected.map((b, i) => {
                                                const t = getSiteBlockType(b.type);
                                                return <p key={i}><span className="font-bold text-gray-400">{t.label}:</span> {b.desc}</p>;
                                            })}
                                        </div>
                                        <button onClick={handleCreateSite} className="w-full mt-2 flex items-center justify-center gap-2 py-3.5 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold shadow-md transition-colors">
                                            <Icons.Sparkles /> Собрать сайт
                                        </button>
                                    </div>
                                </div>
                            )}

                            {phase === 'done' && (
                                <div className="pl-0 sm:pl-11 fade-in">
                                    <button onClick={() => updateState({ currentView: 'site-builder', activeSiteId: createdSiteId, siteBuilderStartInChat: true })} className="px-5 py-2.5 rounded-2xl bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold text-sm shadow-md transition-colors">Открыть сайт</button>
                                </div>
                            )}

                            <div ref={messagesEndRef}></div>
                        </div>
                    </div>

                    {isTextPhase && (
                        <div className="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#f8f9fc] dark:from-darkBg via-[#f8f9fc] dark:via-darkBg to-transparent pt-10 px-3 sm:px-4 md:px-8 pb-safe z-20">
                            <div className="max-w-2xl mx-auto flex items-end bg-white dark:bg-darkCard rounded-3xl border border-gray-200 dark:border-darkBorder shadow-lg focus-within:ring-4 focus-within:ring-[#5b32d4]/10 focus-within:border-[#5b32d4] transition-all relative">
                                <textarea
                                    value={inputValue}
                                    onChange={(e) => setInputValue(e.target.value)}
                                    onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitTextInput(); } }}
                                    onFocus={(e) => { setTimeout(() => { e.target.scrollIntoView({ behavior: 'smooth', block: 'end' }); messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'end' }); }, 300); }}
                                    placeholder={inputPlaceholder}
                                    rows={1}
                                    className="w-full pl-5 pr-16 py-4 bg-transparent text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none resize-none max-h-28 min-h-[56px] text-[16px]"
                                />
                                <button onClick={submitTextInput} disabled={!inputValue.trim()} className="void-tap-target absolute right-2.5 top-2 bottom-2 aspect-square bg-[#5b32d4] hover:bg-[#4a26b0] disabled:bg-gray-200 dark:disabled:bg-gray-800 disabled:text-gray-400 text-white rounded-2xl flex items-center justify-center transition-all shadow-md"><Icons.ArrowUp /></button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function SiteBuilderView({ state, updateState }) {
            const [screen, setScreen] = useState(() => state.siteBuilderStartInChat ? 'chat' : 'menu'); // menu | editor | chat | preview
            const [showSiteMenu, setShowSiteMenu] = useState(false);
            const [device, setDevice] = useState('desktop');    // вкладка макета в редакторе
            const [draft, setDraft] = useState(null);           // черновик до сохранения
            const [showSaveWarn, setShowSaveWarn] = useState(false);
            const [chatInput, setChatInput] = useState('');
            const [generating, setGenerating] = useState(false);
            const [editingBlockId, setEditingBlockId] = useState(null); // блок, который сейчас редактируется в макете
            const [dragType, setDragType] = useState(null);      // тип блока, который тащат из библиотеки слева
            const [dragIndex, setDragIndex] = useState(null);    // индекс существующего блока, который переставляют
            const [dropHintIndex, setDropHintIndex] = useState(null);
            const [showMobileBlockPicker, setShowMobileBlockPicker] = useState(false);
            const [blockSearch, setBlockSearch] = useState('');
            const chatEndRef = useRef(null);

            // Пришли из чата-мастера («для ленивых») с уже созданным сайтом —
            // разово открываем чат правок и гасим флаг, чтобы не мешал в будущем.
            useEffect(() => {
                if (state.siteBuilderStartInChat) updateState({ siteBuilderStartInChat: false });
            }, []);

            const sites = state.sites || [];
            const activeSite = sites.find(s => s.id === state.activeSiteId) || null;
            const tk = todayKey();
            const usedToday = state.sitesCreatedDate === tk ? (state.sitesCreatedCount || 0) : 0;
            const dailyLimit = getSiteLimit(state.userPlan);

            const patchSite = (id, patch) => updateState({
                sites: (state.sites || []).map(s => s.id === id ? { ...s, ...patch } : s)
            });

            useEffect(() => {
                if (screen === 'chat' && chatEndRef.current) {
                    chatEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [screen, activeSite && activeSite.chat && activeSite.chat.length, generating]);

            // ---------- helpers ----------
            const newDraft = () => ({
                id: 'site_' + Date.now(),
                name: 'Мой сайт',
                createdAt: Date.now(),
                layoutDesktop: [
                    { id: 'b' + Date.now(), type: 'hero', title: 'Первый экран', desc: '' }
                ],
                layoutMobile: [
                    { id: 'bm' + Date.now(), type: 'hero', title: 'Первый экран', desc: '' }
                ],
                status: 'awaiting_payment',
                editApplied: 0,
                editsLeft: 3,
                editsLeftPaid: 0,
                paidEditsApplied: 0,
                paid: false,
                generated: false,
                chat: []
            });

            const currentLayoutKey = device === 'desktop' ? 'layoutDesktop' : 'layoutMobile';

            const updateDraftLayout = (mutator) => setDraft(d => {
                const list = mutator([...(d[currentLayoutKey] || [])]);
                return { ...d, [currentLayoutKey]: list };
            });

            const addBlock = (type = 'about', atIndex = null) => {
                const newBlock = { id: 'b' + Date.now() + Math.random().toString(36).slice(2, 6), type, title: '', desc: '' };
                updateDraftLayout(list => {
                    const copy = [...list];
                    const idx = (atIndex === null || atIndex === undefined) ? copy.length : Math.max(0, Math.min(atIndex, copy.length));
                    copy.splice(idx, 0, newBlock);
                    return copy;
                });
                setEditingBlockId(newBlock.id);
                return newBlock.id;
            };
            const removeBlock = (id) => { updateDraftLayout(list => list.filter(b => b.id !== id)); if (editingBlockId === id) setEditingBlockId(null); };
            const moveBlock = (idx, dir) => updateDraftLayout(list => {
                const j = idx + dir;
                if (j < 0 || j >= list.length) return list;
                const copy = [...list];
                [copy[idx], copy[j]] = [copy[j], copy[idx]];
                return copy;
            });
            const reorderBlock = (fromIdx, toIdx) => updateDraftLayout(list => {
                if (fromIdx === toIdx || fromIdx == null || toIdx == null) return list;
                const copy = [...list];
                const [moved] = copy.splice(fromIdx, 1);
                copy.splice(fromIdx < toIdx ? toIdx - 1 : toIdx, 0, moved);
                return copy;
            });
            const setBlockField = (id, field, value) => updateDraftLayout(list =>
                list.map(b => b.id === id ? { ...b, [field]: value } : b));

            // Отзеркалить макет: скопировать блоки с одного устройства на другое —
            // чтобы не собирать одинаковый макет дважды. Если пользователь всё же
            // хочет разные макеты — можно продолжить редактировать их отдельно
            // после копирования, сама возможность вести два разных макета никуда
            // не пропадает.
            const mirrorLayout = (fromKey, toKey) => {
                const source = draft[fromKey] || [];
                if (source.length === 0) return;
                const fromLabel = fromKey === 'layoutDesktop' ? 'ПК' : 'телефона';
                const toLabel = toKey === 'layoutDesktop' ? 'ПК' : 'телефона';
                if (!confirm(`Скопировать макет с ${fromLabel} на макет для ${toLabel}? Текущий макет для ${toLabel} будет заменён.`)) return;
                const cloned = source.map(b => ({ ...b, id: 'b' + Date.now() + Math.random().toString(36).slice(2, 6) }));
                setDraft(d => ({ ...d, [toKey]: cloned }));
                setEditingBlockId(null);
            };

            const draftPrice = draft ? computeSitePrice(draft) : 0;

            const startNewSite = () => {
                if (usedToday >= dailyLimit) {
                    alert('На сегодня лимит на создание сайтов исчерпан (' + usedToday + ' из ' + SITE_LIMIT_LABEL[state.userPlan] + '). Лимит обновится завтра — либо перейдите на более высокий тариф.');
                    return;
                }
                setDraft(newDraft());
                setDevice('desktop');
                setEditingBlockId(null);
                setScreen('editor');
            };

            const confirmSave = () => {
                const site = {
                    ...draft,
                    price: computeSitePrice(draft),
                    chat: [{ role: 'bot', text: 'Привет! Я ИИ, который ведёт ваш сайт «' + (draft.name || 'Мой сайт') + '». Макет получил. Опишите правки текстом — я обновлю смету. До оплаты доступно 3 правки, каждая влияет на итоговую стоимость. Когда будете готовы — нажмите «Сгенерировать превью», а затем оплатите, чтобы забрать код и права.' }]
                };
                const count = state.sitesCreatedDate === tk ? (state.sitesCreatedCount || 0) : 0;
                updateState({
                    sites: [site, ...(state.sites || [])],
                    activeSiteId: site.id,
                    sitesCreatedCount: count + 1,
                    sitesCreatedDate: tk
                });
                setShowSaveWarn(false);
                setScreen('chat');
            };

            const sendEdit = () => {
                const txt = chatInput.trim();
                if (!txt || !activeSite) return;
                const isPaidSession = activeSite.paid;
                const attemptsLeft = isPaidSession ? (activeSite.editsLeftPaid || 0) : (activeSite.editsLeft || 0);
                if (attemptsLeft <= 0) return;
                const nextEditApplied = (activeSite.editApplied || 0) + 1;
                const patch = {
                    editApplied: nextEditApplied,
                    generated: false,
                    chat: [...(activeSite.chat || []), { role: 'user', text: txt }]
                };
                if (isPaidSession) {
                    patch.editsLeftPaid = attemptsLeft - 1;
                    patch.paidEditsApplied = (activeSite.paidEditsApplied || 0) + 1;
                } else {
                    patch.editsLeft = attemptsLeft - 1;
                }
                const newSite = { ...activeSite, ...patch };
                const newPrice = isPaidSession ? computeSiteEditFee(newSite) : computeSitePrice(newSite);
                patch.price = newPrice;
                const leftAfter = attemptsLeft - 1;
                const ack = isPaidSession
                    ? ('Правку принял и учёл в макете. Стоимость правок этой сессии: ' + formatPrice(newPrice) + ' ₽. Осталось правок: ' + leftAfter + (leftAfter === 0 ? '. Правки закончились — оплатите их, чтобы забрать обновлённый сайт.' : '.'))
                    : ('Готово, учёл правку и обновил смету. Текущий счёт: ' + formatPrice(newPrice) + ' ₽. Осталось бесплатных правок: ' + leftAfter + (leftAfter === 0 ? '. Дальнейшие изменения — после оплаты.' : '.'));
                patch.chat = [...patch.chat, { role: 'bot', text: ack }];
                patchSite(activeSite.id, patch);
                setChatInput('');
            };

            const generatePreview = () => {
                if (!activeSite || generating) return;
                setGenerating(true);
                setTimeout(() => {
                    patchSite(activeSite.id, {
                        generated: true,
                        chat: [...(activeSite.chat || []), { role: 'bot', text: 'Готово — превью сайта собрано. Откройте его кнопкой «Смотреть превью». Внешний вид доступен сразу, а код и полные права откроются после оплаты.' }]
                    });
                    setGenerating(false);
                }, 1800);
            };

            const paySite = () => {
                if (!activeSite) return;
                const price = computeSitePrice(activeSite);
                const balance = state.walletBalance || 0;
                if (balance < price) {
                    if (confirm('На балансе кошелька ' + formatMoney(balance) + ' ₽, а нужно ' + formatPrice(price) + ' ₽. Перейти в кошелёк, чтобы пополнить баланс?')) {
                        updateState({ currentView: 'wallet' });
                    }
                    return;
                }
                const now = Date.now();
                updateState({
                    walletBalance: balance - price,
                    walletTransactions: [{ id: 'tx' + now, type: 'purchase', amount: -price, description: 'Покупка сайта «' + (activeSite.name || 'Мой сайт') + '»', timestamp: now }, ...(state.walletTransactions || [])],
                    sites: (state.sites || []).map(s => s.id === activeSite.id ? {
                        ...s, paid: true, status: 'paid', price, editsLeftPaid: 3, paidEditsApplied: 0, generated: true,
                        chat: [...(s.chat || []), { role: 'bot', text: 'Оплата прошла ✓ Права на сайт и весь код теперь ваши — код открыт в превью, его можно скачать. Нужны доработки? В истории у сайта появилась иконка карандаша: 3 правки за сессию, дешевле создания.' }]
                    } : s)
                });
                setScreen('preview');
            };

            const applyPaidEdits = () => {
                if (!activeSite) return;
                const fee = computeSiteEditFee(activeSite);
                const balance = state.walletBalance || 0;
                if (balance < fee) {
                    if (confirm('Стоимость правок ' + formatPrice(fee) + ' ₽, на балансе ' + formatMoney(balance) + ' ₽. Перейти в кошелёк?')) {
                        updateState({ currentView: 'wallet' });
                    }
                    return;
                }
                const now = Date.now();
                updateState({
                    walletBalance: balance - fee,
                    walletTransactions: [{ id: 'tx' + now, type: 'purchase', amount: -fee, description: 'Правки сайта «' + (activeSite.name || 'Мой сайт') + '»', timestamp: now }, ...(state.walletTransactions || [])],
                    sites: (state.sites || []).map(s => s.id === activeSite.id ? {
                        ...s, generated: true, paidEditsApplied: 0,
                        chat: [...(s.chat || []), { role: 'bot', text: 'Правки оплачены и внесены ✓ Обновлённый сайт готов — смотрите превью и скачивайте код. Хотите продолжить редактирование — откройте сайт по значку карандаша, чтобы получить ещё 3 правки.' }]
                    } : s)
                });
                setScreen('preview');
            };

            const openEditSession = (site) => {
                patchSite(site.id, { editsLeftPaid: 3, paidEditsApplied: 0 });
                updateState({ activeSiteId: site.id });
                setScreen('chat');
            };

            const deleteSite = (id) => {
                if (!confirm('Удалить этот сайт из истории? Действие необратимо.')) return;
                updateState({ sites: (state.sites || []).filter(s => s.id !== id), activeSiteId: state.activeSiteId === id ? null : state.activeSiteId });
            };

            const downloadSiteCode = (site) => {
                const sections = (site.layoutDesktop || []).map(b => {
                    const t = getSiteBlockType(b.type);
                    return '  <section class="' + b.type + '">\n    <!-- ' + t.label + (b.title ? ' — ' + b.title : '') + ' -->\n    <h2>' + (b.title || t.label) + '</h2>\n' + (b.desc ? '    <p>' + b.desc + '</p>\n' : '') + '  </section>';
                }).join('\n\n');
                const html = '<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>' + (site.name || 'Сайт') + '</title>\n</head>\n<body>\n' + sections + '\n<' + '/body>\n<' + '/html>';
                const blob = new Blob([html], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = (site.name || 'site').replace(/\s+/g, '-').toLowerCase() + '.html';
                a.click();
                URL.revokeObjectURL(url);
            };

            // ---------- маленькие UI-хелперы ----------
            const StatusBadge = ({ site }) => site.paid
                ? <span className="text-[11px] font-bold px-2.5 py-1 rounded-full bg-green-50 dark:bg-green-900/30 text-green-600 dark:text-green-400 whitespace-nowrap">Оплачен</span>
                : <span className="text-[11px] font-bold px-2.5 py-1 rounded-full bg-amber-50 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 whitespace-nowrap">Ждёт оплаты</span>;

            const TopBar = ({ title, onBack, right }) => (
                <div className="flex items-center gap-2 pl-2 sm:pl-3 md:pl-4 pr-3 sm:pr-4 md:pr-6 py-2.5 sm:py-3 bg-white dark:bg-darkCard border-b border-gray-100 dark:border-darkBorder flex-shrink-0 z-30">
                    <button onClick={onBack} className="void-tap-target p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors flex-shrink-0">
                        <Icons.ChevronLeft className="w-6 h-6" />
                    </button>
                    <div className="flex items-center gap-2 min-w-0 flex-1">
                        <div className="w-8 h-8 rounded-xl bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 flex items-center justify-center flex-shrink-0"><Icons.Globe className="w-5 h-5" /></div>
                        <h1 className="font-extrabold text-sm sm:text-base md:text-lg dark:text-white truncate">{title}</h1>
                    </div>
                    {right}
                </div>
            );

            // ---------- экран: главное меню ----------
            const renderMenu = () => (
                <div className="h-app-screen w-full flex flex-col bg-[#f8f9fc] dark:bg-darkBg overflow-hidden">
                    <TopBar title="Конструктор сайтов" onBack={() => goBack(state, updateState, 'home')} right={
                        <div className="flex items-center gap-1.5 sm:gap-2 flex-shrink-0">
                            <button onClick={() => updateState({ currentView: 'wallet' })} title="Кошелёк" className={`hidden sm:flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-bold transition-colors ${(state.walletBalance || 0) < LOW_BALANCE_THRESHOLD ? 'bg-amber-50 text-amber-600 dark:bg-amber-900/20 dark:text-amber-400 hover:bg-amber-100' : 'bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700'}`}>
                                <Icons.Wallet className="w-3.5 h-3.5" /> {formatMoney(state.walletBalance || 0)} ₽
                            </button>
                            <button onClick={() => updateState({ currentView: 'wallet' })} title="Кошелёк" className={`sm:hidden void-tap-target p-2.5 rounded-xl transition-colors ${(state.walletBalance || 0) < LOW_BALANCE_THRESHOLD ? 'bg-amber-50 text-amber-600 dark:bg-amber-900/20 dark:text-amber-400' : 'bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-300'}`}>
                                <Icons.Wallet className="w-4.5 h-4.5" />
                            </button>
                            <button onClick={() => setShowSiteMenu(true)} className="void-tap-target p-2.5 rounded-xl bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-800 dark:text-gray-200 border border-gray-200 dark:border-darkBorder transition-colors"><Icons.TwoLines className="w-5 h-5" /></button>
                        </div>
                    } />
                    <div className="flex-1 overflow-y-auto px-4 sm:px-6 py-6">
                        <div className="max-w-3xl mx-auto space-y-5">
                            <div className="relative bg-gradient-to-br from-[#1a0b38] to-[#3a1d7a] overflow-hidden rounded-[2rem] p-6 sm:p-8 text-white shadow-xl">
                                <div className="absolute top-0 right-0 w-72 h-72 bg-purple-500/30 blur-3xl -translate-y-1/3 translate-x-1/4 rounded-full" />
                                <div className="relative z-10">
                                    <h2 className="text-2xl sm:text-3xl font-extrabold mb-2 tracking-tight">Соберите макет — сайт сделает ИИ</h2>
                                    <p className="text-purple-200 text-sm sm:text-base mb-6 leading-relaxed max-w-lg">Опишите блоки будущего сайта отдельно под ПК и под телефон. Чем детальнее макет — тем точнее результат. Готовый сайт напишет ИИ, а код и права вы получаете после оплаты.</p>
                                    <button onClick={startNewSite} className="void-tap-target bg-white text-[#1a0b38] px-6 py-3.5 rounded-2xl font-bold text-sm hover:bg-gray-100 transition-colors flex items-center gap-2 shadow-lg">
                                        <Icons.Plus className="w-5 h-5" /> Создать макет сайта
                                    </button>
                                    <p className="text-purple-300/80 text-xs mt-4 font-medium">Сегодня создано {usedToday} из {SITE_LIMIT_LABEL[state.userPlan]} на тарифе {state.userPlan === 'pro_plus' ? 'Ultra' : 'Pro'}</p>
                                </div>
                            </div>

                            {/* Альтернатива для тех, кто не хочет собирать макет из блоков вручную */}
                            <div onClick={() => updateState({ currentView: 'site-chat-builder' })} className="void-tap-target flex items-center gap-4 bg-white dark:bg-darkCard p-4 sm:p-5 rounded-[1.75rem] border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <div className="w-12 h-12 rounded-2xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.MessageSquare className="w-6 h-6" /></div>
                                <div className="min-w-0 flex-1">
                                    <h3 className="font-extrabold text-sm sm:text-base dark:text-white">Не хочется собирать блоки? Соберём в чате</h3>
                                    <p className="text-xs sm:text-sm text-gray-400 mt-0.5 leading-relaxed">Бот спросит, какие блоки нужны и что в них разместить — сайт соберётся по ответам. В конце — те же 3 правки.</p>
                                </div>
                                <Icons.ChevronRight className="w-5 h-5 text-gray-300 flex-shrink-0" />
                            </div>

                            {sites.length > 0 && (
                                <div>
                                    <div className="flex items-center justify-between mb-3">
                                        <h3 className="font-extrabold text-lg dark:text-white">Недавние сайты</h3>
                                        <button onClick={() => setShowSiteMenu(true)} className="text-sm font-bold text-[#5b32d4] dark:text-purple-400 hover:underline">Вся история</button>
                                    </div>
                                    <div className="space-y-2.5">
                                        {sites.slice(0, 3).map(s => (
                                            <div key={s.id} onClick={() => { updateState({ activeSiteId: s.id }); setScreen('chat'); }} className="void-tap-target flex items-center gap-3 bg-white dark:bg-darkCard p-4 rounded-2xl border border-gray-100 dark:border-darkBorder shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                                <div className="w-10 h-10 rounded-xl bg-teal-50 dark:bg-teal-900/20 text-teal-600 dark:text-teal-400 flex items-center justify-center flex-shrink-0"><Icons.Globe className="w-5 h-5" /></div>
                                                <div className="min-w-0 flex-1">
                                                    <div className="font-bold text-sm dark:text-white truncate">{s.name || 'Мой сайт'}</div>
                                                    <div className="text-xs text-gray-400">{(s.layoutDesktop || []).length} блоков · {formatPrice(s.paid ? (s.price || computeSitePrice(s)) : computeSitePrice(s))} ₽</div>
                                                </div>
                                                <StatusBadge site={s} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );

            // ---------- экран: редактор макета ----------
            const renderEditor = () => {
                if (!draft) { setScreen('menu'); return null; }
                const list = draft[currentLayoutKey] || [];
                const filteredBlockTypes = SITE_BLOCK_TYPES.filter(t => t.label.toLowerCase().includes(blockSearch.trim().toLowerCase()));

                const clearDrag = () => { setDragType(null); setDragIndex(null); setDropHintIndex(null); };
                const dropAt = (targetIdx) => (e) => {
                    e.preventDefault();
                    if (dragType) addBlock(dragType, targetIdx);
                    else if (dragIndex !== null && dragIndex !== undefined) reorderBlock(dragIndex, targetIdx);
                    clearDrag();
                };

                const BlockLibraryList = ({ isMobile }) => (
                    <div className="space-y-1.5">
                        {filteredBlockTypes.length === 0 && <p className="text-xs text-gray-400 text-center py-6">Ничего не найдено</p>}
                        {filteredBlockTypes.map(t => {
                            const IconComp = Icons[t.icon] || Icons.Code;
                            return (
                                <div
                                    key={t.id}
                                    draggable={!isMobile}
                                    onDragStart={(e) => { setDragType(t.id); e.dataTransfer.effectAllowed = 'copy'; }}
                                    onDragEnd={clearDrag}
                                    onClick={() => { addBlock(t.id); if (isMobile) setShowMobileBlockPicker(false); }}
                                    title={t.hint}
                                    className="void-tap-target group flex items-center gap-3 p-2.5 rounded-xl border border-transparent hover:border-[#5b32d4]/30 hover:bg-[#efecf9] dark:hover:bg-purple-900/20 cursor-grab active:cursor-grabbing transition-colors"
                                >
                                    <div className="w-9 h-9 rounded-lg bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><IconComp className="w-5 h-5" /></div>
                                    <div className="min-w-0 flex-1">
                                        <div className="text-sm font-bold dark:text-white truncate">{t.label}</div>
                                        <div className="text-[11px] text-gray-400 truncate">{t.hint}</div>
                                    </div>
                                    <Icons.Plus className="w-4 h-4 text-gray-300 flex-shrink-0 opacity-0 group-hover:opacity-100 transition-opacity" />
                                </div>
                            );
                        })}
                    </div>
                );

                const renderBlockCard = (b, idx) => {
                    const t = getSiteBlockType(b.type);
                    const IconComp = Icons[t.icon] || Icons.Code;
                    const isHero = b.type === 'hero';
                    const isEditing = editingBlockId === b.id;
                    const showDropHint = dropHintIndex === idx && (dragType || (dragIndex !== null && dragIndex !== idx));
                    return (
                        <div key={b.id}>
                            {showDropHint && <div className="h-1.5 rounded-full bg-[#5b32d4] mx-3 my-1 fade-in" />}
                            <div
                                draggable
                                onDragStart={(e) => { setDragIndex(idx); e.dataTransfer.effectAllowed = 'move'; }}
