        // ==========================================
        // КОШЕЛЁК — модалка пополнения баланса
        // ==========================================
        // Переиспользуется и на отдельном экране "Кошелёк", и внутри счёта за
        // сборку агента, и при автоматической приостановке из-за нехватки средств.
        function WalletTopUpModal({ state, updateState, onClose, onSuccess, reason }) {
            const PRESETS = [500, 1000, 2000, 5000];
            const [amount, setAmount] = useState(1000);
            const [customAmount, setCustomAmount] = useState('');
            const [method, setMethod] = useState('card');
            const [cardNumber, setCardNumber] = useState('');
            const [cardExpiry, setCardExpiry] = useState('');
            const [cardCvc, setCardCvc] = useState('');
            const [cryptoTxId, setCryptoTxId] = useState('');
            const [errors, setErrors] = useState({});
            const [success, setSuccess] = useState(false);

            const finalAmount = customAmount.trim() !== '' ? (parseInt(customAmount.replace(/\D/g, '')) || 0) : amount;

            const validate = () => {
                const e = {};
                if (!finalAmount || finalAmount < 100) e.amount = 'Минимальная сумма пополнения — 100 ₽';
                if (method === 'card') {
                    const digits = cardNumber.replace(/\s+/g, '');
                    if (!/^\d{16,19}$/.test(digits)) e.cardNumber = 'Введите корректный номер карты';
                    if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExpiry.trim())) e.cardExpiry = 'Формат ММ/ГГ';
                    if (!/^\d{3,4}$/.test(cardCvc.trim())) e.cardCvc = 'Введите CVC';
                } else if (method === 'crypto') {
                    if (!cryptoTxId.trim() || cryptoTxId.trim().length < 6) e.cryptoTxId = 'Укажите хэш транзакции после перевода';
                }
                return e;
            };

            const handleConfirm = () => {
                const e = validate();
                if (Object.keys(e).length > 0) { setErrors(e); return; }
                setErrors({});
                const now = Date.now();
                const methodLabel = method === 'card' ? 'картой' : method === 'sbp' ? 'через СБП' : 'криптовалютой';
                updateState({
                    walletBalance: (state.walletBalance || 0) + finalAmount,
                    walletTransactions: [{ id: 'tx' + now, type: 'topup', amount: finalAmount, description: `Пополнение баланса ${methodLabel}`, timestamp: now }, ...(state.walletTransactions || [])]
                });
                setSuccess(true);
                setTimeout(() => { onSuccess && onSuccess(finalAmount); }, 1100);
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-start sm:items-center justify-center p-3 sm:p-4 overflow-y-auto fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative my-6 sm:my-0">
                        <button onClick={onClose} className="void-tap-target absolute top-4 right-4 p-2 text-gray-400 hover:text-gray-900 dark:hover:text-white rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>

                        {success ? (
                            <div className="text-center py-10 fade-in">
                                <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4"><Icons.Check className="w-8 h-8 text-white" /></div>
                                <h3 className="text-xl font-extrabold dark:text-white mb-1">Баланс пополнен</h3>
                                <p className="text-gray-500 dark:text-gray-400 text-sm">+{formatMoney(finalAmount)} ₽ на кошельке</p>
                            </div>
                        ) : (
                            <>
                                <div className="w-12 h-12 bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center mb-4"><Icons.Wallet /></div>
                                <h2 className="text-xl font-extrabold dark:text-white mb-1">Пополнить баланс</h2>
                                <p className="text-sm text-gray-500 dark:text-gray-400 mb-6">{reason || 'Деньги пойдут на оплату токенов и услуг сервиса.'}</p>

                                <div className="grid grid-cols-4 gap-2 mb-3">
                                    {PRESETS.map(p => (
                                        <button key={p} onClick={() => { setAmount(p); setCustomAmount(''); setErrors(prev => ({ ...prev, amount: null })); }} className={`py-2.5 rounded-xl text-sm font-bold border transition-colors ${customAmount === '' && amount === p ? 'bg-[#5b32d4] text-white border-[#5b32d4]' : 'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:border-[#5b32d4]'}`}>{p}₽</button>
                                    ))}
                                </div>
                                <div className="mb-5">
                                    <input type="text" inputMode="numeric" value={customAmount} onChange={e => { setCustomAmount(e.target.value.replace(/\D/g, '')); setErrors(prev => ({ ...prev, amount: null })); }} placeholder="Своя сумма, ₽" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-bold dark:text-white focus:outline-none ${errors.amount ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                    {errors.amount && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.amount}</p>}
                                </div>

                                <div className="flex gap-2 mb-5">
                                    {[{ id: 'card', label: 'Карта' }, { id: 'sbp', label: 'СБП' }, { id: 'crypto', label: 'Крипто' }].map(m => (
                                        <button key={m.id} onClick={() => setMethod(m.id)} className={`flex-1 py-2.5 rounded-xl text-sm font-bold border transition-colors ${method === m.id ? 'bg-[#efecf9] dark:bg-purple-900/30 border-[#5b32d4] text-[#5b32d4] dark:text-purple-300' : 'bg-gray-50 dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-600 dark:text-gray-300'}`}>{m.label}</button>
                                    ))}
                                </div>

                                {method === 'card' && (
                                    <div className="space-y-3 mb-2">
                                        <div>
                                            <input type="text" value={cardNumber} onChange={e => { setCardNumber(e.target.value); setErrors(prev => ({ ...prev, cardNumber: null })); }} placeholder="Номер карты" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardNumber ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                            {errors.cardNumber && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardNumber}</p>}
                                        </div>
                                        <div className="flex gap-3">
                                            <div className="flex-1">
                                                <input type="text" value={cardExpiry} onChange={e => { setCardExpiry(e.target.value); setErrors(prev => ({ ...prev, cardExpiry: null })); }} placeholder="ММ/ГГ" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardExpiry ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {errors.cardExpiry && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardExpiry}</p>}
                                            </div>
                                            <div className="flex-1">
                                                <input type="password" value={cardCvc} onChange={e => { setCardCvc(e.target.value); setErrors(prev => ({ ...prev, cardCvc: null })); }} placeholder="CVC" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cardCvc ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {errors.cardCvc && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cardCvc}</p>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                                {method === 'crypto' && (
                                    <div className="mb-2">
                                        <input type="text" value={cryptoTxId} onChange={e => { setCryptoTxId(e.target.value); setErrors(prev => ({ ...prev, cryptoTxId: null })); }} placeholder="Хэш транзакции после перевода" className={`w-full p-3.5 bg-gray-50 dark:bg-[#23232f] border rounded-xl text-sm font-mono dark:text-white focus:outline-none ${errors.cryptoTxId ? 'border-2 border-red-500' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                        {errors.cryptoTxId && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{errors.cryptoTxId}</p>}
                                    </div>
                                )}
                                {method === 'sbp' && <p className="text-xs text-gray-400 mb-2">После нажатия «Пополнить» откроется приложение вашего банка для подтверждения перевода.</p>}

                                <button onClick={handleConfirm} className="w-full mt-4 py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors">
                                    Пополнить на {formatMoney(finalAmount)} ₽
                                </button>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function PricingView({ state, updateState }) {
            // Локальные поля формы оплаты. Пока пользователь не заполнит их
            // корректно, кнопка "Оплатить" не пускает его дальше — тариф
            // не активируется и currentView не переключается.
            const [cardNumber, setCardNumber] = useState('');
            const [cardExpiry, setCardExpiry] = useState('');
            const [cardCvc, setCardCvc] = useState('');
            const [cryptoTxId, setCryptoTxId] = useState('');
            const [paymentErrors, setPaymentErrors] = useState({});

            // ==========================================
            // СКАНЕР КАРТЫ ЧЕРЕЗ КАМЕРУ
            // ==========================================
            const [showScanner, setShowScanner] = useState(false);
            const [scanStatus, setScanStatus] = useState('requesting'); // requesting -> scanning -> done
            const videoRef = useRef(null);
            const streamRef = useRef(null);
            const scanTimeoutRef = useRef(null);

            const stopCameraStream = () => {
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(track => track.stop());
                    streamRef.current = null;
                }
                if (scanTimeoutRef.current) {
                    clearTimeout(scanTimeoutRef.current);
                    scanTimeoutRef.current = null;
                }
            };

            const closeScanner = () => {
                stopCameraStream();
                setShowScanner(false);
                setScanStatus('requesting');
            };

            // Отключаем камеру, если пользователь уходит с экрана оплаты
            useEffect(() => () => stopCameraStream(), []);

            const openCardScanner = async () => {
                if (state.selectedMethod !== 'card') return;
                setShowScanner(true);
                setScanStatus('requesting');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    streamRef.current = stream;
                    setScanStatus('scanning');
                    // Даём React отрендерить <video>, затем подключаем поток
                    setTimeout(() => {
                        if (videoRef.current) videoRef.current.srcObject = stream;
                    }, 50);

                    // Имитируем распознавание карты камерой (в реальном сервисе здесь
                    // работал бы OCR по видеопотоку) — через ~2.5с "находим" карту.
                    scanTimeoutRef.current = setTimeout(() => {
                        const digits = Array.from({ length: 16 }, (_, i) => i === 0 ? '4' : Math.floor(Math.random() * 10)).join('');
                        const formatted = digits.match(/.{1,4}/g).join(' ');
                        const now = new Date();
                        const expMonth = String(1 + Math.floor(Math.random() * 12)).padStart(2, '0');
                        const expYear = String((now.getFullYear() + 2 + Math.floor(Math.random() * 3)) % 100).padStart(2, '0');

                        setCardNumber(formatted);
                        setCardExpiry(`${expMonth}/${expYear}`);
                        setPaymentErrors(prev => ({ ...prev, cardNumber: null, cardExpiry: null }));
                        setScanStatus('done');
                        scanTimeoutRef.current = setTimeout(() => closeScanner(), 900);
                    }, 2500);
                } catch (err) {
                    setShowScanner(false);
                    alert('Не удалось получить доступ к камере. Проверьте разрешения браузера или введите данные карты вручную.');
                }
            };

            const validateCard = () => {
                const errors = {};
                const digits = cardNumber.replace(/\s+/g, '');
                if (!/^\d{16,19}$/.test(digits)) errors.cardNumber = 'Введите корректный номер карты (16 цифр)';
                if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(cardExpiry.trim())) errors.cardExpiry = 'Формат ММ/ГГ';
                if (!/^\d{3,4}$/.test(cardCvc.trim())) errors.cardCvc = 'Введите CVC (3-4 цифры)';
                return errors;
            };

            const validateCrypto = () => {
                const errors = {};
                if (!cryptoTxId.trim() || cryptoTxId.trim().length < 6) {
                    errors.cryptoTxId = 'Укажите хэш транзакции или ID перевода после отправки средств';
                }
                return errors;
            };

            const handleConfirmPayment = () => {
                // Защита: неавторизованный пользователь не может оформить подписку.
                // Просто на случай, если он как-то попал на этот экран без входа.
                if (!state.user) {
                    updateState({ showAuthModal: true, authTab: 'register' });
                    return;
                }

                const price = state.billingCycle === 'month' ? state.checkoutPlan.priceMonth : state.checkoutPlan.priceYear;

                if (state.selectedMethod === 'wallet') {
                    const balance = state.walletBalance || 0;
                    if (balance < price) {
                        alert(`Недостаточно средств на балансе. Не хватает ${formatMoney(price - balance)} ₽ — пополните кошелёк и попробуйте снова.`);
                        return;
                    }
                    const now = Date.now();
                    updateState({
                        walletBalance: balance - price,
                        walletTransactions: [{ id: 'tx' + now, type: 'subscription', amount: -price, description: `Подписка ${state.checkoutPlan.title} (${state.billingCycle === 'month' ? 'месяц' : 'год'})`, timestamp: now }, ...(state.walletTransactions || [])],
                        userPlan: state.checkoutPlan.id, checkoutPlan: null, currentView: 'settings', usedDailyLimits: 0
                    });
                    alert('Подписка успешно оформлена и оплачена с баланса кошелька!');
                    return;
                }

                let errors = {};
                if (state.selectedMethod === 'card') errors = validateCard();
                else if (state.selectedMethod === 'crypto') errors = validateCrypto();
                // Для СБП дополнительных полей не требуется — банк уже выбран заранее

                if (Object.keys(errors).length > 0) {
                    setPaymentErrors(errors);
                    return;
                }
                setPaymentErrors({});
                updateState({ userPlan: state.checkoutPlan.id, checkoutPlan: null, currentView: 'settings', usedDailyLimits: 0 });
                alert('Подписка успешно оформлена!');
            };

            const PRICING_PLANS = [
                { id: 'free', title: 'Free', subtitle: 'Бесплатный доступ. Идеально для знакомства с Void Code AI и базовых задач.', priceMonth: 0, priceYear: 0, features: ["Умный чат с AI", "Обучающие материалы", "Генератор кода — до 10 запросов", "Стандартная скорость", "Базовые модели AI", "Конструктор сайтов: 1 сайт/день"] },
                { id: 'plus', title: 'Plus', subtitle: 'Больше мощностей и меньше ограничений для работы с кодом.', priceMonth: 350, priceYear: 3500, features: ["Безлимитный чат", "Генератор кода — до 200 запросов", "Приоритетная скорость", "Доступ к мощным моделям", "Конструктор сайтов: 3 сайта/день"] },
                { id: 'pro', title: 'Pro', subtitle: 'Максимум возможностей для разработчиков, фрилансеров и команд.', priceMonth: 1000, priceYear: 12000, features: ["Безлимитно всё", "Максимальная скорость ответов", "Приоритетная поддержка", "Доступ к самым мощным моделям", "Конструктор сайтов: 5 сложных сайтов/день"] },
                { id: 'pro_plus', title: 'Ultra', subtitle: 'Максимальные мощности и конструктор сайтов на полную — для компаний и масштабных проектов.', priceMonth: 10000, priceYear: 100000, features: ["Всё из тарифа Pro", "Админ-панель и доступы", "Личный менеджер", "API интеграция", "Конструктор сайтов: 8–10 сложных сайтов/день"] }
            ];

            if (state.checkoutPlan) {
                const price = state.billingCycle === 'month' ? state.checkoutPlan.priceMonth : state.checkoutPlan.priceYear;
                const period = state.billingCycle === 'month' ? 'в месяц' : 'в год';

                if (state.paymentStep === 'form') {
                    return (
                        <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                            <div className="px-4 py-8 max-w-2xl mx-auto">
                                <div className="flex items-center mb-8 gap-4">
                                    <button onClick={() => updateState({paymentStep: 'select'})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                                    <h2 className="text-2xl font-bold dark:text-white">Данные для оплаты</h2>
                                </div>
                                <div className="bg-white dark:bg-darkCard p-8 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-xl mb-6">
                                    <div className="flex justify-between items-center mb-8 border-b border-gray-100 dark:border-gray-800 pb-4">
                                        <div>
                                            <p className="text-sm font-bold text-gray-500">Сумма к оплате</p>
                                            <p className="text-3xl font-extrabold text-[#5b32d4] dark:text-purple-400 mt-1">{formatPrice(price)}₽ <span className="text-sm text-gray-500 font-medium">/ {period.replace('в ', '')}</span></p>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={openCardScanner}
                                            disabled={state.selectedMethod !== 'card'}
                                            title={state.selectedMethod === 'card' ? 'Отсканировать карту камерой' : ''}
                                            className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-colors ${state.selectedMethod === 'card' ? 'bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 hover:bg-purple-100 dark:hover:bg-purple-900/40 cursor-pointer' : 'bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 cursor-default'}`}
                                        >
                                            {state.selectedMethod === 'card' && <Icons.Card />}
                                            {state.selectedMethod === 'sbp' && <Icons.SBP />}
                                            {state.selectedMethod === 'crypto' && <Icons.Crypto />}
                                            {state.selectedMethod === 'wallet' && <Icons.Wallet />}
                                        </button>
                                    </div>

                                    {state.selectedMethod === 'card' && (
                                        <div className="space-y-4 fade-in">
                                            <div>
                                                <div className="flex items-center justify-between mb-1.5">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 block">Номер карты</label>
                                                    <button type="button" onClick={openCardScanner} className="flex items-center gap-1 text-xs font-bold text-[#5b32d4] dark:text-purple-400 hover:underline mr-1">
                                                        <Icons.Camera className="w-3.5 h-3.5" /> Сканировать камерой
                                                    </button>
                                                </div>
                                                <input type="text" value={cardNumber} onChange={e => { setCardNumber(e.target.value); setPaymentErrors(prev => ({...prev, cardNumber: null})); }} placeholder="0000 0000 0000 0000" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono focus:outline-none ${paymentErrors.cardNumber ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {paymentErrors.cardNumber && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cardNumber}</p>}
                                            </div>
                                            <div className="flex gap-4">
                                                <div className="flex-1">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Срок действия</label>
                                                    <input type="text" value={cardExpiry} onChange={e => { setCardExpiry(e.target.value); setPaymentErrors(prev => ({...prev, cardExpiry: null})); }} placeholder="ММ/ГГ" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono focus:outline-none ${paymentErrors.cardExpiry ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                    {paymentErrors.cardExpiry && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cardExpiry}</p>}
                                                </div>
                                                <div className="flex-1">
                                                    <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">CVC</label>
                                                    <input type="password" value={cardCvc} onChange={e => { setCardCvc(e.target.value); setPaymentErrors(prev => ({...prev, cardCvc: null})); }} placeholder="•••" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono focus:outline-none ${paymentErrors.cardCvc ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                    {paymentErrors.cardCvc && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cardCvc}</p>}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {state.selectedMethod === 'sbp' && (
                                        <div className="fade-in space-y-4">
                                            <label className="text-sm font-bold text-gray-700 dark:text-gray-300 block mb-2">Выберите банк для оплаты</label>
                                            <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                {BANKS.map(b => (
                                                    <div key={b.id} onClick={() => updateState({selectedBank: b.id})} className={`p-3 border-2 rounded-xl cursor-pointer flex flex-col items-center justify-center gap-2 transition-all ${state.selectedBank === b.id ? 'border-[#5b32d4] bg-purple-50 dark:bg-purple-900/20' : 'border-gray-100 dark:border-gray-800 hover:border-gray-200'}`}>
                                                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-xs" style={{backgroundColor: b.bg, color: b.text}}>{b.initial}</div>
                                                        <span className="text-xs font-bold dark:text-white text-center">{b.name}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {state.selectedMethod === 'crypto' && (
                                        <div className="space-y-5 fade-in">
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Выберите сеть</label>
                                                <select className="w-full p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-xl dark:text-white font-bold focus:outline-none focus:border-[#5b32d4] appearance-none">
                                                    <option>USDT (TRC-20)</option><option>USDT (ERC-20)</option><option>Bitcoin (BTC)</option>
                                                </select>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Адрес для перевода</label>
                                                <div className="flex items-center gap-2">
                                                    <input type="text" readOnly value="TXYZ12345abcdefGHIJKLMNOP67890" className="w-full p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-xl dark:text-white font-mono text-sm focus:outline-none text-gray-500" />
                                                    <button onClick={() => alert('Адрес скопирован!')} className="p-4 bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 rounded-xl hover:bg-[#e0dbf4] transition-colors"><Icons.Code /></button>
                                                </div>
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-gray-500 ml-1 mb-1.5 block">Хэш транзакции / ID перевода</label>
                                                <input type="text" value={cryptoTxId} onChange={e => { setCryptoTxId(e.target.value); setPaymentErrors(prev => ({...prev, cryptoTxId: null})); }} placeholder="Вставьте после отправки перевода" className={`w-full p-4 bg-gray-50 dark:bg-[#23232f] border rounded-xl dark:text-white font-mono text-sm focus:outline-none ${paymentErrors.cryptoTxId ? 'border-2 border-red-500 bg-red-50 dark:bg-red-900/10' : 'border-gray-100 dark:border-gray-800 focus:border-[#5b32d4]'}`} />
                                                {paymentErrors.cryptoTxId && <p className="text-xs text-red-500 font-semibold mt-1.5 ml-1">{paymentErrors.cryptoTxId}</p>}
                                                <p className="text-xs text-gray-400 mt-1.5 ml-1">Без этого поля подтвердить оплату не получится — мы проверяем перевод по хэшу.</p>
                                            </div>
                                        </div>
                                    )}

                                    {state.selectedMethod === 'wallet' && (
                                        <div className="fade-in space-y-4">
                                            <div className="flex items-center justify-between p-4 bg-gray-50 dark:bg-gray-800/50 rounded-2xl">
                                                <span className="text-sm font-semibold text-gray-500 dark:text-gray-400">Баланс кошелька</span>
                                                <span className={`font-extrabold ${(state.walletBalance || 0) >= price ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>{formatMoney(state.walletBalance || 0)} ₽</span>
                                            </div>
                                            {(state.walletBalance || 0) < price ? (
                                                <div className="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-2xl border border-amber-100 dark:border-amber-900/40 flex gap-3 items-start">
                                                    <Icons.Alert className="w-5 h-5 shrink-0 text-amber-500 mt-0.5" style={{width:'20px',height:'20px',minWidth:'20px'}} />
                                                    <p className="text-sm text-amber-700 dark:text-amber-400 font-semibold leading-relaxed flex-1 min-w-0">Не хватает {formatMoney(price - (state.walletBalance || 0))} ₽. Пополните баланс в разделе «Кошелёк» и вернитесь для оплаты.</p>
                                                </div>
                                            ) : (
                                                <p className="text-sm text-gray-400">С баланса спишется {formatMoney(price)} ₽, подписка активируется сразу.</p>
                                            )}
                                        </div>
                                    )}

                                    <button onClick={handleConfirmPayment} className="w-full mt-8 py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors text-lg">
                                        {state.selectedMethod === 'sbp' ? 'Оплатить через приложение банка' : state.selectedMethod === 'crypto' ? 'Я перевёл средства' : state.selectedMethod === 'wallet' ? `Оплатить с баланса ${formatPrice(price)}₽` : `Оплатить ${formatPrice(price)}₽`}
                                    </button>
                                </div>
                            </div>

                            {showScanner && (
                                <div className="fixed inset-0 bg-black z-[70] flex flex-col items-center justify-center fade-in">
                                    <button onClick={closeScanner} className="void-tap-target absolute top-5 right-5 z-10 p-2.5 bg-white/10 hover:bg-white/20 text-white rounded-full transition-colors flex items-center justify-center"><Icons.X /></button>

                                    {scanStatus === 'requesting' && (
                                        <div className="text-center px-6">
                                            <Icons.Camera className="w-12 h-12 text-white/70 mx-auto mb-4" />
                                            <p className="text-white font-bold">Запрашиваем доступ к камере...</p>
                                            <p className="text-white/50 text-sm mt-1">Разрешите доступ во всплывающем окне браузера</p>
                                        </div>
                                    )}

                                    {(scanStatus === 'scanning' || scanStatus === 'done') && (
                                        <div className="relative w-full h-full flex items-center justify-center">
                                            <video ref={videoRef} autoPlay playsInline muted className="absolute inset-0 w-full h-full object-cover" />
                                            <div className="absolute inset-0 bg-black/40"></div>
                                            <div className="relative w-[88%] max-w-sm aspect-[1.586/1] rounded-2xl">
                                                <div className={`absolute inset-0 rounded-2xl border-4 transition-colors duration-300 ${scanStatus === 'done' ? 'border-green-400' : 'border-white/80'}`}></div>
                                                <div className="absolute -top-1 -left-1 w-8 h-8 border-t-4 border-l-4 border-[#5b32d4] rounded-tl-2xl"></div>
                                                <div className="absolute -top-1 -right-1 w-8 h-8 border-t-4 border-r-4 border-[#5b32d4] rounded-tr-2xl"></div>
                                                <div className="absolute -bottom-1 -left-1 w-8 h-8 border-b-4 border-l-4 border-[#5b32d4] rounded-bl-2xl"></div>
                                                <div className="absolute -bottom-1 -right-1 w-8 h-8 border-b-4 border-r-4 border-[#5b32d4] rounded-br-2xl"></div>
                                                {scanStatus === 'scanning' && <div className="void-img-shimmer absolute left-0 right-0 h-1 rounded-full" style={{ top: '50%' }}></div>}
                                                {scanStatus === 'done' && (
                                                    <div className="absolute inset-0 flex items-center justify-center bg-green-500/20 rounded-2xl">
                                                        <div className="w-14 h-14 bg-green-500 rounded-full flex items-center justify-center fade-in"><Icons.Check className="w-7 h-7 text-white" /></div>
                                                    </div>
                                                )}
                                            </div>
                                            <p className="absolute bottom-16 left-0 right-0 text-center text-white font-bold px-6">
                                                {scanStatus === 'scanning' ? 'Наведите камеру на карту...' : 'Карта распознана!'}
                                            </p>
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    );
                }

                return (
                    <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                        <div className="px-4 py-8 max-w-2xl mx-auto">
                            <div className="flex items-center mb-8 gap-4">
                                <button onClick={() => updateState({checkoutPlan: null})} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                                <h2 className="text-2xl font-bold dark:text-white">Оформление подписки</h2>
                            </div>
                            
                            <div className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm mb-6 flex justify-between items-center">
                                <div className="flex gap-4 items-center">
                                    <div className="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center"><Icons.VoidLogo className="w-6 h-6" /></div>
                                    <div>
                                        <h3 className="text-xl font-bold dark:text-white">{state.checkoutPlan.title}</h3>
                                        <span className="bg-[#efecf9] text-[#5b32d4] text-[10px] font-bold px-2 py-1 rounded-md uppercase">Популярный</span>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-2xl font-extrabold dark:text-white">{formatPrice(price)}₽</p>
                                    <p className="text-xs text-gray-500">{period}</p>
                                </div>
                            </div>

                            <h3 className="text-xl font-bold mb-4 dark:text-white">Способ оплаты</h3>
                            <div className="space-y-3 mb-8">
                                <div onClick={() => updateState({selectedMethod: 'card'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'card' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.Card /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">Банковская карта</div><div className="text-xs text-gray-500">Visa, Mastercard, МИР</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'card' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'card' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                                <div onClick={() => updateState({selectedMethod: 'sbp'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'sbp' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.SBP /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">СБП</div><div className="text-xs text-gray-500">Оплата через Систему быстрых платежей</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'sbp' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'sbp' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                                <div onClick={() => updateState({selectedMethod: 'crypto'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'crypto' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.Crypto /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">Криптовалюты</div><div className="text-xs text-gray-500">USDT, BTC и другие</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'crypto' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'crypto' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                                <div onClick={() => updateState({selectedMethod: 'wallet'})} className={`flex items-center gap-4 p-4 rounded-2xl border-2 cursor-pointer transition-all ${state.selectedMethod === 'wallet' ? 'border-[#5b32d4] bg-[#efecf9]/50 dark:bg-purple-900/10' : 'border-gray-100 dark:border-darkBorder hover:bg-gray-50 dark:hover:bg-gray-800'}`}>
                                    <div className="w-10 h-10 flex items-center justify-center rounded-xl bg-white dark:bg-darkCard text-[#5b32d4] dark:text-purple-400"><Icons.Wallet /></div>
                                    <div className="flex-1"><div className="font-bold text-[15px] dark:text-white">Баланс кошелька</div><div className={`text-xs ${(state.walletBalance || 0) >= price ? 'text-gray-500' : 'text-red-500 font-semibold'}`}>Доступно: {formatMoney(state.walletBalance || 0)} ₽{(state.walletBalance || 0) < price ? ' — не хватает средств' : ''}</div></div>
                                    <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center ${state.selectedMethod === 'wallet' ? 'border-[#5b32d4] bg-[#5b32d4]' : 'border-gray-300 dark:border-gray-600'}`}>{state.selectedMethod === 'wallet' && <Icons.Check className="w-3 h-3 text-white" />}</div>
                                </div>
                            </div>
                            <button onClick={() => updateState({paymentStep: 'form'})} className="w-full py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors text-lg">Продолжить</button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="px-4 py-8 max-w-5xl mx-auto">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => goBack(state, updateState, 'settings')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h1 className="text-3xl font-extrabold dark:text-white">Тарифы</h1>
                        </div>
                        <div className="flex justify-center mb-10">
                            <div className="bg-gray-100 dark:bg-darkBorder p-1 flex rounded-2xl relative w-72">
                                <div className={`absolute top-1 bottom-1 w-[calc(50%-4px)] bg-white dark:bg-darkCard rounded-xl shadow-sm transition-transform duration-300 ease-in-out ${state.billingCycle === 'year' ? 'translate-x-[calc(100%+4px)]' : 'translate-x-0'}`} />
                                <button onClick={() => updateState({billingCycle: 'month'})} className={`relative z-10 flex-1 py-2.5 text-sm font-bold transition-colors ${state.billingCycle === 'month' ? 'text-gray-900 dark:text-white' : 'text-gray-500'}`}>В месяц</button>
                                <button onClick={() => updateState({billingCycle: 'year'})} className={`relative z-10 flex-1 py-2.5 text-sm font-bold transition-colors ${state.billingCycle === 'year' ? 'text-gray-900 dark:text-white' : 'text-gray-500'}`}>В год (-20%)</button>
                            </div>
                        </div>
                        <div className="grid md:grid-cols-2 gap-6">
                            {PRICING_PLANS.map(p => (
                                <div key={p.id} className="bg-white dark:bg-darkCard p-6 rounded-[2rem] border border-gray-100 dark:border-darkBorder shadow-sm flex flex-col">
                                    <h2 className="text-2xl font-bold dark:text-white">{p.title}</h2>
                                    <p className="text-sm text-gray-500 mt-1 mb-4">{p.subtitle}</p>
                                    <div className="text-4xl font-extrabold dark:text-white mb-6">{formatPrice(state.billingCycle === 'month' ? p.priceMonth : p.priceYear)}₽</div>
                                    <div className="mb-8">
                                        <h4 className="text-sm font-bold mb-4 dark:text-white">Что входит:</h4>
                                        <div className="space-y-3">
                                            {p.features.map((f, i) => (
                                                <div key={i} className="flex items-start gap-3">
                                                    <div className="mt-1 bg-[#5b32d4] rounded-full p-0.5 flex-shrink-0"><Icons.Check className="w-3 h-3 text-white"/></div>
                                                    <div className="text-sm font-medium text-gray-700 dark:text-gray-300 leading-tight">{f}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <button onClick={() => {

        function LimitsView({ state, updateState }) {
            const plan = state.userPlan;

            const { daily: maxDaily, weekly: maxWeekly } = getPlanLimits(plan);

            const usedDaily = state.usedDailyLimits;
            const usedWeekly = state.usedWeeklyLimits || 0;
            const dailyPercent = maxDaily === Infinity ? 100 : Math.min((usedDaily / maxDaily) * 100, 100);
            const weeklyPercent = maxWeekly === Infinity ? 100 : Math.min((usedWeekly / maxWeekly) * 100, 100);
            const dailyLabel = maxDaily === Infinity ? 'Безлимитно' : `${usedDaily} / ${maxDaily}`;
            const weeklyLabel = maxWeekly === Infinity ? 'Безлимитно' : `${usedWeekly} / ${maxWeekly}`;

            // Тикающие часы для обратного отсчёта восстановления дневного лимита —
            // обновляем каждые полминуты, этого достаточно для точности "Xч Yм".
            const [now, setNow] = useState(Date.now());
            useEffect(() => {
                const id = setInterval(() => setNow(Date.now()), 30 * 1000);
                return () => clearInterval(id);
            }, []);

            const RESET_WINDOW_MS = 8 * 60 * 60 * 1000;
            const resetInMs = state.dailyLimitExceededAt ? Math.max(0, (state.dailyLimitExceededAt + RESET_WINDOW_MS) - now) : 0;
            const resetHours = Math.floor(resetInMs / (60 * 60 * 1000));

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">

                            </div>

        function GuideView({ state, updateState }) {
            const scrollRef = useRef(null);
            const [active, setActive] = useState(GUIDE_SECTIONS[0].id);

            // Подсветка активного раздела при прокрутке (по центру области просмотра).
            useEffect(() => {
                const root = scrollRef.current;
                if (!root || typeof IntersectionObserver === 'undefined') return;
                const obs = new IntersectionObserver((entries) => {
                    entries.forEach(e => { if (e.isIntersecting && e.target.dataset.secid) setActive(e.target.dataset.secid); });
                }, { root, rootMargin: '-45% 0px -50% 0px', threshold: 0 });
                GUIDE_SECTIONS.forEach(s => {
                    const el = document.getElementById('guide-sec-' + s.id);
                    if (el) obs.observe(el);
                });
                return () => obs.disconnect();
            }, []);

            const goToSection = (id) => {
                setActive(id);
                const el = document.getElementById('guide-sec-' + id);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            };

                        <div className="lg:grid lg:grid-cols-[240px_1fr] lg:gap-8 lg:items-start">
                            {/* Десктопная навигация — липкий список слева */}
                            <nav className="hidden lg:block sticky top-4 self-start space-y-1">
                                <p className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3 ml-2">Разделы</p>
                                {GUIDE_SECTIONS.map(section => {
                                    const IconComp = Icons[section.icon] || Icons.Info;
                                    const on = active === section.id;
                                    return (
                                        <button key={section.id} onClick={() => goToSection(section.id)} className={`w-full flex items-center gap-2.5 px-3 py-2.5 rounded-xl text-left text-sm font-bold transition-colors ${on ? 'bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-300' : 'text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                            <IconComp className="w-4 h-4 flex-shrink-0" /> <span className="truncate">{section.title}</span>
                                        </button>
                                    );
                                })}
                            </nav>

                            {/* Контент разделов */}
                            <div className="space-y-4 min-w-0">
                                {GUIDE_SECTIONS.map((section) => {
                                    const c = BLOCK_COLORS[section.color] || BLOCK_COLORS.gray;
                                    const IconComp = Icons[section.icon] || Icons.Info;
                                    return (
                                        <div key={section.id} id={'guide-sec-' + section.id} data-secid={section.id} style={{ scrollMarginTop: '80px' }} className="bg-white dark:bg-darkCard rounded-[1.75rem] border border-gray-100 dark:border-darkBorder shadow-sm p-5 sm:p-6">
                                            <div className="flex items-start gap-3 mb-4">
                                                <div className={`w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 ${c.bg} ${c.text}`}><IconComp className="w-5 h-5" /></div>
                                                <div className="min-w-0">
                                                    <h3 className="font-extrabold text-lg dark:text-white">{section.title}</h3>
                                                    {section.desc && <p className="text-sm text-gray-500 dark:text-gray-400 mt-0.5">{section.desc}</p>}
                                                </div>
                                            </div>
                                            <ul className="space-y-2.5">
                                                {section.items.map((item, j) => (
                                                    <li key={j} className="flex gap-2.5 text-sm text-gray-600 dark:text-gray-300 leading-relaxed">
                                                        <span className={`mt-1.5 w-1.5 h-1.5 rounded-full flex-shrink-0 ${GUIDE_DOT_COLORS[section.color] || GUIDE_DOT_COLORS.gray}`}></span>
                                                        <span>{item}</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    );
                                })}

                                <div className="mt-8 p-5 sm:p-6 bg-[#1a0b38] rounded-[1.75rem] text-white flex items-center gap-4">
                                    <Icons.VoidLogo className="w-10 h-10 flex-shrink-0" />
                                    <p className="text-sm text-purple-100 leading-relaxed">Void Code AI постоянно развивается — новые возможности и интеграции будут появляться прямо здесь.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function WalletView({ state, updateState }) {
            const [showTopUp, setShowTopUp] = useState(false);
            const balance = state.walletBalance || 0;
            const transactions = state.walletTransactions || [];
            const agents = state.aiAgents || [];

            const formatDate = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

            const txIcon = (type) => {
                if (type === 'topup') return { icon: Icons.Wallet, cls: 'bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400' };
                if (type === 'agent_fee') return { icon: Icons.Robot, cls: 'bg-[#efecf9] dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400' };
                if (type === 'token_charge') return { icon: Icons.Sparkles, cls: 'bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400' };
                return { icon: Icons.Receipt, cls: 'bg-gray-100 dark:bg-gray-800 text-gray-500' };
            };

            const statusBadge = (agent) => {
                if (!agent.isPaid) return <span className="text-[11px] font-bold px-2 py-0.5 rounded-md bg-amber-50 dark:bg-amber-900/20 text-amber-600 dark:text-amber-400">Не оплачен</span>;
                if (agent.status === 'suspended') return <span className="text-[11px] font-bold px-2 py-0.5 rounded-md bg-red-50 dark:bg-red-900/20 text-red-500">Приостановлен</span>;
                return <span className="text-[11px] font-bold px-2 py-0.5 rounded-md bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400">Активен</span>;
            };

            return (
                <div className="flex-1 overflow-y-auto pb-12 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-2xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => goBack(state, updateState, 'settings')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Кошелёк</h2>
                        </div>

                        <div className="bg-gradient-to-br from-[#5b32d4] to-[#3d1f96] rounded-[2rem] p-6 shadow-lg mb-6 text-white relative overflow-hidden">
                            <div className="absolute -right-8 -top-8 w-32 h-32 rounded-full bg-white/10"></div>
                            <div className="absolute -right-2 -bottom-10 w-24 h-24 rounded-full bg-white/10"></div>
                            <p className="text-sm font-semibold text-white/70 mb-1.5 relative">Баланс кошелька</p>
                            <p className="text-4xl font-extrabold mb-5 relative">{formatMoney(balance)} ₽</p>
                            <button onClick={() => setShowTopUp(true)} className="relative flex items-center gap-2 bg-white text-[#5b32d4] font-bold px-5 py-3 rounded-2xl hover:bg-white/90 transition-colors shadow-md">
                                <Icons.Plus className="w-4 h-4" /> Пополнить
                            </button>
                        </div>

                        {balance < LOW_BALANCE_THRESHOLD && (
                            <div className="p-4 bg-amber-50 dark:bg-amber-900/20 rounded-2xl border border-amber-100 dark:border-amber-900/40 flex gap-3 items-start mb-6">
                                <Icons.Alert className="w-5 h-5 shrink-0 text-amber-500 mt-0.5" style={{width:'20px',height:'20px',minWidth:'20px'}} />
                                <p className="text-sm text-amber-700 dark:text-amber-400 font-semibold leading-relaxed flex-1 min-w-0">Низкий баланс. Активным агентам может не хватить средств на оплату токенов — их работа автоматически приостановится до пополнения.</p>
                            </div>
                        )}

                        {agents.length > 0 && (
                            <div className="mb-6">
                                <h3 className="text-lg font-extrabold dark:text-white mb-3">Мои агенты</h3>
                                <div className="bg-white dark:bg-darkCard rounded-[1.75rem] border border-gray-100 dark:border-darkBorder shadow-sm divide-y divide-gray-50 dark:divide-gray-800">
                                    {agents.map(agent => (
                                        <button key={agent.id} onClick={() => updateState({ activeAgentId: agent.id, currentView: 'agent-builder' })} className="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors text-left">
                                            <div className="flex items-center gap-3 min-w-0">
                                                <div className="w-9 h-9 rounded-xl bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 flex items-center justify-center flex-shrink-0"><Icons.Robot className="w-4 h-4" /></div>
                                                <span className="font-bold text-sm dark:text-white truncate">{agent.name}</span>
                                            </div>
                                            {statusBadge(agent)}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        <div>
                            <h3 className="text-lg font-extrabold dark:text-white mb-3">История операций</h3>
                            {transactions.length === 0 ? (
                                <div className="text-center py-14 bg-white dark:bg-darkCard rounded-[1.75rem] border border-gray-100 dark:border-darkBorder">
                                    <Icons.Receipt className="w-12 h-12 mx-auto mb-3 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 text-sm font-medium">Операций пока нет</p>
                                </div>
                            ) : (
                                <div className="bg-white dark:bg-darkCard rounded-[1.75rem] border border-gray-100 dark:border-darkBorder shadow-sm divide-y divide-gray-50 dark:divide-gray-800">
                                    {transactions.map(tx => {
                                        const { icon: TxIcon, cls } = txIcon(tx.type);
                                        return (
                                            <div key={tx.id} className="flex items-center gap-3 p-4">
                                                <div className={`w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 ${cls}`}><TxIcon className="w-4 h-4" /></div>
                                                <div className="min-w-0 flex-1">
                                                    <p className="font-semibold text-sm dark:text-white truncate">{tx.description}</p>
                                                    <p className="text-xs text-gray-400">{formatDate(tx.timestamp)}</p>
                                                </div>
                                                <span className={`font-bold text-sm flex-shrink-0 ${tx.amount >= 0 ? 'text-green-600 dark:text-green-400' : 'text-gray-700 dark:text-gray-300'}`}>{tx.amount >= 0 ? '+' : ''}{formatMoney(tx.amount)} ₽</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </div>

                    {showTopUp && (
                        <WalletTopUpModal state={state} updateState={updateState} onClose={() => setShowTopUp(false)} onSuccess={() => setShowTopUp(false)} />
                    )}
                </div>
            );
        }

        function SystemPromptView({ state, updateState }) {
            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-2xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => goBack(state, updateState, 'home')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Системный промт</h2>
                        </div>
                        <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder space-y-4">
                            <textarea value={state.systemPromptState} onChange={e => updateState({systemPromptState: e.target.value})} className="w-full h-48 p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl dark:text-white font-medium resize-none focus:outline-none focus:ring-2 focus:ring-[#5b32d4]" placeholder="Укажите базовые инструкции для ИИ..."></textarea>
                            <button onClick={() => updateState({systemPromptState: 'Ты — опытный наставник по программированию. Объясняй концепции просто и с комментариями.'})} className="w-full bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 font-bold py-3.5 rounded-2xl transition-colors flex justify-center items-center gap-2 hover:bg-[#e0dbf4]"><Icons.Sparkles /> Сгенерировать</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // БИБЛИОТЕКА (сгенерированные изображения и документы/код)
        // ==========================================
        function LibraryView({ state, updateState }) {
            const [tab, setTab] = useState('images');
            const [copiedId, setCopiedId] = useState(null);
            const images = state.generatedImages || [];
            const documents = state.generatedDocuments || [];

            const formatDate = (ts) => new Date(ts).toLocaleString('ru-RU', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

            const openChat = (chatId) => {
                const exists = state.chatSessions.some(c => c.id === chatId);
                if (exists) updateState({ activeChatId: chatId, currentView: 'chat' });
                else updateState({ currentView: 'chat' });
            };

            const handleCopy = (doc) => {
                navigator.clipboard.writeText(doc.content).then(() => {
                    setCopiedId(doc.id);
                    setTimeout(() => setCopiedId(null), 1500);
                }).catch(() => {});
            };

            return (
                <div className="flex-1 overflow-y-auto pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in w-full">
                    <div className="max-w-4xl mx-auto px-4 py-8 md:py-12">
                        <div className="flex items-center mb-8 gap-4">
                            <button onClick={() => goBack(state, updateState, 'home')} className="p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"><Icons.ChevronLeft /></button>
                            <h2 className="text-3xl font-extrabold dark:text-white">Библиотека</h2>
                        </div>

                        <div className="flex gap-2 mb-8 bg-gray-100 dark:bg-gray-800/60 p-1.5 rounded-2xl w-full md:w-fit">
                            <button onClick={() => setTab('images')} className={`flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm flex-1 md:flex-none transition-colors ${tab === 'images' ? 'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>
                                <Icons.Image className="w-4 h-4" /> Изображения <span className="text-xs opacity-60">({images.length})</span>
                            </button>
                            <button onClick={() => setTab('documents')} className={`flex items-center justify-center gap-2 px-5 py-2.5 rounded-xl font-bold text-sm flex-1 md:flex-none transition-colors ${tab === 'documents' ? 'bg-white dark:bg-darkCard text-[#5b32d4] shadow-sm' : 'text-gray-500 dark:text-gray-400 hover:text-gray-700'}`}>
                                <Icons.Library className="w-4 h-4" /> Документы <span className="text-xs opacity-60">({documents.length})</span>
                            </button>
                        </div>

                        {tab === 'images' && (
                            images.length === 0 ? (
                                <div className="text-center py-20 fade-in">
                                    <Icons.Image className="w-14 h-14 mx-auto mb-4 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 font-medium">Пока нет сгенерированных изображений</p>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm mt-1">Создайте первое во вкладке «Изображение» в чате</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4 fade-in">
                                    {images.map(img => (
                                        <div key={img.id} className="bg-white dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-darkBorder shadow-sm overflow-hidden group">
                                            <div className="aspect-square overflow-hidden cursor-pointer" onClick={() => openChat(img.chatId)}>
                                                <img src={img.url} alt={img.prompt} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" />
                                            </div>
                                            <div className="p-3">
                                                <p className="text-xs font-semibold text-gray-700 dark:text-gray-300 line-clamp-2 mb-1.5">{img.prompt}</p>
                                                <div className="flex items-center justify-between">
                                                    <span className="text-[11px] text-gray-400">{formatDate(img.timestamp)}</span>
                                                    <a href={img.url} download={`void-image-${img.id}.svg`} className="p-1.5 rounded-lg text-[#5b32d4] dark:text-purple-400 hover:bg-purple-50 dark:hover:bg-purple-900/20 transition-colors" title="Скачать"><Icons.Download className="w-3.5 h-3.5" /></a>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )
                        )}

                        {tab === 'documents' && (
                            documents.length === 0 ? (
                                <div className="text-center py-20 fade-in">
                                    <Icons.Library className="w-14 h-14 mx-auto mb-4 text-gray-300 dark:text-gray-700" />
                                    <p className="text-gray-400 dark:text-gray-600 font-medium">Пока нет сохранённых документов</p>
                                    <p className="text-gray-400 dark:text-gray-600 text-sm mt-1">Код из ответов ассистента будет появляться здесь автоматически</p>
                                </div>
                            ) : (
                                <div className="space-y-3 fade-in">
                                    {documents.map(doc => (
                                        <div key={doc.id} className="bg-white dark:bg-darkCard rounded-2xl border border-gray-100 dark:border-darkBorder shadow-sm p-4 cursor-pointer" onClick={() => openChat(doc.chatId)}>
                                            <div className="flex items-start justify-between gap-3 mb-2">
                                                <div className="flex items-center gap-2 min-w-0">
                                                    <span className="flex-shrink-0 text-[11px] font-bold uppercase px-2 py-0.5 rounded-md bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-300">{doc.language}</span>
                                                    <span className="font-semibold text-sm text-gray-800 dark:text-gray-200 truncate">{doc.title}</span>
                                                </div>
                                                <button onClick={(e) => { e.stopPropagation(); handleCopy(doc); }} className="flex-shrink-0 text-xs font-bold px-3 py-1.5 rounded-lg bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-300 transition-colors">
                                                    {copiedId === doc.id ? 'Скопировано ✓' : 'Копировать'}
                                                </button>
                                            </div>
                                            <pre className="text-xs bg-gray-50 dark:bg-[#17141f] rounded-xl p-3 overflow-x-auto text-gray-600 dark:text-gray-400 max-h-24 overflow-y-hidden"><code>{doc.content.slice(0, 240)}{doc.content.length > 240 ? '...' : ''}</code></pre>
                                            <span className="text-[11px] text-gray-400 mt-2 block">{formatDate(doc.timestamp)}</span>
                                        </div>
                                    ))}
                                </div>
                            )
                        )}
                    </div>
                </div>
            );
        }

        // ==========================================
        // КОНСТРУКТОР AI-АГЕНТОВ ЧЕРЕЗ ЧАТ — "Кастомные агенты"
        // ==========================================
        // Данные для пошагового диалога-мастера: помогает собрать агента,
        // не трогая канвас — отвечаешь на вопросы, а в конце получаешь
        // готовый, полностью рабочий агент (тот же формат, что и в конструкторе блоков).
        const AGENT_WIZARD_PURPOSES = [
            { id: 'support', label: 'Поддержка клиентов' },
            { id: 'content', label: 'Публикация контента' },
            { id: 'data', label: 'Обработка заявок и данных' },
            { id: 'assistant', label: 'Личный помощник' },
            { id: 'custom', label: 'Свой вариант' },
        ];

        // ==========================================
        // СЧЁТ ЗА СБОРКУ АГЕНТА
        // ==========================================
        // Показывается сразу после того, как агент собран (неважно, через блоки
        // или через чат) — агент сохраняется как неоплаченный черновик и не
        // может использоваться/тестироваться, пока счёт не будет оплачен с баланса.
        function AgentInvoiceModal({ state, updateState, agent, onClose, onPaid }) {
            const [showTopUp, setShowTopUp] = useState(false);
            const balance = state.walletBalance || 0;
            const sufficient = balance >= AGENT_BUILD_FEE;

            const handlePay = () => {
                if (!sufficient) { setShowTopUp(true); return; }
                const now = Date.now();
                updateState({
                    walletBalance: balance - AGENT_BUILD_FEE,
                    walletTransactions: [{ id: 'tx' + now, type: 'agent_fee', amount: -AGENT_BUILD_FEE, description: `Сборка агента «${agent.name}»`, timestamp: now }, ...(state.walletTransactions || [])],
                    aiAgents: (state.aiAgents || []).map(a => a.id === agent.id ? { ...a, isPaid: true, status: 'active', paidAt: now } : a)
                });
                onPaid && onPaid();
            };

            return (
                <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[60] flex items-start sm:items-center justify-center p-3 sm:p-4 overflow-y-auto fade-in">
                    <div className="bg-white dark:bg-darkCard w-full max-w-md rounded-[2rem] sm:rounded-[2.5rem] p-6 sm:p-8 shadow-2xl border border-gray-100 dark:border-darkBorder relative my-6 sm:my-0">
                        <div className="w-14 h-14 bg-[#efecf9] dark:bg-purple-900/30 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center mb-4"><Icons.Receipt className="w-7 h-7" /></div>
                        <h2 className="text-xl font-extrabold dark:text-white mb-1">Счёт за сборку агента</h2>
                        <p className="text-sm text-gray-500 dark:text-gray-400 mb-6">Агент «{agent.name}» собран и сохранён как черновик. Чтобы забрать его и запустить в работу, оплатите разовую услугу сборки.</p>

                        <div className="bg-gray-50 dark:bg-gray-800/50 rounded-2xl p-4 mb-4 space-y-2">
                            <div className="flex justify-between text-sm"><span className="text-gray-500 dark:text-gray-400">Сборка агента «{agent.name}»</span><span className="font-bold dark:text-white">{formatMoney(AGENT_BUILD_FEE)} ₽</span></div>
                            <div className="border-t border-gray-200 dark:border-gray-700 pt-2 flex justify-between"><span className="font-bold dark:text-white">Итого</span><span className="font-extrabold text-[#5b32d4] dark:text-purple-400">{formatMoney(AGENT_BUILD_FEE)} ₽</span></div>
                        </div>

                        <div className="flex items-center justify-between p-3.5 bg-gray-50 dark:bg-gray-800/50 rounded-2xl mb-5">
                            <span className="text-sm font-semibold text-gray-500 dark:text-gray-400">Баланс кошелька</span>
                            <span className={`font-bold text-sm ${sufficient ? 'text-green-600 dark:text-green-400' : 'text-red-500'}`}>{formatMoney(balance)} ₽</span>
                        </div>

                        <button onClick={handlePay} className="w-full py-4 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold rounded-2xl shadow-lg transition-colors mb-2.5">
                            {sufficient ? `Оплатить со счёта ${formatMoney(AGENT_BUILD_FEE)} ₽` : 'Пополнить и оплатить'}
                        </button>
                        <button onClick={onClose} className="w-full py-3.5 text-gray-500 dark:text-gray-400 font-bold text-sm hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                            Оплатить позже (агент останется черновиком)
                        </button>
                    </div>

                    {showTopUp && (
                        <WalletTopUpModal
                            state={state}
                            updateState={updateState}
                            reason={`Пополните баланс минимум на ${formatMoney(Math.max(100, AGENT_BUILD_FEE - balance))} ₽, чтобы оплатить сборку агента.`}
                            onClose={() => setShowTopUp(false)}
                            onSuccess={() => setShowTopUp(false)}
                        />
                    )}
                </div>
            );
        }

        function AgentChatBuilderView({ state, updateState }) {
            const messagesEndRef = useRef(null);
            const [messages, setMessages] = useState([
                { id: 'm0', role: 'bot', text: 'Привет! Я помогу собрать личного AI-агента под твою задачу — просто отвечай на вопросы, и через пару минут агент будет готов. 🙂' },
                { id: 'm1', role: 'bot', text: 'Как назовём агента?' }
            ]);
            const [phase, setPhase] = useState('ask_name'); // ask_name -> ask_purpose -> ask_purpose_custom? -> ask_trigger -> ask_actions -> ask_memory -> ask_prompt -> summary -> done
            const [answers, setAnswers] = useState({ name: '', purposeLabel: '', triggerBlockId: '', actionBlockIds: [], memory: true, systemPrompt: '' });
            const [inputValue, setInputValue] = useState('');
            const [pendingActions, setPendingActions] = useState([]);
            const [createdAgentId, setCreatedAgentId] = useState(null);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages, phase]);

            const addBotMessage = (text, extra = {}) => {
                setMessages(prev => [...prev, { id: 'm' + Date.now() + Math.random(), role: 'bot', text, ...extra }]);
            };
            const addUserMessage = (text) => {
                setMessages(prev => [...prev, { id: 'm' + Date.now() + Math.random(), role: 'user', text }]);
            };

            // ---------- Шаг 1: имя ----------
            const submitName = (value) => {
                const name = value.trim();
                if (!name) return;
                addUserMessage(name);
                setAnswers(prev => ({ ...prev, name }));
                setInputValue('');
                setTimeout(() => {
                    addBotMessage(`Отлично, «${name}»! Чем этот агент будет заниматься?`);
                    setPhase('ask_purpose');
                }, 300);
            };

            // ---------- Шаг 2: цель ----------
            const submitPurpose = (opt) => {
                addUserMessage(opt.label);
                if (opt.id === 'custom') {
                    setTimeout(() => { addBotMessage('Опиши в паре слов, чем он будет заниматься:'); setPhase('ask_purpose_custom'); }, 300);
