    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- ДАННЫЕ О МОДЕЛЯХ ---
        const AI_MODELS = [
            {
                id: 'flash', name: 'Flash', badge: 'Моментальный отклик',
                desc: 'Специально оптимизированная «облегченная» модель. Для простых классификаций, фильтрации контента, быстрого перевода.',
                sysPrompt: 'Ты — Void Code AI (модель Flash). Твоя цель — отвечать максимально быстро, лаконично и по делу.'
            },
            {
                id: 'flash_ext', name: 'Flash (Расширенный)', badge: 'Рабочая лошадка',
                desc: 'Предназначена для задач, где важна не только скорость, но и качество рассуждений. Сложная разработка ПО, анализ документов.',
                sysPrompt: 'Ты — Void Code AI (модель Flash Расширенный). Ты — мощный универсальный ассистент и программист.'
            },
            {
                id: 'pro', name: 'Void Code Pro', badge: 'Максимальная мощность',
                desc: 'Глубокое понимание кода и логики. Огромное контекстное окно. Идеально для проектирования систем с нуля.',
                sysPrompt: 'Ты — Void Code AI (модель Void Code Pro). Ты — элитный Senior Full-stack разработчик, математик и системный архитектор. Пиши идеальный код.'
            }
        ];

        // --- API GEMINI ---
        const apiKey = ""; 
        const MODEL_NAME = "gemini-2.5-flash-preview-09-2025";

        const callGeminiAI = async (messages, systemPrompt, retries = 5) => {
            const delays = [1000, 2000, 4000, 8000, 16000];
            const contents = messages.map(msg => {
                const parts = [];
                if (msg.content) parts.push({ text: msg.content });
                if (msg.image) {
                    const base64Data = msg.image.split(',')[1];
                    const mimeType = msg.image.match(/data:(.*?);base64/)[1] || 'image/jpeg';
                    parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
                }
                return { role: msg.role === 'assistant' ? 'model' : 'user', parts };
            });

            const payload = { contents, systemInstruction: { parts: [{ text: systemPrompt }] } };

            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_NAME}:generateContent?key=${apiKey}`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ошибка генерации ответа.";
                } catch (error) {
                    if (i === retries - 1) return "⚠️ Ошибка связи с сервером AI.";
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        };

        const formatPrice = (price) => price.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");

        const copyToClipboard = (text, setCopied) => {
            try {
                if (navigator.clipboard) navigator.clipboard.writeText(text);
                else {
                    const ta = document.createElement("textarea"); ta.value = text;
                    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove();
                }
                setCopied(true); setTimeout(() => setCopied(false), 2000);
            } catch (e) {}
        };

        const MessageRenderer = ({ content }) => {
            const blocks = content.split(/(```[\s\S]*?```)/g);
            return (
                <div className="text-[15px] leading-relaxed break-words">
                    {blocks.map((block, index) => {
                        if (block.startsWith('```') && block.endsWith('```')) {
                            const lines = block.slice(3, -3).split('\n');
                            const lang = lines[0].trim();
                            const code = lines.slice(1).join('\n');
                            const [copied, setCopied] = useState(false);
                            return (
                                <div key={index} className="my-4 bg-[#1e1e2e] rounded-2xl overflow-hidden shadow-sm border border-gray-800">
                                    <div className="flex justify-between items-center px-4 py-2 bg-[#2a2a3c] border-b border-gray-700/50">
                                        <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider">{lang || 'code'}</span>
                                        <button onClick={() => copyToClipboard(code, setCopied)} className="flex items-center gap-1.5 text-xs text-gray-400 hover:text-white transition-colors">
                                            {copied ? <Icons.Check className="w-3 h-3 text-green-400"/> : <Icons.Code />} {copied ? 'Copied' : 'Copy'}
                                        </button>
                                    </div>
                                    <div className="p-4 overflow-x-auto bg-[#1e1e2e]"><pre className="text-sm text-gray-200 font-mono"><code>{code}</code></pre></div>
                                </div>
                            );
                        }
                        const formattedText = block.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').split('\n').map((line, i) => (
                            <React.Fragment key={i}><span dangerouslySetInnerHTML={{ __html: line }} />{i !== block.split('\n').length - 1 && <br />}</React.Fragment>
                        ));
                        return <span key={index}>{formattedText}</span>;
                    })}
                </div>
            );
        };

        // КОМПОНЕНТ ДЛЯ ПЕЧАТИ ТЕКСТА
        const TypewriterMessage = ({ content, scrollRef }) => {
            const [displayedContent, setDisplayedContent] = useState('');
            
            useEffect(() => {
                let currentIndex = 0;
                const timer = setInterval(() => {
                    currentIndex += 3; // Скорость появления (по 3 символа)
                    if (currentIndex >= content.length) {
                        setDisplayedContent(content);
                        clearInterval(timer);
                    } else {
                        setDisplayedContent(content.slice(0, currentIndex));
                    }
                    if (scrollRef && scrollRef.current) {
                        scrollRef.current.scrollIntoView({ behavior: 'auto' });
                    }
                }, 15);
                
                return () => clearInterval(timer);
            }, [content]);

            return <MessageRenderer content={displayedContent} />;
        };

        function App() {
            const [currentView, setCurrentView] = useState('home'); 
            const [isDarkMode, setIsDarkMode] = useState(false);
            
            const [userPlan, setUserPlan] = useState('free');
            const [user, setUser] = useState(null);
            const [notificationsEnabled, setNotificationsEnabled] = useState(true);

            // МУЛЬТИ-ЧАТЫ (ИСТОРИЯ)
            const [chatSessions, setChatSessions] = useState([
                { id: Date.now(), title: 'Новый чат', messages: [{ role: 'assistant', content: 'Привет! Я Void Code AI. Выбери подходящую модель сверху, и мы сможем приступить к работе!', isAnimated: false }] }
            ]);
            const [activeChatId, setActiveChatId] = useState(chatSessions[0].id);
            const [selectedModelId, setSelectedModelId] = useState('flash_ext');
            
            const activeChat = chatSessions.find(c => c.id === activeChatId) || chatSessions[0];
            const chatMessages = activeChat.messages;

            const [inputValue, setInputValue] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [selectedImage, setSelectedImage] = useState(null); 
            const [systemPromptState, setSystemPromptState] = useState('');
            
            // Состояние для окна оформления подписки (чтобы открывать поверх Pricing)
            const [checkoutPlan, setCheckoutPlan] = useState(null);
            const [billingCycle, setBillingCycle] = useState('month');
            const [showProfileMenu, setShowProfileMenu] = useState(false);

            const messagesEndRef = useRef(null);
            const avatarInputRef = useRef(null);
            const chatFileInputRef = useRef(null);

            const activeModel = AI_MODELS.find(m => m.id === selectedModelId);

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => {
                if (user && currentView === 'chat') messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, currentView, isGenerating, user]);

            const handleImageSelect = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setSelectedImage(reader.result); };
                    reader.readAsDataURL(file);
                }
            };

                            <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder hover:shadow-md transition-shadow cursor-pointer">
                                <div className="flex justify-between items-start mb-4">
                                    <div className="w-12 h-12 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-2xl flex items-center justify-center"><Icons.Folder /></div>
                                    <span className="bg-gray-100 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-xs font-bold px-2 py-1 rounded-lg">Активный</span>
                                </div>
                                <h3 className="text-xl font-bold dark:text-white mb-2">Проект «Void»</h3>
                                <p className="text-sm text-gray-500 mb-6 line-clamp-2">Разработка, дизайн, тарифы и маркетинг объединены здесь.</p>
                                
                                <div className="border-t border-gray-50 dark:border-gray-800 pt-4 flex gap-4 text-sm font-semibold text-gray-600 dark:text-gray-400">
                                    <div className="flex items-center gap-1.5"><Icons.MessageSquare className="w-4 h-4" /> 12 чатов</div>
                                    <div className="flex items-center gap-1.5"><Icons.Code className="w-4 h-4" /> 5 файлов</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const SystemPromptView = () => (
                <div className="flex-1 overflow-y-auto pb-24 md:pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in">
                    <div className="max-w-2xl mx-auto px-4 py-8 md:py-12">
                        <button onClick={() => setCurrentView('profile')} className="mb-6 flex items-center gap-2 text-gray-600 dark:text-gray-300 font-bold hover:text-gray-900 dark:hover:text-white transition-colors">
                            <Icons.ChevronLeft /> Назад
                        </button>
                        <h2 className="text-3xl font-extrabold mb-2 dark:text-white">Системный промт</h2>
                        <p className="text-gray-500 mb-8">Настройте базовые инструкции, чтобы ИИ отвечал в нужном вам стиле.</p>
                        
                        <div className="bg-white dark:bg-darkCard rounded-[2rem] p-6 shadow-sm border border-gray-100 dark:border-darkBorder space-y-4">
                            <textarea 
                                value={systemPromptState}
                                onChange={(e) => setSystemPromptState(e.target.value)}
                                className="w-full h-48 p-4 bg-gray-50 dark:bg-[#23232f] border border-gray-100 dark:border-gray-800 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#5b32d4] dark:text-white transition-all font-medium resize-none leading-relaxed" 
                                placeholder="Например: Отвечай всегда как Senior разработчик, используй профессиональный сленг."
                            />
                            <div className="flex gap-3 pt-2">
                                <button onClick={() => setSystemPromptState('Ты — опытный наставник по программированию. Объясняй концепции просто, приводи аналогии из реальной жизни и всегда добавляй комментарии к коду.')} className="flex-1 bg-[#efecf9] dark:bg-purple-900/30 hover:bg-[#e0dbf4] dark:hover:bg-purple-900/50 text-[#5b32d4] dark:text-purple-400 font-bold py-3.5 rounded-2xl transition-colors flex justify-center items-center gap-2">
                                    <Icons.Sparkles className="w-4 h-4" /> Сгенерировать промт
                                </button>
                                <button onClick={() => { alert('Промт сохранен!'); setCurrentView('profile'); }} className="flex-1 bg-[#5b32d4] hover:bg-[#4a26b0] text-white font-bold py-3.5 rounded-2xl shadow-lg transition-colors">Сохранить</button>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const ProfileView = () => {
                return (
                    <div className="flex-1 overflow-y-auto pb-24 md:pb-8 h-full bg-[#f8f9fc] dark:bg-darkBg fade-in">
                        <div className="max-w-xl mx-auto px-4 py-8 md:py-12">
                            <button onClick={() => setCurrentView('home')} className="mb-6 p-2 -ml-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 text-gray-600 dark:text-gray-300 transition-colors w-fit"><Icons.ChevronLeft /></button>

                            <div className="text-center mb-10">
                                <div className="relative inline-block mb-4 group cursor-pointer" onClick={() => avatarInputRef.current.click()}>
                                    <div className="w-28 h-28 bg-[#efecf9] dark:bg-darkCard rounded-full flex items-center justify-center border-4 border-white dark:border-darkBorder shadow-sm mx-auto overflow-hidden text-[#5b32d4]">
                                        {user.avatar ? <img src={user.avatar} className="w-full h-full object-cover"/> : <Icons.User className="w-12 h-12 text-current" />}
                                    </div>
                                    <div className="absolute inset-0 bg-black/40 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity border-4 border-transparent text-white">
                                        <Icons.Camera />
                                    </div>
                                    <div className="absolute bottom-1 right-1 w-7 h-7 bg-green-500 rounded-full border-[3px] border-white dark:border-darkBg shadow-sm flex items-center justify-center">
                                         <Icons.Check />
                                    </div>
                                    <input type="file" ref={avatarInputRef} onChange={handleAvatarUpload} accept="image/*" className="hidden" />
                                </div>
                                <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-1">{user.name}</h2>
                                <p className="text-gray-500 font-medium">{user.email}</p>
                            </div>

                            <div className="space-y-6">
                                <div className="bg-white dark:bg-darkCard rounded-[2rem] p-2 shadow-sm border border-gray-100 dark:border-darkBorder">
                                    <ProfileListItem icon={Icons.User} label="Личные данные" onClick={() => setCurrentView('profile-edit')} />
                                    <ProfileListItem icon={Icons.Folder} label="Мои проекты" onClick={() => setCurrentView('projects')} />
                                    <ProfileListItem icon={Icons.BarChart} label="Лимиты" onClick={() => setCurrentView('limits')} />
                                    <ProfileListItem 
                                        icon={Icons.Star} label="Подписка Pro" 
                                        extra={<span className="text-xs font-bold text-green-600 dark:text-green-400 bg-green-50 dark:bg-green-900/30 px-3 py-1 rounded-lg border border-green-100 dark:border-green-900/50">{userPlan === 'pro' ? 'Pro' : 'Free'}</span>} 
                                        onClick={() => setCurrentView('pricing')}
                                    />
                                    <ProfileListItem icon={Icons.Archive} label="Архив" border={false} />
                                </div>

                                <h3 className="px-6 text-xl font-bold text-gray-900 dark:text-white mt-8 mb-4">Настройки</h3>
                                
                                <div className="bg-white dark:bg-darkCard rounded-[2rem] p-2 shadow-sm border border-gray-100 dark:border-darkBorder">
                                    <div className="flex items-center justify-between p-4 border-b border-gray-50 dark:border-gray-800/50 cursor-pointer hover:bg-gray-50/80 dark:hover:bg-gray-800/50 rounded-2xl transition-colors" onClick={() => setNotificationsEnabled(!notificationsEnabled)}>
                                        <div className="flex items-center gap-4">
                                            <div className="p-2 bg-purple-50 dark:bg-purple-900/20 text-[#5b32d4] dark:text-purple-400 rounded-xl"><Icons.Bell /></div>
                                            <span className="font-bold text-[15px] text-gray-800 dark:text-gray-200">Уведомления</span>
                                        </div>
                                        <div className={`w-12 h-7 rounded-full p-1 transition-colors shadow-inner flex items-center ${notificationsEnabled ? 'bg-[#5b32d4]' : 'bg-gray-200 dark:bg-gray-700'}`}>
                                            <div className={`w-5 h-5 bg-white rounded-full shadow-sm transition-transform duration-300 ${notificationsEnabled ? 'translate-x-5' : 'translate-x-0'}`}></div>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between p-4 border-b border-gray-50 dark:border-gray-800/50 cursor-pointer hover:bg-gray-50/80 dark:hover:bg-gray-800/50 rounded-2xl transition-colors" onClick={() => setIsDarkMode(!isDarkMode)}>
                                        <div className="flex items-center gap-4">
                                            <div className="p-2 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-xl"><Icons.Moon /></div>
                                            <span className="font-bold text-[15px] text-gray-800 dark:text-gray-200">Темная тема</span>
                                        </div>
                                        <div className={`w-12 h-7 rounded-full p-1 transition-colors shadow-inner flex items-center ${isDarkMode ? 'bg-[#5b32d4]' : 'bg-gray-200 dark:bg-gray-700'}`}>
                                            <div className={`w-5 h-5 bg-white rounded-full shadow-sm transition-transform duration-300 ${isDarkMode ? 'translate-x-5' : 'translate-x-0'}`}></div>
                                        </div>
                                    </div>
                                    <div className="flex items-center justify-between p-4 border-b border-gray-50 dark:border-gray-800/50 cursor-pointer hover:bg-gray-50/80 dark:hover:bg-gray-800/50 rounded-2xl transition-colors">
                                        <div className="flex items-center gap-4">
                                            <div className="p-2 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-xl"><Icons.Globe /></div>
                                            <span className="font-bold text-[15px] text-gray-800 dark:text-gray-200">Язык</span>
                                        </div>
                                        <div className="flex items-center gap-3">
                                            <span className="text-sm font-bold text-gray-400">Русский</span>
                                            <Icons.ChevronRight className="w-5 h-5 text-gray-300" />
                                        </div>
                                    </div>
                                    <ProfileListItem icon={Icons.LayoutDashboard} label="Системный промт" onClick={() => setCurrentView('sys-prompt')} />
                                    <ProfileListItem icon={Icons.Info} label="Версия" extra={<span className="text-sm font-bold text-gray-400">v1.2.0</span>} />
                                    <ProfileListItem icon={Icons.HelpCircle} label="Помощь" border={false} />
                                </div>
                                <div className="text-center pb-8 pt-4">
                                    <button onClick={() => { setUser(null); setCurrentView('home'); }} className="font-bold text-red-500 hover:text-red-600 transition-colors">
                                        Выйти из аккаунта
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            const ProfileListItem = ({ icon: Icon, label, extra, border = true, onClick }) => (
                <div onClick={onClick} className={`flex items-center justify-between p-4 cursor-pointer hover:bg-gray-50/80 dark:hover:bg-gray-800/50 transition-colors ${border ? 'border-b border-gray-50 dark:border-gray-800/50' : ''} rounded-2xl`}>
                    <div className="flex items-center gap-4">
                        <div className="p-2 bg-gray-50 dark:bg-gray-800 text-gray-600 dark:text-gray-400 rounded-xl"><Icon /></div>
                        <span className="font-bold text-[15px] text-gray-800 dark:text-gray-200">{label}</span>
                    </div>
                    <div className="flex items-center gap-3">
                        {extra}
                        {onClick && !extra && <Icons.ChevronRight className="w-5 h-5 text-gray-300" />}
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen w-full">
                    {user && <Sidebar />}
                    <main className="flex-1 flex flex-col h-full relative max-w-full bg-[#f8f9fc] dark:bg-darkBg">
                        {user && currentView === 'home' && <HomeView />}
                        {user && currentView === 'chat' && <ChatView />}
                        {user && currentView === 'profile' && <ProfileView />}
                        {user && currentView === 'pricing' && <PricingView />}
                        {user && currentView === 'profile-edit' && <ProfileEditView />}
                        {user && currentView === 'limits' && <LimitsView />}
                        {user && currentView === 'projects' && <ProjectsView />}
                        {user && currentView === 'sys-prompt' && <SystemPromptView />}
                        {user && <BottomNav />}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
 </html>
